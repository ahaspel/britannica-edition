services:
  postgres:
    image: postgres:16
    # Come back by themselves after a reboot — Docker Desktop starts at logon, but
    # without a policy the containers stay Exited and every reboot needs a manual
    # `docker compose up`.  `unless-stopped` restarts them on daemon start yet still
    # honours a deliberate `docker compose stop`.
    restart: unless-stopped
    environment:
      POSTGRES_DB: britannica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "britannica-dev-key"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  meili_data:
