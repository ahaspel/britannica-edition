<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Egyptian+Hieroglyphs&display=swap">
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --unresolved: #b42318;
      --resolved-bg: #f5f0e8;
      --unresolved-bg: #fff1f1;
      --code-bg: #f0ebe3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Plate pages have no marginal furniture (page numbers, shoulder
       headers) — drop the reading-column cap and give the viewport to
       the display.  Toggled by renderArticle on article_type==="plate". */
    body.plate-page .page {
      max-width: none;
      padding-left: 2vw;
      padding-right: 2vw;
    }

    /* Transliteration tooltip: the romanization of a Greek/Hebrew word, carried
       from the source's `<span title="…">` and shown on hover.  Dotted underline
       + help cursor signal it's hover-able (the print offered no such aid). */
    .xlit {
      border-bottom: 1px dotted currentColor;
      cursor: help;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    .meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input[type="text"] {
      flex: 1 1 380px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      background: var(--panel);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
    }

    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: var(--code-bg); }

    .body-text {
      font-size: 1.08rem;
      margin-left: 6.5em;
      margin-right: 160px;
      position: relative;
    }

    @media (max-width: 900px) {
      .body-text {
        margin-right: 0;
      }
    }

    .body-text p {
      margin: 0 0 0.5em 0;
      position: relative;
    }


    .body-text .katex-display {
      text-indent: 0;
      max-width: 100%;
      /* Clipping as a safety net for any equation that escaped the
         build-time width measurement (new LaTeX added since the last
         `measure_math_widths.py` run).  Normal display math fits at
         natural size; wide math is pre-scaled via `«MATH[fs=N]:`
         hints (see `britannica.math_widths`); really wide math uses
         the pop-out link (see `renderMathPopout`).  This `overflow:
         hidden` only matters for the uncached-residual case. */
      overflow: hidden;
    }
    /* Tier 2: scaled math.  `«MATH[fs=N]:` wraps the KaTeX render in
       a span with `font-size: N%`.  KaTeX em-based widths resolve to
       the smaller base so the math is rendered at the smaller size
       from initial paint (no thrash). */
    .math-scaled {
      display: inline-block;
    }
    /* Tier 3: popout link for math too wide to scale into the
       column.  Renders as an italic anchor; click opens the popout
       modal which renders at viewport-fitting font-size. */
    .math-popout-link {
      font-style: italic;
      color: #6b5a3f;
      text-decoration: underline dotted;
      cursor: zoom-in;
      font-size: 0.92em;
    }
    .math-popout-link:hover {
      color: #2c2416;
      background: #ebe4d6;
    }
    /* Standalone display-math context: render the popout link as a
       block element in the math column position, so it occupies the
       same visual slot the equation would have — centred, with
       display-math margins — rather than sitting inline within the
       surrounding prose paragraph.  An adjacent label (handled by
       the EQNGROUP renderer) still goes in the right-margin label
       column. */
    .math-popout-link.popout-display {
      display: block;
      text-align: center;
      margin: 1em 0;
    }
    .math-popout-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 10, 0.6);
      z-index: 9100;
      padding: 2em;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .math-popout-panel {
      position: relative;
      max-width: calc(100vw - 4em);
      max-height: calc(100vh - 4em);
      background: var(--panel);
      border: 1px solid #c4b49a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 2em 2.5em 1.5em;
      overflow: auto;
    }
    .math-popout-close {
      position: absolute;
      top: 6px;
      right: 8px;
      font: inherit;
      font-size: 1.1rem;
      line-height: 1;
      color: #8b7355;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .math-popout-close:hover { background: #ddd4c4; color: #3a2f20; }
    .math-popout-host .katex-display {
      overflow: visible;
      margin: 0;
    }
    /* KaTeX auto-numbers rows of `\begin{align}` with CSS counters
       — that's a KaTeX-rendering convention, not anything in the
       1911 source.  No EB1911 article uses explicit `\tag{}`, so
       suppressing the auto-numbering entirely is the right call. */
    .katex .eqn-num,
    .katex .mml-eqn-num {
      display: none !important;
    }

    /* Numbered display equation(s).  Three-column grid: a flexible
       gutter on the left, the math content centred in the auto
       column, and the (N) label flush right.  `minmax(0, 1fr)` on
       the side gutters lets the math shrink rather than pushing the
       label off the page when an equation is unusually wide; very
       wide rows then scroll horizontally inside katex-display's
       overflow-x: auto (set on .body-text .katex-display).
       align-items: center on the grid puts the label at the
       vertical centre of the row stack, matching the original
       publication's rowspan-spanning label placement. */
    /* Math-system layout — flex with reserved label space so wide
       math can never overlap the (N) label.  The math-rows column
       claims the remaining space (flex:1 with min-width:0 so it can
       shrink below its content's natural width) and clips overflow.
       Earlier grid layout
       (`minmax(0,1fr) auto minmax(0,1fr)`) let the auto math column
       eat the 1fr label gutter when math was wider than the line. */
    .body-text .math-system {
      display: flex;
      align-items: center;
      gap: 0.5em;
      margin: 1em 0;
      text-indent: 0;
    }
    .body-text .math-system-rows {
      flex: 1 1 0;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      align-items: center;
    }
    .body-text .math-system-rows .math-system-row {
      text-indent: 0;
      text-align: center;
      max-width: 100%;
    }
    /* Cancel KaTeX's default block margins so multi-row systems sit
       tight inside the flex column rather than picking up an extra
       1em of leading per row. */
    .body-text .math-system-rows .katex-display {
      margin: 0;
    }
    .body-text .math-system-label {
      flex: 0 0 auto;
      text-align: right;
      white-space: nowrap;
    }


    .xref-list {
      list-style: none;
      padding: 0;
      margin: 0;
      columns: 2;
      column-gap: 2em;
    }

    .xref-item {
      padding: 2px 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .xref-item.unresolved {
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      background: rgba(139, 115, 85, 0.08);
      border-radius: 2px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .segments {
      display: grid;
      gap: 12px;
    }

    .segment {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafbfc;
    }

    .segment-meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .message {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .error {
      color: var(--unresolved);
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    details summary {
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .article-image {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: var(--panel);
    }

    .article-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .article-image figcaption {
      padding: 8px 10px;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .article-image figcaption.filename {
      color: var(--muted);
      font-size: 0.78rem;
      font-style: normal;
      word-break: break-all;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.93rem;
      border: 1px solid #c4b49a;
    }

    /* Chemistry-layout tables: spatial diagrams of 2-D reaction
       schemes (FULMINIC ACID, POLYMETHYLENES, …).  Strip the data-
       table chrome — no borders, no full-width stretch — and centre
       the grid like a math display.  Cells flow on a single text
       baseline so the angle-bracket valence glyphs (⟨ / ⟩) sit
       inline with atom labels and arrows. */
    .chem-grid {
      margin: 1em auto;
      border-collapse: collapse;
      border: none;
      font-size: 0.95rem;
      font-family: Georgia, "Times New Roman", serif;
    }
    .chem-grid td, .chem-grid th {
      border: none;
      padding: 0.1em 0.3em;
      vertical-align: middle;
      text-align: center;
      white-space: nowrap;
    }
    /* Internal-line variants of the valence chevron.  The Python
       emitter turns LangleIT.svg / RangleIT.svg into
       <span class="chem-bracket-it">❮</span> (or ❯), and the IB
       variant into <span class="chem-bracket-ib">…</span>.  The
       horizontal bar is drawn as a ::before pseudo-element so the
       glyph itself doesn't have to be a different Unicode point
       (none exists for these). */
    .chem-bracket-it, .chem-bracket-ib {
      display: inline-block;
      position: relative;
      line-height: 1;
      padding: 0 1px;
    }
    .chem-bracket-it::before {
      content: "";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      border-top: 1px solid currentColor;
    }
    .chem-bracket-ib::after {
      content: "";
      display: block;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-bottom: 1px solid currentColor;
    }

    /* Figure-tables = the author's class-less {| ("layout, not data").  The
       producer mints no class, so a figure is recognized by the ABSENCE of one,
       :not([class]), and no output attribute is added.  POSITION rides on the
       carried margin:auto / {{ts|ma}}; the viewer's ONLY opinions here are
       VIEWPORT-RESPONSIVE (cf. wide-table): the figure fills the reading column,
       a floated one takes half so prose wraps, the image scales -- plus the
       figure basics it owns: borders off, vertical breathing room, column gap. */
.body-text table:not([class]) {
      margin: 1.2em 0;
      border-collapse: collapse;
      border: none;
      max-width: 100%;
    }
    /* A non-float figure fills the reading column.  A FLOAT honors its carried
       width:Npx — that's an inline style, so it beats this non-!important rule —
       and falls back to half-column only when the source carried no width, so the
       prose has room to wrap either way.  max-width:100% (above) still caps it. */
    .body-text table:not([class]):not([style*="float"]) {
      width: 100% !important;
    }
.body-text table:not([class])[style*="float"] {
      width: 50%;
      margin: 0.4em 0;
    }
.body-text table:not([class]) td,
.body-text table:not([class]) th {
      border: none;
      padding: 1px 12px;
    }
    /* An image carries NO layout of its own — its placement is its surrounding
       context (a «CTR» block, line-breaks, the table cell), per markers.py: "an
       image's layout is ... never a property of the image".  These are ONLY
       responsive caps.  Do NOT re-add display:block / margin:auto here — that made
       centering a property of the IMAGE, block-centering EVERY class-less-table
       image and so breaking inline glyphs (ABBREVIATIONS' per-symbol dropped onto
       its own centered line).  renderImg already centers align=center; the
       surrounding context centers the rest. */
.body-text table:not([class]):not([style*="float"]) img {
      max-height: none !important;
      max-width: 100% !important;
      height: auto;
    }
    /* An image that SHARES its row with a text cell (the chess end-game boards:
       a position beside its solution) must hold its OWN width.  Left shrinkable
       by max-width:100%, the auto-layout hands the width to the prose and
       squeezes the board to nothing; max-width:none makes it non-shrinkable, so
       the table reserves the board's column and the prose wraps in what's left.
       A board alone in its cell (:only-child) never hits this. */
    .body-text table:not([class]):not([style*="float"]) td:not(:only-child) img {
      max-width: none !important;
    }
    /* PLATE full-bleed: the source's fixed px (e.g. width:1000px, cell images
       at 450px) is the PRINT width.  On a plate page the column cap is gone
       (body.plate-page .page), so let the grid and its images fill the
       viewport — the table stretches and the cells scale proportionally,
       overriding formatCell's inline max-width:Npx cap (same !important
       pattern as the height cap above). */
    body.plate-page table:not([class]) {
      width: 100%;
    }
    body.plate-page table:not([class]) img {
      max-width: 100% !important;
      width: 100%;
    }

    /* Wide data tables: shown inline but horizontally scrollable, with an
       Expand button that pops them into a full-viewport modal. */
    .wide-table-wrap {
      margin: 1em 0;
      position: relative;
    }
    .wide-table-inline {
      overflow-x: auto;
      border: 1px solid #c4b49a;
      background: var(--panel);
    }
    .wide-table-inline .data-table {
      margin: 0;
      border: none;
      min-width: max-content;
    }
    .expand-table-btn {
      display: inline-block;
      font: inherit;
      font-size: 0.75rem;
      color: #8b7355;
      background: #ebe4d6;
      border: 1px solid #c4b49a;
      padding: 2px 10px;
      margin-bottom: 4px;
      border-radius: 3px;
      cursor: pointer;
      user-select: none;
    }
    .expand-table-btn:hover { background: #ddd4c4; }

    .wide-table-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 10, 0.6);
      z-index: 9000;
      padding: 2em;
      box-sizing: border-box;
    }
    .wide-table-modal.fullscreen {
      padding: 0;
    }
    .wide-table-modal-panel {
      position: absolute;
      inset: 2em;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid #c4b49a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      resize: both;
      min-width: 320px;
      min-height: 240px;
      max-width: calc(100vw - 2em);
      max-height: calc(100vh - 2em);
    }
    .wide-table-modal.fullscreen .wide-table-modal-panel {
      inset: 0;
      border: none;
      border-radius: 0;
      resize: none;
      max-width: 100vw;
      max-height: 100vh;
    }
    .wide-table-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #ebe4d6;
      border-bottom: 1px solid #c4b49a;
      font-weight: 600;
      color: #5a4a35;
    }
    .wide-table-modal-title {
      font-variant: small-caps;
      letter-spacing: 0.04em;
    }
    .wide-table-modal-btn {
      font: inherit;
      font-size: 1.1rem;
      line-height: 1;
      color: #8b7355;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .wide-table-modal-btn:hover {
      background: #ddd4c4;
      color: #3a2f20;
    }
    .wide-table-modal-actions {
      display: flex;
      gap: 2px;
    }
    .wide-table-modal-body {
      flex: 1;
      overflow: auto;
      padding: 1em;
    }
    .wide-table-modal-body .data-table {
      margin: 0;
      min-width: max-content;
    }
    .wide-table-trailing {
      margin-top: 1em;
      font-size: 0.9rem;
      color: #555;
    }

    /* Tables are FAITHFUL to the scan: padding for legibility, no invented
       borders/shading.  The scans are mostly borderless and never shaded —
       alignment alone carries the structure. */
    .data-table td {
      padding: 5px 10px;
      vertical-align: top;
    }

    .data-table th {
      padding: 6px 10px;
      vertical-align: top;
      font-weight: normal;   /* scans show plain (not bold) headers */
    }

    /* `class="wikitable"` is a FULL GRID in MediaWiki -- render it as one.
       (AUSTRIA "Administrative Territories" reads as "header + total rules
       only" in the scan NOT because it's verticals-only, but because its data
       rows are <br>-collapsed into ONE row per column -- so a full grid draws
       rules around the two header rows, the single data block, and the total,
       with nothing between the <br> lines: exactly the scan.  The old
       verticals-only dropped those real header/total rules.) */
    .data-table.wikitable {
      border-collapse: collapse;
      border: 1px solid #c4b49a;          /* frame */
    }
    .data-table.wikitable td,
    .data-table.wikitable th {
      border: 1px solid #c4b49a;          /* full grid: the class MediaWiki renders */
    }

    .small-caps {
      font-variant: small-caps;
    }

    /* Centered display block — `{{center|...}}` and variants.  Mostly
       used for math equations and decorative title blocks.  Paragraph-
       level centering via text-align on a wrapping div. */
    .centered {
      text-align: center;
      margin: 0.5em 0;
    }

    /* {{float right}}/{{float left}} — margin-floated inline content
       (contributor-initial signatures like "(A. P. C.)", right-floated
       marginal status notes). */
    .float-right { float: right; margin-left: 1em; }
    .float-left  { float: left;  margin-right: 1em; }
    .underline { text-decoration: underline; }

    /* Sans-serif metalinguistic letter — source uses
       `{{sans-serif|…}}` to mark single letters being discussed AS
       LETTERS (alphabetic typography convention).  Distinguishes
       the letter "A" qua letter from the running word "A". */
    .sans-serif {
      font-family: "Helvetica", "Arial", sans-serif;
    }

    /* Explicit serif — `{{Serif|I}}` is the mirror of `{{sans-serif|…}}`.
       Mostly equivalent to default body font; the explicit class lets
       the viewer override if body font is ever changed. */
    .explicit-serif {
      font-family: "Georgia", "Times New Roman", serif;
    }

    /* Math-typography sizing: source uses `{{xx-larger|(}}` (200%) and
       `{{x-larger|[}}` (150%) for math grouping characters scaled up
       in tall equations (STEAM_ENGINE / ORDNANCE).  CSS scales the
       character without affecting line-height. */
    .size-xxl {
      font-size: 200%;
      line-height: 0.7;
    }
    .size-xl {
      font-size: 150%;
      line-height: 0.8;
    }
    /* Down-steps + plain larger — the symmetric other half of the size
       scale ({{smaller}}/{{sm}}→sm, {{x-smaller}}→xs, {{xx-smaller}}→xxs,
       {{larger}}→lg).  Inline citations / sub-captions / plate footers. */
    .size-lg  { font-size: 120%; }
    .size-sm  { font-size: 85%; }
    .size-xs  { font-size: 75%; }
    .size-xxs { font-size: 62%; }

    /* Horizontal rule — `{{bar|N}}` renders an N-em underline,
       typically for column-sum underlines in tables (AFRICA / GREAT
       BRITAIN territorial summaries). */
    .inline-bar {
      display: inline-block;
      border-bottom: 1px solid currentColor;
      vertical-align: middle;
    }

    /* Multi-row brace — `{{brace2|N|side}}` is the printed-source's
       N-row-tall vertical brace inside a table cell.  Render as the
       Unicode brace char scaled to roughly the cell's row height.
       Hypothesis pending (task #31) whether brace2-containing tables
       are actually outlines in disguise — until that's settled we
       preserve the brace as visible typography. */
    .brace2 {
      display: inline-block;
      font-size: 1.5em;
      line-height: 0.9;
      vertical-align: middle;
    }

    /* Display horizontal rule (vertical spacer) — `{{dhr|N%}}` adds
       block-level vertical space between sections (ABBEY) or inline
       between list items in cells (AFRICA tribal tables). */
    .dhr-block {
      display: block;
      height: 1em;
    }
    .dhr-inline {
      display: inline-block;
      width: 0;
      height: 1em;
    }

    /* Horizontally mirrored glyph — source uses
       `<span style="{{mirrorH}}">…</span>` in ALPHABET to show
       left-right-flipped letters of early/regional alphabets
       (Etruscan, Italic, Cleonae's reversed E).  The pipeline emits
       «MIRROR:…«/MIRROR»; we apply transform: scaleX(-1) here. */
    .mirror-h {
      display: inline-block;
      transform: scaleX(-1);
    }

    .verse {
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;

    /* Inline/cell verse — a «VERSE» inside prose, a table cell, or a «CTR».

       centering; but a centred container (a «CTR» wrapper, a centred figure cell)
       may still center the verse block AS A UNIT.  inline-block makes those two

    .cell-verse {

    /* EXCEPTION (title footnote): the ref NUMBER in the title H1 renders in TITLE
       font — a title-proportional superscript (1em inherits the heading size) —
       not the body 0.8rem.  The note popup (.fn-popup) keeps its standard 0.85rem,

      font-style: normal;

  <script>
    const app = document.getElementById("app");

    function toggleFnPopup(event, popupId) {
      event.stopPropagation();
      // Accept either a bare number (legacy: ``fnpop-${num}``) or the
      // unique popup ID emitted by ``renderFnMarker`` for shared-name
      // ref reuses (``fnpop-${num}-${instance}``). Numeric form keeps
      // existing call paths working.
      const id = (typeof popupId === "number") ? ('fnpop-' + popupId) : popupId;
      const popup = document.getElementById(id);
      if (!popup) return;
      const wasVisible = popup.classList.contains('visible');
      // Close all open popups
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
      if (!wasVisible) popup.classList.add('visible');
    }

    // Close popups when clicking elsewhere
    document.addEventListener('click', (ev) => {
      const expandBtn = ev.target.closest('.expand-table-btn');
      if (expandBtn) {
        ev.stopPropagation();
        openWideTableModal(expandBtn.dataset.wt);
        return;
      }
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
    });

    function openWideTableModal(id) {
      const src = wideTableSources[id];
      if (!src) return;
      const modal = document.createElement('div');
      modal.className = 'wide-table-modal';
      const trailingPart = src.trailing ? `<div class="wide-table-trailing">${src.trailing}</div>` : "";
      modal.innerHTML = `
        <div class="wide-table-modal-panel">
          <div class="wide-table-modal-header">
            <span class="wide-table-modal-title">Table (expanded view)</span>
            <span class="wide-table-modal-actions">
              <button class="wide-table-modal-btn js-fullscreen" title="Toggle full screen">⛶</button>
              <button class="wide-table-modal-btn js-close" title="Close">✕</button>
            </span>
          </div>
          <div class="wide-table-modal-body">${src.table}${trailingPart}</div>
        </div>`;
      const close = () => modal.remove();
      modal.querySelector('.js-close').onclick = close;
      const fsBtn = modal.querySelector('.js-fullscreen');
      fsBtn.onclick = () => {
        const full = modal.classList.toggle('fullscreen');
        fsBtn.textContent = full ? '⛶' : '⛶';
        fsBtn.title = full ? 'Exit full screen' : 'Full screen';
      };
      modal.addEventListener('click', (e) => {
        if (e.target === modal) close();
      });
      document.addEventListener('keydown', function escOnce(e) {
        if (e.key === 'Escape') {
          close();
          document.removeEventListener('keydown', escOnce);
        }
      });
      document.body.appendChild(modal);
    }

    // Math too wide to scale into the column at any usable font-size
    // (~6 markers corpus-wide; ALGEBRAIC FORMS big determinants,
    // NUMBER, RAILWAYS, DIFFERENCES — see
    // `tools/diagnostics/measure_math_widths.py`).  Render a compact
    // clickable placeholder in the body; the click opens a modal
    // that re-renders the math at a font-size that fits the viewport
    // (no scrollbar inside the modal — the math is scaled to fit).
    //
    // Each placeholder gets a unique id so the click handler can
    // recover the LaTeX without serialising it into HTML attributes.
    const _MATH_POPOUT_LATEX = {};
    let _mathPopoutCounter = 0;
    // Parse a MATH marker's `[hint]` slot — a comma-separated list of
    // build-time directives the producer baked in: `display` (block vs
    // inline, carried from the source `<math display="block">` / `\begin{…}`),
    // `fs=N` (in-column scale), `popout` (too wide → click-to-modal).  ONE
    // tokenizer so a combined hint (`display,fs=80`) parses everywhere; the
    // viewer reads displayMode off the carried token instead of guessing from
    // paragraph context.
    function openMathPopout(id) {
      const latex = _MATH_POPOUT_LATEX[id];
      if (!latex) return;
      const modal = document.createElement("div");
      modal.className = "math-popout-modal";
      const panel = document.createElement("div");
      panel.className = "math-popout-panel";
      const closeBtn = document.createElement("button");
      closeBtn.className = "math-popout-close";
      closeBtn.title = "Close (Esc)";
      closeBtn.textContent = "✕";
      panel.appendChild(closeBtn);
      const host = document.createElement("div");
      host.className = "math-popout-host";
      panel.appendChild(host);
      modal.appendChild(panel);
      const close = () => modal.remove();
      closeBtn.onclick = close;
      modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
      document.addEventListener("keydown", function escOnce(e) {
        if (e.key === "Escape") { close(); document.removeEventListener("keydown", escOnce); }
      });
      document.body.appendChild(modal);
      // Render at NATURAL size.  The math is unscalable — the whole
      // reason we routed to popout is that shrinking it produces
      // illegible glyphs.  Let the panel scroll horizontally if the
      // expression is wider than the viewport.  Trades the article-
      // column scrollbar (forbidden) for a modal scrollbar (clearly
      // a separate view, like the wide-table popout).
      if (typeof katex === "undefined") {
        host.textContent = latex;
        return;
      }
      host.style.fontSize = "100%";
      try {
        host.innerHTML = katex.renderToString(latex, {
          throwOnError: false, displayMode: true,
        });
      } catch (e) {
        host.textContent = latex;
      }
    }

    // Wide display-math: clipped at column boundary by CSS
    // (`.body-text .katex-display { overflow: hidden }` and
    // `.math-system-rows { overflow: hidden }`).  We exhausted every
    // CSS-based scaling option to do better — see memory
    // `project_wide_math_dead_end.md`.  Pipeline-side LaTeX
    // rewriting (splitting `\begin{align}` rows at `&=` boundaries)
    // is the proposed real fix; not done yet.

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // Render an article title for display.  Titles may carry inline
    // formatting markers from the pipeline: `«B»…«/B»` (bold, mixed
    // bold/plain in multi-part bio titles), `«I»…«/I»` (italic — for
    // foreign-language alternates), `«SC»…«/SC»` (small-caps —
    // converted from `{{small-caps|…}}` and renders as small-caps
    // with drop-cap on the first letter).  Use everywhere we display
    // a title: H1, TOC, parent-plate link, search results, etc.
    function unescapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&#39;", "'")
        .replaceAll("&quot;", '"')
        .replaceAll("&lt;", "<")
        .replaceAll("&gt;", ">")
        .replaceAll("&amp;", "&");
    }

    // Gardiner Sign List -> Unicode Egyptian Hieroglyphs (U+13000 block)
    // Each category starts at a known base offset; sign number maps to base + (n-1).
    const GARDINER_BASES = {
      A:0x13000,B:0x13032,C:0x13037,D:0x13044,E:0x130A4,F:0x130C6,
      G:0x130F9,H:0x13131,I:0x1313B,K:0x1314D,L:0x13153,M:0x1315C,
      N:0x13189,O:0x131B3,P:0x131E7,Q:0x131F0,R:0x131F7,S:0x13210,
      T:0x1323D,U:0x13260,V:0x13286,W:0x132A9,X:0x132C2,Y:0x132CA,
      Z:0x132CF,Aa:0x132DB,
    };

    // Manuel de Codage phonetic abbreviations -> Gardiner codes
    const MDC_TO_GARDINER = {
      A:"G53",  // Abbreviation for the A-vulture (G53)
      H:"O4",   // reed shelter
      S:"S29",  // folded cloth
      s:"S29",
      t:"X1",   // bread loaf
      q:"Q3",   // stool
      sw:"M23", // sedge
      pr:"O1",  // house
      anx:"S34",// ankh
      nH:"S3",  // Red Crown
      zA:"V17", // sa (protection)
      aA:"G25", // jabiru
      xpr:"L1", // scarab
      nDs:"N33",// grain
      Hm:"U36", // pestle
      Xrd:"A17",// child
      DA:"I10", // cobra
      "N35A":"N35","N35B":"N35","V10A":"V10", // variants
    };

    function gardinerToUnicode(code) {
      if (code.includes("*")) code = code.split("*")[0];
      // Try MdC abbreviation first
      if (MDC_TO_GARDINER[code]) code = MDC_TO_GARDINER[code];
      const m = code.match(/^([A-Z]a?)(\d+)$/);
      if (!m) return null;
      const base = GARDINER_BASES[m[1]];
      if (base == null) return null;
      const cp = base + parseInt(m[2]) - 1;
      return (cp >= 0x13000 && cp <= 0x1342F) ? cp : null;
    }

    function commonsUrl(filename) {
      // Full URLs (e.g. score images from upload.wikimedia.org) pass through
      if (filename.startsWith("http://") || filename.startsWith("https://")) return filename;
      let name = filename.replace(/ /g, "_");
      // Match the sanitization done by download_images.py when saving
      // to disk: characters illegal in Windows filenames are replaced
      // with `_`.  Keeps the viewer URL aligned with what's on S3.
      name = name.replace(/["<>|?*]/g, "_");
      // SVGs are rasterized to .svg.png by the download script
      if (name.toLowerCase().endsWith(".svg")) name += ".png";
      // One path, local and web: the files sit in data/images/ locally and deploy to the
      // same /data/images/ on S3, so there's no local-vs-web branch to adapt at runtime.
      return `/data/images/${encodeURIComponent(name)}`;
    }

    // THE one image render: an image is just an <img>, and the surrounding context
    // — a «CTR» block, fencing «BR»s, a <td> — does the layout, exactly as it does
    // for text.  Carried width is honored and capped to the column (max-width:100%);
    // a bare image renders at natural size.  align=right/left floats it; align=center
    // centers a standalone one; vertical-align:middle kills the inline-image baseline
    // gap so a caption sits tight under a centered figure.  No <figure>, no glyph-vs-
    // figure split — the producer carried the layout, we just emit the <img>.
    function renderImg(filename, meta, caption) {
      const fn  = unescapeHtml(filename);
      const url = fn.startsWith("http") ? fn : commonsUrl(fn);
      const alt = (caption || fn).replace(/«[^»]*»/g, "");
      let s = "max-width:100%;height:auto;vertical-align:middle;";
      if (meta.width)  s += `width:${meta.width}px;`;
      if (meta.height) s += `height:${meta.height}px;`;
      if      (meta.align === "right")  s += "float:right;margin:.4em 0 .5em 1.8em;";
      else if (meta.align === "left")   s += "float:left;margin:.4em 1.8em .5em 0;";
      else if (meta.align === "center") s += "display:block;margin:0 auto;";
      return `<img src="${url}" alt="${escapeHtml(alt)}" loading="lazy" style="${s}" />`;
    }

    // Block image marker grammar — mirrors britannica.markers.IMG_PARTS_RE.
    //   {{IMG:filename[|align=center|left|right][|width=N][|height=N][|caption]}}
    // group 1 filename, group 2 meta-block, group 3 caption.  The article
    // encodes this; the renderer is the sole decoder (see markers.py).
    const IMG_PARTS_SRC =
      "\\{\\{IMG:([^|}]+)" +
      "((?:\\|(?:align=(?:center|left|right)|width=\\d+|height=\\d+))*)" +
      "(?:\\|([^{}]*))?\\}\\}";
    const IMG_PARTS_RE_G = new RegExp(IMG_PARTS_SRC, "g");        // replace / exec-all
    const IMG_PARTS_RE = new RegExp(IMG_PARTS_SRC);              // first match anywhere
    const IMG_PARTS_RE_ANCHORED = new RegExp("^" + IMG_PARTS_SRC + "$");

    function parseImgMeta(metaBlock) {
      const out = {};
      if (metaBlock) {
        const re = /(align|width|height)=([^|]+)/g;
        let m;
        while ((m = re.exec(metaBlock)) !== null)
          out[m[1]] = m[1] === "align" ? m[2] : parseInt(m[2], 10);
      }
      return out;
    }


    // Named refs (`«FN[NAME]:body«/FN»`) share a footnote number across
    // all anchors with the same name, matching Wikisource convention
    // (one entry in the footer list, N superscripts in body text).
    // The first anchor per name uses unsuffixed IDs; reuses get a
    // ``-${instance}`` suffix so each anchor's popup is independently
    // addressable. The back-link from the footer list keeps targeting
    // the unsuffixed (first) anchor.
    const ScanMode = (() => {
      const KEY = "viewer.scanMode";
      const btn = document.getElementById("scanToggle");
      const pane = document.getElementById("scanPane");
      let active = localStorage.getItem(KEY) === "1";
      let leafMap = null;
      let loadingPromise = null;
      let printedToLeaf = {};
      let currentLeaf = null;
      let currentArticle = null;
      let scrollHandler = null;

      function loadMap() {
        if (loadingPromise) return loadingPromise;
        const url = IS_LOCAL
          ? "/data/derived/printed_pages_leaf.json"
          : "/data/printed_pages_leaf.json";
        loadingPromise = fetch(url)
          .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
          .then(d => { leafMap = d; })
          .catch(() => { leafMap = {}; });
        return loadingPromise;
      }

      function buildIndex(article) {
        printedToLeaf = {};
        if (!leafMap) return;
        const vmap = leafMap[String(article.volume)];
        if (!vmap || !article.leaf_start || !article.leaf_end) return;
        for (let leaf = article.leaf_start; leaf <= article.leaf_end; leaf++) {
          const p = vmap[String(leaf)];
          if (typeof p === "number" && !(p in printedToLeaf)) {
            printedToLeaf[p] = leaf;
          }
        }
      }

      function urlForLeaf(vol, leaf) {
        const padVol = String(vol).padStart(2, "0");
        const padLeaf = String(leaf).padStart(4, "0");
        const name = `vol${padVol}_leaf${padLeaf}.jpg`;
        return IS_LOCAL ? `/data/derived/scans/${name}` : `/data/scans/${name}`;
      }

      function showLeaf(leaf) {
        if (!currentArticle || leaf == null || leaf === currentLeaf) return;
        currentLeaf = leaf;
        const img = new Image();
        img.alt = `Volume ${currentArticle.volume}, leaf ${leaf}`;
        img.onload = () => {
          if (currentLeaf !== leaf) return;  // newer load won the race
          pane.innerHTML = "";
          pane.appendChild(img);
          pane.scrollTop = 0;
        };
        img.onerror = () => {
          if (currentLeaf !== leaf) return;
          pane.innerHTML = `<div class="scan-msg">Scan not available for leaf ${leaf}</div>`;
        };
        img.src = urlForLeaf(currentArticle.volume, leaf);
      }

      // Each "page-marker" anchors the START of a printed page. The
      // page currently dominating the viewport is the one whose marker
      // most recently passed the reading line (~1/3 down the viewport)
      // — i.e. the LATEST marker still above that line. Before any
      // marker has crossed it (article just opened), use the first.
      function findVisiblePage() {
        const markers = document.querySelectorAll('a.page-marker[data-page]');
        if (!markers.length) return null;
        const readingLine = window.innerHeight * 0.33;
        let active = markers[0];
        for (const m of markers) {
          const r = m.getBoundingClientRect();
          if (r.top <= readingLine) active = m;
          else break;
        }
        return parseInt(active.getAttribute("data-page"), 10);
      }

      function refresh() {
        if (!active || !currentArticle) return;
        const printed = findVisiblePage();
        if (printed != null && printedToLeaf[printed] != null) {
          showLeaf(printedToLeaf[printed]);
        } else if (currentLeaf == null && currentArticle.leaf_start) {
          showLeaf(currentArticle.leaf_start);
        }
      }

      function attachScroll() {
        if (scrollHandler) return;
        let pending = false;
        scrollHandler = () => {
          if (pending) return;
          pending = true;
          requestAnimationFrame(() => { pending = false; refresh(); });
        };
        window.addEventListener("scroll", scrollHandler, { passive: true });
      }

      function detachScroll() {
        if (!scrollHandler) return;
        window.removeEventListener("scroll", scrollHandler);
        scrollHandler = null;
      }

      async function setActive(on) {
        active = on;
        localStorage.setItem(KEY, on ? "1" : "0");
        btn.classList.toggle("active", on);
        document.body.classList.toggle("scan-mode", on);
        currentLeaf = null;
        if (on) {
          pane.innerHTML = `<div class="scan-msg">Loading scan…</div>`;
          await loadMap();
          if (currentArticle) buildIndex(currentArticle);
          attachScroll();
          refresh();
        } else {
          detachScroll();
          pane.innerHTML = `<div class="scan-msg">No scan loaded</div>`;
        }
      }

      btn.addEventListener("click", () => setActive(!active));
      if (active) btn.classList.add("active");

      return {
        onArticleRendered(article) {
          currentArticle = article;
          currentLeaf = null;
          if (!active) return;
          document.body.classList.add("scan-mode");
          loadMap().then(() => {
            buildIndex(article);
            attachScroll();
            refresh();
          });
        },
      };
    })();
    let unproofedPages = {};
    const wideTableSources = {};
    // Colliding anchor ids — a «SH» sharing a slug with a «SEC» (ALPS's
    // "Western Alps" is BOTH a major section and a later shoulder heading):
    // the first anchor per slug keeps `section-<slug>`, each reuse gets a `-N`
    // suffix.  Applied in the SAME document order in BOTH the TOC scan and the
    // body id-emit (below), so a TOC link lands on its OWN anchor instead of
    // the first same-slug one.  ONE rule, two callers.
    function sectionSlug(name) {
      return name.trim().toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    const TITLE_OPEN = "\u00abTITLE:";
    const TITLE_CLOSE = "\u00ab/TITLE\u00bb";

    // Block-element marker patterns the body can contain.  When a
    // paragraph mixes one of these with surrounding prose, the
    // renderer splits the paragraph at marker boundaries and renders
    // each chunk in isolation — block markers become block HTML, prose
    // chunks get their own ``<p>`` wrap.  This lets producers stop
    // emitting ``\n\n`` borders around their markers: source structure
    // (where the placeholder was) determines placement, the renderer
    // handles paragraph rendering regardless.
    //
    // IMG is NOT here.  An image is not block-by-nature: its placement is
    // its carried `align` — `inline` → an inline glyph in the prose flow;
    // otherwise → a `<figure>` whose block-ness the surrounding `«P»`/`«CTR»`
    // already expresses.  Listing it here chopped the prose around every
    // inline letterform image and wrapped the fragments in separate `<p>`s,
    // forcing the image onto its own line (ALPHABET's β/λ/σ glyphs).

    function articleFileNameFromTarget(target) {
      return `${String(target || "").trim().toLowerCase()}.json`;
    }

    function articleUrl(filename) {
      return BritannicaUrls.filenameToUrl(filename, IS_LOCAL);
    }

    function renderError(message) {
      app.innerHTML = `<div class="card"><div class="message error">${escapeHtml(message)}</div></div>`;
    }

    function scanUrl(article) {
      const back = encodeURIComponent(location.href);
      const base = IS_LOCAL ? 'scans.html' : '/scans.html';
      const start = article.leaf_start;
      const end = article.leaf_end;
      return `${base}?vol=${article.volume}&start=${start}&end=${end}&label=${encodeURIComponent(article.title)}&back=${back}`;
    }

    function hydrateMath(root) {
      // Python emits math as `.tex-math` placeholders carrying the LaTeX + display mode; run KaTeX
      // over them after the page is inserted — the same engine and cleaning the inline render used.
      // Popout links and the fs-scaling wrapper are already in the baked HTML; this fills the math.
      root.querySelectorAll(".tex-math").forEach(el => {
        const display = el.dataset.display === "1";
        const tmp = document.createElement("textarea");
        tmp.innerHTML = el.textContent;
        let raw = tmp.value.replace(/\\mbox\b/g, "\\text");
        // Display math also normalizes carried unicode spaces (the old renderDisplayMath did; the
        // inline path did NOT) — keep the split so production math stays byte-identical.
        if (display) raw = raw.replace(/[          ​]/g, " ");
        let html;
        try {
          html = (typeof katex === "undefined")
            ? `<code class="math-fallback">${escapeHtml(raw)}</code>`
            : katex.renderToString(raw, { throwOnError: false, displayMode: display });
        } catch (e) {
          html = `<code class="math-fallback">${escapeHtml(raw)}</code>`;
        }
        el.outerHTML = html;
      });
    }

    function fixScanHrefs(root, article) {
      // The scan `back` param is location.href — a runtime value, not bakeable — so Python bakes a
      // placeholder and we set the real scan href here.  Page markers carry data-page → &pinit=N;
      // the card's scan link is the bare base.
      const su = scanUrl(article);
      root.querySelectorAll('a[href*="scans.html"]').forEach(a => {
        const page = a.dataset.page;
        a.setAttribute("href", page ? `${su}&pinit=${page}` : su);
      });
    }

    function captureWideTables(root) {
      // The expand-table modal reads wideTableSources; with Python rendering the figure, populate
      // it from the DOM — the `.wide-table-inline` holds the full table.
      root.querySelectorAll(".wide-table-wrap").forEach(fig => {
        const btn = fig.querySelector(".expand-table-btn");
        const inline = fig.querySelector(".wide-table-inline");
        if (btn && inline) wideTableSources[btn.dataset.wt] = { table: inline.innerHTML, trailing: "" };
      });
    }

    function renderArticle(article) {
      currentVolume = article.volume || "?";
      currentScanUrl = scanUrl(article);
      unproofedPages = (article.source_quality && article.source_quality.unproofed_pages) ? article.source_quality.unproofed_pages : {};
      // Plate pages carry no marginal furniture — drop the reading-column cap (see body.plate-page CSS).
      document.body.classList.toggle("plate-page", article.article_type === "plate");
      // Python is the sole renderer now: insert its pre-rendered HTML, then hydrate math (KaTeX
      // over `.tex-math`) and fix up the runtime-only scan `back`.  The marker→HTML JS below is dead.
      app.innerHTML = article.rendered_html || "";
      hydrateMath(app);
      fixScanHrefs(app, article);
      captureWideTables(app);
      ScanMode.onArticleRendered(article);
    }

    async function loadArticle(path) {
      if (!path) {
        renderError("No article path provided.");
        return;
      }

      try {
        const [response] = await Promise.all([fetch(path), loadTopicMap()]);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} loading ${path}`);
        }

        const article = await response.json();
        // Derive filename from path so topicMap lookup works
        const fnMatch = path.match(/([^/]+\.json)$/);
        if (fnMatch) article.filename = fnMatch[1];
        renderArticle(article);

        // Update URL: production uses clean /article/{id}/{slug}, local uses ?article=
        // In both cases, preserve q / match params so search-result
        // links (viewer.html?article=…&q=term&match=3) survive the
        // rewrite and can drive the in-article search below.
        // Capture the #section-<slug> fragment BEFORE the URL rewrite below
        // strips it -- we still need it to scroll, and to keep in the URL.
        const hash = window.location.hash;
        const existingParams = new URLSearchParams(window.location.search);
        const preserved = new URLSearchParams();
        for (const k of ["q", "match"]) {
          const v = existingParams.get(k);
          if (v !== null) preserved.set(k, v);
        }
        const suffix = preserved.toString() ? "?" + preserved.toString() : "";
        if (!IS_LOCAL) {
          const cleanUrl = BritannicaUrls.jsonPathToCleanUrl(path, suffix);
          if (cleanUrl) {
            window.history.replaceState({}, "", cleanUrl + hash);
          }
        } else {
          const url = new URL(window.location.href);
          url.searchParams.set("article", path);
          // Delete + re-set preserved params so order is stable.
          for (const k of ["q", "match"]) url.searchParams.delete(k);
          for (const [k, v] of preserved) url.searchParams.set(k, v);
          window.history.replaceState({}, "", url);   // URL object keeps the hash
        }

        // Re-fire the browser's NATIVE fragment jump.  Its load-time attempt
        // ran against an empty page, and the URL rewrite above (a replaceState
        // during load) cancels the still-pending scroll.  Defer ONE frame so
        // layout is computed -- doing it synchronously here lands nowhere
        // (getBoundingClientRect is 0 before layout).  Then re-navigate to the
        // fragment: location.hash already equals it, so blank it via
        // replaceState (no scroll, no history entry) and reassign, an instant
        // native jump identical to the in-article TOC's <a href="#section-…">.
        if (hash && document.getElementById(hash.slice(1))) {
          const id = hash.slice(1);
          requestAnimationFrame(() => {
            history.replaceState(null, "", location.pathname + location.search);
            location.hash = id;
          });
        }
      } catch (error) {
        renderError(`Could not load article JSON from \"${path}\". ${error.message}`);
      }
    }

    // Determine article path: local uses ?article= param, production uses /article/{id}/{slug}
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE = IS_LOCAL ? "/data/derived/articles" : "/data/articles";
    const TOC_URL = IS_LOCAL ? "/data/derived/classified_toc.json" : "/data/classified_toc.json";

    // Reverse-index of classified_toc.json: filename → [{category, path}].
    // `path` is the full sub-tree trail (["Zoology","Systematic","Invertebrata"])
    // so deeper-nested leaves are addressable, not just level-2.
    let topicMap = null;
    async function loadTopicMap() {
      if (topicMap !== null) return topicMap;
      try {
        const resp = await fetch(TOC_URL);
        if (!resp.ok) { topicMap = {}; return topicMap; }
        const data = await resp.json();
        topicMap = {};
        function walk(cat, node, path) {
          const newPath = path.concat([node.name]);
          for (const art of node.articles || []) {
            if (!art.filename) continue;
            (topicMap[art.filename] = topicMap[art.filename] || [])
              .push({ category: cat, path: newPath });
          }
          for (const child of node.children || []) {
            walk(cat, child, newPath);
          }
        }
        for (const cat of data.categories || []) {
          for (const sub of cat.subsections || []) {
            walk(cat.name, sub, []);
          }
        }
      } catch (e) {
        topicMap = {};
      }
      return topicMap;
    }
    let initialPath = new URLSearchParams(window.location.search).get("article");
    if (!initialPath && !IS_LOCAL) {
      // Production: /article/16-0670-lighthouse/LIGHTHOUSE ->
      //   /data/articles/16-0670-lighthouse-LIGHTHOUSE.json
      // (stable IDs: {vol:02d}-{page:04d}-{section-slug}, durable across rebuilds)
      initialPath = BritannicaUrls.pathnameToJsonPath(
        window.location.pathname, DATA_BASE);
    }
    if (initialPath) {
      loadArticle(initialPath).then(() => {
        // If the URL carries ?q=…[&match=N], pre-populate the
        // in-article search box and jump to the Nth match. This is
        // how search.html / index.html's occurrence-click handoff
        // lands the reader right on the hit.
        const p = new URLSearchParams(window.location.search);
        const q = p.get("q");
        const matchParam = parseInt(p.get("match") || "1", 10);
        if (q) {
          articleSearchInput.value = q;
          runArticleSearch();
          const matches = document.querySelectorAll(".body-text .search-highlight");
          if (matches.length) {
            const n = Math.min(Math.max(1, matchParam || 1), matches.length);
            currentMatchIdx = n - 1;
            updateMatchNav();
          }
        }
      });
    }

    // In-article search
    const articleSearchInput = document.getElementById("articleSearch");
    const matchCountEl = document.getElementById("matchCount");
    const prevBtn = document.getElementById("prevMatch");
    const nextBtn = document.getElementById("nextMatch");
    const matchListEl = document.getElementById("matchList");
    let currentMatchIdx = -1;

    function buildMatchList() {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      matchListEl.innerHTML = "";
      if (matches.length === 0) {
        matchListEl.style.display = "none";
        return;
      }
      matchListEl.style.display = "block";
      // Group matches by parent paragraph to avoid duplicate snippets
      const seen = new Map();  // parent element → first match index
      matches.forEach((el, i) => {
        const parent = el.closest("p, td, blockquote, h3, li") || el.parentNode;
        if (seen.has(parent)) return;
        seen.set(parent, i);

        const fullText = parent.textContent || "";
        const matchText = el.textContent;
        const pos = fullText.indexOf(matchText);
        const ctxStart = Math.max(0, pos - 50);
        const ctxEnd = Math.min(fullText.length, pos + matchText.length + 50);
        // Highlight ALL occurrences of the query in the snippet
        const query = articleSearchInput.value.trim();
        const snippetRaw = (ctxStart > 0 ? "\u2026" : "") +
          fullText.slice(ctxStart, ctxEnd) +
          (ctxEnd < fullText.length ? "\u2026" : "");
        const snippetHtml = snippetRaw.replace(
          new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"),
          "<mark>$1</mark>"
        );

        const item = document.createElement("div");
        item.className = "match-item";
        item.innerHTML = snippetHtml;
        item.addEventListener("click", () => {
          currentMatchIdx = i;
          updateMatchNav();
        });
        matchListEl.appendChild(item);
      });
    }

    function updateMatchNav() {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      const total = matches.length;
      if (total === 0) {
        matchCountEl.textContent = "No matches";
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        matchListEl.style.display = "none";
        currentMatchIdx = -1;
        return;
      }
      prevBtn.style.display = "";
      nextBtn.style.display = "";
      matchCountEl.textContent = `${currentMatchIdx + 1} of ${total}`;
      matches.forEach((m, i) => {
        m.classList.toggle("search-highlight-current", i === currentMatchIdx);
      });
      // Update active state in match list
      matchListEl.querySelectorAll(".match-item").forEach((item, i) => {
        item.classList.toggle("active", i === currentMatchIdx);
      });
      if (currentMatchIdx >= 0 && currentMatchIdx < total) {
        matches[currentMatchIdx].scrollIntoView({ behavior: "instant", block: "center" });
        // Scroll match list panel (not the page) to keep active item visible
        const activeItem = matchListEl.querySelector(".match-item.active");
        if (activeItem) {
          const listTop = matchListEl.scrollTop;
          const listHeight = matchListEl.clientHeight;
          const itemTop = activeItem.offsetTop - matchListEl.offsetTop;
          if (itemTop < listTop || itemTop + activeItem.offsetHeight > listTop + listHeight) {
            matchListEl.scrollTop = itemTop - listHeight / 2;
          }
        }
      }
    }

    function goToMatch(delta) {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      if (!matches.length) return;
      currentMatchIdx = (currentMatchIdx + delta + matches.length) % matches.length;
      updateMatchNav();
    }

    prevBtn.addEventListener("click", () => goToMatch(-1));
    nextBtn.addEventListener("click", () => goToMatch(1));

    function runArticleSearch() {
      const query = articleSearchInput.value.trim();
      lastSearchedQuery = query;
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;

      // Remove existing highlights
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();

      if (!query) {
        matchCountEl.textContent = "";
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        matchListEl.style.display = "none";
        matchListEl.innerHTML = "";
        currentMatchIdx = -1;
        return;
      }

      // Walk text nodes and highlight matches
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");

      function highlightNode(node) {
        if (node.nodeType === 3) {
          const text = node.textContent;
          if (regex.test(text)) {
            regex.lastIndex = 0;
            const span = document.createElement("span");
            span.innerHTML = text.replace(regex, (match) => {
              return `<span class="search-highlight">${match}</span>`;
            });
            node.parentNode.replaceChild(span, node);
          }
        } else if (node.nodeType === 1 && !node.classList?.contains("search-highlight")) {
          Array.from(node.childNodes).forEach(highlightNode);
        }
      }

      highlightNode(bodyEl);
      buildMatchList();
      currentMatchIdx = -1;
      // Show count and list but don't scroll — let the user pick a match
      const total = document.querySelectorAll(".body-text .search-highlight").length;
      matchCountEl.textContent = total ? `${total} match${total !== 1 ? "es" : ""}` : "No matches";
      prevBtn.style.display = total ? "" : "none";
      nextBtn.style.display = total ? "" : "none";
    }

    articleSearchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const query = articleSearchInput.value.trim();
        if (!query) {
          // Empty query: clear everything
          runArticleSearch();
          return;
        }
        const matches = document.querySelectorAll(".body-text .search-highlight");
        if (matches.length === 0) {
          // First Enter: run the search (no scroll)
          runArticleSearch();
        } else {
          // Subsequent Enter: navigate/scroll
          goToMatch(e.shiftKey ? -1 : 1);
        }
      } else if (e.key === "Escape") {
        articleSearchInput.value = "";
        runArticleSearch();
        articleSearchInput.blur();
      }
    });

    // If query text changes from what was last searched, clear old results
    let lastSearchedQuery = "";
    articleSearchInput.addEventListener("input", () => {
      const current = articleSearchInput.value.trim();
      if (current === lastSearchedQuery) return;
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();
      matchCountEl.textContent = "";
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      matchListEl.style.display = "none";
      matchListEl.innerHTML = "";
      currentMatchIdx = -1;
    });
    // --- Top/bottom navigation arrows ---
    // --- Jump-to-article autocomplete ---
    (function() {
      const input = document.getElementById("jumpTo");
      const results = document.getElementById("jumpResults");
      let articles = null;
      let selected = -1;

      async function ensureIndex() {
        if (articles) return;
        const base = IS_LOCAL ? "/data/derived/articles" : "/data/articles";
        const resp = await fetch(`${base}/index.json`);
        const data = await resp.json();
        articles = data
          .filter(a => a.article_type === "article")
          .map(a => ({
            title: a.title,
            filename: a.filename,
            body_start: a.body_start || "",
          }));
      }

      function show(items) {
        selected = -1;
        if (!items.length) { results.style.display = "none"; return; }
        // Items may carry `_kind: "title" | "fulltext"` and `_snippet`
        // (for full-text hits). Title hits show body_start; full-text
        // hits show a snippet with the match.
        results.innerHTML = items.slice(0, 16).map((a, i) => {
          const kindBadge = a._kind === "fulltext"
            ? `<span style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-right:6px;">text</span>`
            : "";
          const sub = a._snippet
            ? `<div style="font-size:0.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a._snippet}</div>`
            : (a.body_start
               ? `<div style="font-size:0.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(a.body_start)}</div>`
               : "");
          return `<li data-idx="${i}" style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border);">
            <div>${kindBadge}${escapeHtml(a.title)}</div>
            ${sub}
          </li>`;
        }).join("");
        results.style.display = "block";
        results.querySelectorAll("li").forEach(li => {
          li.addEventListener("mousedown", e => {
            e.preventDefault();
            go(items[+li.dataset.idx]);
          });
        });
      }

      // Full-text search state (async, debounced)
      const MEILI_URL = IS_LOCAL ? "http://localhost:7700" : "/search-api";
      const MEILI_KEY = IS_LOCAL
        ? "britannica-dev-key"
        : "24e84cf3ca3b70fe166637d797cbbdd0593ba3a27a47a9ed76b552c821199579";
      // Shared Meilisearch client — see /search-api.js.
      const searchClient = createSearchClient(MEILI_URL, MEILI_KEY);
      let ftToken = 0;
      let ftDebounce = null;
      let lastQuery = "";
      let lastTitleHits = [];

      function makeSnippet(body, q) {
        if (!body) return "";
        const lower = body.toLowerCase();
        const ql = q.toLowerCase();
        const idx = lower.indexOf(ql);
        if (idx < 0) return "";
        const start = Math.max(0, idx - 30);
        const end = Math.min(body.length, idx + ql.length + 50);
        const before = escapeHtml(body.slice(start, idx));
        const match = escapeHtml(body.slice(idx, idx + ql.length));
        const after = escapeHtml(body.slice(idx + ql.length, end));
        return (start > 0 ? "…" : "") + before + `<mark>${match}</mark>` + after + (end < body.length ? "…" : "");
      }

      async function runFulltext(q, myToken) {
        if (q.length < 3) return;
        try {
          const hits = await searchClient.searchFulltext(q, {
            limit: 8,
            excludeFilenames: new Set(lastTitleHits.map(a => a.filename)),
          });
          if (myToken !== ftToken) return;  // newer query in flight
          const ftHits = hits
            .map(h => ({
              title: h.title,
              filename: h.filename,
              _kind: "fulltext",
              _snippet: makeSnippet(h.body || "", q),
              _query: q,
            }))
            .slice(0, 8);
          show([...lastTitleHits, ...ftHits]);
        } catch (e) {
          // keep the title-only list
        }
      }

      function highlight(idx) {
        results.querySelectorAll("li").forEach((li, i) => {
          li.style.background = i === idx ? "var(--resolved-bg)" : "";
        });
      }

      function go(item) {
        results.style.display = "none";
        input.value = "";
        let url = articleUrl(item.filename);
        if (item._kind === "fulltext") {
          const q = encodeURIComponent(item._query || "");
          url += (url.includes("?") ? "&" : "?") + `q=${q}&match=1`;
        }
        location.href = url;
      }

      // 5-tier ranking for title autocomplete.
      //   0  exact title match           "PAUL"
      //   1  first word match            "PAUL, SAINT"
      //   2  any full-word match         "ST PAUL"
      //   3  title starts with query     "PAULINIUS"
      //   4  substring match anywhere    "SAO PAULO"
      function titleRank(title, q) {
        const t = title.toLowerCase();
        if (t === q) return 0;
        const words = t.split(/[\s,.'\u2019()\-]+/).filter(Boolean);
        if (words[0] === q) return 1;
        if (words.includes(q)) return 2;
        if (t.startsWith(q)) return 3;
        return 4;
      }

      input.addEventListener("input", async () => {
        await ensureIndex();
        const q = input.value.trim();
        const qLower = q.toLowerCase();
        if (!q) { results.style.display = "none"; return; }
        // Title matches (local, instant)
        const titleMatches = articles.filter(a => a.title.toLowerCase().includes(qLower));
        titleMatches.sort((a, b) => {
          const ra = titleRank(a.title, qLower);
          const rb = titleRank(b.title, qLower);
          return ra - rb || a.title.localeCompare(b.title);
        });
        lastTitleHits = titleMatches.slice(0, 8).map(a => ({
          title: a.title,
          filename: a.filename,
          body_start: a.body_start,
          _kind: "title",
        }));
        lastQuery = q;
        // Show title matches immediately; fulltext results stream in below.
        show(lastTitleHits);
        // Debounced full-text search
        if (ftDebounce) clearTimeout(ftDebounce);
        const myToken = ++ftToken;
        ftDebounce = setTimeout(() => runFulltext(q, myToken), 250);
      });

      input.addEventListener("keydown", e => {
        const items = results.querySelectorAll("li");
        if (e.key === "ArrowDown" && items.length) { e.preventDefault(); selected = Math.min(selected + 1, items.length - 1); highlight(selected); }
        else if (e.key === "ArrowUp" && items.length) { e.preventDefault(); selected = Math.max(selected - 1, 0); highlight(selected); }
        else if (e.key === "Enter") {
          e.preventDefault();
          if (items.length) {
            // Activate whichever row is highlighted, or the first one
            // if the user hasn't arrowed down. Matches the natural
            // "type, see results, press Enter" flow — no one expects
            // to have to arrow-select the top hit.
            const idx = selected >= 0 ? selected : 0;
            items[idx].dispatchEvent(new MouseEvent("mousedown"));
          } else {
            // Typeahead empty — send the user to the index page with
            // the query prefilled so they can run a full search.
            const q = input.value.trim();
            if (q) {
              input.blur();
              const base = IS_LOCAL ? "index.html" : "/index.html";
              location.href = `${base}?q=${encodeURIComponent(q)}`;
            }
          }
        }
        else if (e.key === "Escape") { results.style.display = "none"; }
      });

      input.addEventListener("blur", () => { setTimeout(() => results.style.display = "none", 150); });

      // iPad/touch fallback: blur isn't always fired when tapping
      // outside a focused input. Close on any outside pointer down.
      document.addEventListener("pointerdown", e => {
        if (e.target !== input && !results.contains(e.target)) {
          results.style.display = "none";
        }
      });
    })();
  </script>
