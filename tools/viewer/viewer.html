<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Egyptian+Hieroglyphs&display=swap">
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --unresolved: #b42318;
      --resolved-bg: #f5f0e8;
      --unresolved-bg: #fff1f1;
      --code-bg: #f0ebe3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    .meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input[type="text"] {
      flex: 1 1 380px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      background: var(--panel);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
    }

    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: var(--code-bg); }

    .body-text {
      font-size: 1.08rem;
      margin-left: 6.5em;
      margin-right: 160px;
      position: relative;
    }

    .body-text abbr {
      text-decoration: none;
      border-bottom: 1px dotted #8b7355;
      cursor: help;
    }

    @media (max-width: 900px) {
      .body-text {
        margin-right: 0;
      }
    }

    .body-text p {
      text-indent: 1.5em;
      margin: 0 0 0.5em 0;
      position: relative;
    }


    .body-text p:first-of-type {
      text-indent: 0;
    }

    /* Mid-paragraph figures: body prose wraps around the figure so
       the surrounding text stays in one <p>. All floated figures sit
       on the right edge and stack vertically when there are multiple;
       body text fills the left side uninterrupted. */
    .body-text figure.inline-float {
      float: right;
      clear: right;
      margin: 0.3em 0 0.4em 1.2em;
      max-width: 45%;
    }
    .body-text figure.inline-float img {
      max-width: 100%;
      height: auto;
    }
    .body-text figure.inline-float .float-legend {
      font-size: 0.85em;
      line-height: 1.4;
      margin-top: 0.3em;
      color: var(--muted);
    }
    .body-text figure.inline-float .float-legend div {
      padding-left: 1em;
      text-indent: -1em;
    }

    .body-text .katex-display {
      text-indent: 0;
      max-width: 100%;
      /* Clipping as a safety net for any equation that escaped the
         build-time width measurement (new LaTeX added since the last
         `measure_math_widths.py` run).  Normal display math fits at
         natural size; wide math is pre-scaled via `«MATH[fs=N]:`
         hints (see `britannica.math_widths`); really wide math uses
         the pop-out link (see `renderMathPopout`).  This `overflow:
         hidden` only matters for the uncached-residual case. */
      overflow: hidden;
    }
    /* Tier 2: scaled math.  `«MATH[fs=N]:` wraps the KaTeX render in
       a span with `font-size: N%`.  KaTeX em-based widths resolve to
       the smaller base so the math is rendered at the smaller size
       from initial paint (no thrash). */
    .math-scaled {
      display: inline-block;
    }
    /* Tier 3: popout link for math too wide to scale into the
       column.  Renders as an italic anchor; click opens the popout
       modal which renders at viewport-fitting font-size. */
    .math-popout-link {
      font-style: italic;
      color: #6b5a3f;
      text-decoration: underline dotted;
      cursor: zoom-in;
      font-size: 0.92em;
    }
    .math-popout-link:hover {
      color: #2c2416;
      background: #ebe4d6;
    }
    /* Standalone display-math context: render the popout link as a
       block element in the math column position, so it occupies the
       same visual slot the equation would have — centred, with
       display-math margins — rather than sitting inline within the
       surrounding prose paragraph.  An adjacent label (handled by
       the EQNGROUP renderer) still goes in the right-margin label
       column. */
    .math-popout-link.popout-display {
      display: block;
      text-align: center;
      margin: 1em 0;
    }
    .math-popout-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 10, 0.6);
      z-index: 9100;
      padding: 2em;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .math-popout-panel {
      position: relative;
      max-width: calc(100vw - 4em);
      max-height: calc(100vh - 4em);
      background: var(--panel);
      border: 1px solid #c4b49a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 2em 2.5em 1.5em;
      overflow: auto;
    }
    .math-popout-close {
      position: absolute;
      top: 6px;
      right: 8px;
      font: inherit;
      font-size: 1.1rem;
      line-height: 1;
      color: #8b7355;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .math-popout-close:hover { background: #ddd4c4; color: #3a2f20; }
    .math-popout-host .katex-display {
      overflow: visible;
      margin: 0;
    }
    /* KaTeX auto-numbers rows of `\begin{align}` with CSS counters
       — that's a KaTeX-rendering convention, not anything in the
       1911 source.  No EB1911 article uses explicit `\tag{}`, so
       suppressing the auto-numbering entirely is the right call. */
    .katex .eqn-num,
    .katex .mml-eqn-num {
      display: none !important;
    }

    /* Numbered display equation(s).  Three-column grid: a flexible
       gutter on the left, the math content centred in the auto
       column, and the (N) label flush right.  `minmax(0, 1fr)` on
       the side gutters lets the math shrink rather than pushing the
       label off the page when an equation is unusually wide; very
       wide rows then scroll horizontally inside katex-display's
       overflow-x: auto (set on .body-text .katex-display).
       align-items: center on the grid puts the label at the
       vertical centre of the row stack, matching the original
       publication's rowspan-spanning label placement. */
    /* Math-system layout — flex with reserved label space so wide
       math can never overlap the (N) label.  The math-rows column
       claims the remaining space (flex:1 with min-width:0 so it can
       shrink below its content's natural width) and clips overflow;
       scaleDisplayMath() shrinks the math via zoom on top to make
       the full formula visible at smaller size.  Earlier grid layout
       (`minmax(0,1fr) auto minmax(0,1fr)`) let the auto math column
       eat the 1fr label gutter when math was wider than the line. */
    .body-text .math-system {
      display: flex;
      align-items: center;
      gap: 0.5em;
      margin: 1em 0;
      text-indent: 0;
    }
    .body-text .math-system-rows {
      flex: 1 1 0;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      align-items: center;
    }
    .body-text .math-system-rows .math-system-row {
      text-indent: 0;
      text-align: center;
      max-width: 100%;
    }
    /* Cancel KaTeX's default block margins so multi-row systems sit
       tight inside the flex column rather than picking up an extra
       1em of leading per row. */
    .body-text .math-system-rows .katex-display {
      margin: 0;
    }
    .body-text .math-system-label {
      flex: 0 0 auto;
      text-align: right;
      white-space: nowrap;
    }


    .xref-list {
      list-style: none;
      padding: 0;
      margin: 0;
      columns: 2;
      column-gap: 2em;
    }

    .xref-item {
      padding: 2px 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .xref-item.unresolved {
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      background: rgba(139, 115, 85, 0.08);
      border-radius: 2px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .segments {
      display: grid;
      gap: 12px;
    }

    .segment {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafbfc;
    }

    .segment-meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .message {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .error {
      color: var(--unresolved);
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    details summary {
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .article-image {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: var(--panel);
    }

    .article-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .article-image figcaption {
      padding: 8px 10px;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .article-image figcaption.filename {
      color: var(--muted);
      font-size: 0.78rem;
      font-style: normal;
      word-break: break-all;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.93rem;
      border: 1px solid #c4b49a;
    }

    /* Chemistry-layout tables: spatial diagrams of 2-D reaction
       schemes (FULMINIC ACID, POLYMETHYLENES, …).  Strip the data-
       table chrome — no borders, no full-width stretch — and centre
       the grid like a math display.  Cells flow on a single text
       baseline so the angle-bracket valence glyphs (⟨ / ⟩) sit
       inline with atom labels and arrows. */
    .chem-grid {
      margin: 1em auto;
      border-collapse: collapse;
      border: none;
      font-size: 0.95rem;
      font-family: Georgia, "Times New Roman", serif;
    }
    .chem-grid td, .chem-grid th {
      border: none;
      padding: 0.1em 0.3em;
      vertical-align: middle;
      text-align: center;
      white-space: nowrap;
    }
    /* Internal-line variants of the valence chevron.  The Python
       emitter turns LangleIT.svg / RangleIT.svg into
       <span class="chem-bracket-it">❮</span> (or ❯), and the IB
       variant into <span class="chem-bracket-ib">…</span>.  The
       horizontal bar is drawn as a ::before pseudo-element so the
       glyph itself doesn't have to be a different Unicode point
       (none exists for these). */
    .chem-bracket-it, .chem-bracket-ib {
      display: inline-block;
      position: relative;
      line-height: 1;
      padding: 0 1px;
    }
    .chem-bracket-it::before {
      content: "";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      border-top: 1px solid currentColor;
    }
    .chem-bracket-ib::after {
      content: "";
      display: block;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-bottom: 1px solid currentColor;
    }

    /* Wide data tables: shown inline but horizontally scrollable, with an
       Expand button that pops them into a full-viewport modal. */
    .wide-table-wrap {
      margin: 1em 0;
      position: relative;
    }
    .wide-table-inline {
      overflow-x: auto;
      border: 1px solid #c4b49a;
      background: var(--panel);
    }
    .wide-table-inline .data-table {
      margin: 0;
      border: none;
      min-width: max-content;
    }
    .expand-table-btn {
      display: inline-block;
      font: inherit;
      font-size: 0.75rem;
      color: #8b7355;
      background: #ebe4d6;
      border: 1px solid #c4b49a;
      padding: 2px 10px;
      margin-bottom: 4px;
      border-radius: 3px;
      cursor: pointer;
      user-select: none;
    }
    .expand-table-btn:hover { background: #ddd4c4; }

    .wide-table-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 10, 0.6);
      z-index: 9000;
      padding: 2em;
      box-sizing: border-box;
    }
    .wide-table-modal.fullscreen {
      padding: 0;
    }
    .wide-table-modal-panel {
      position: absolute;
      inset: 2em;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid #c4b49a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      resize: both;
      min-width: 320px;
      min-height: 240px;
      max-width: calc(100vw - 2em);
      max-height: calc(100vh - 2em);
    }
    .wide-table-modal.fullscreen .wide-table-modal-panel {
      inset: 0;
      border: none;
      border-radius: 0;
      resize: none;
      max-width: 100vw;
      max-height: 100vh;
    }
    .wide-table-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #ebe4d6;
      border-bottom: 1px solid #c4b49a;
      font-weight: 600;
      color: #5a4a35;
    }
    .wide-table-modal-title {
      font-variant: small-caps;
      letter-spacing: 0.04em;
    }
    .wide-table-modal-btn {
      font: inherit;
      font-size: 1.1rem;
      line-height: 1;
      color: #8b7355;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .wide-table-modal-btn:hover {
      background: #ddd4c4;
      color: #3a2f20;
    }
    .wide-table-modal-actions {
      display: flex;
      gap: 2px;
    }
    .wide-table-modal-body {
      flex: 1;
      overflow: auto;
      padding: 1em;
    }
    .wide-table-modal-body .data-table {
      margin: 0;
      min-width: max-content;
    }
    .wide-table-trailing {
      margin-top: 1em;
      font-size: 0.9rem;
      color: #555;
    }

    .data-table td {
      padding: 5px 10px;
      border: 1px solid #ddd4c4;
      vertical-align: top;
    }

    .data-table tr:nth-child(even) td {
      background: #f7f3ec;
    }

    .data-table tr:nth-child(odd) td {
      background: var(--panel);
    }

    .data-table th {
      padding: 6px 10px;
      border: 1px solid #c4b49a;
      background: #ebe4d6;
      font-weight: 600;
      text-align: left;
      font-variant: small-caps;
      letter-spacing: 0.03em;
      color: #5c4a32;
    }

    .small-caps {
      font-variant: small-caps;
    }

    /* Centered display block — `{{center|...}}` and variants.  Mostly
       used for math equations and decorative title blocks.  Paragraph-
       level centering via text-align on a wrapping div. */
    .centered {
      text-align: center;
      margin: 0.5em 0;
    }

    /* Fine-print scholarly aside — `{{EB1911 fine print/s}}...{{/e}}`.
       Capture-now-decide-later: marker preserved end-to-end but no
       font-size change applied yet.  Future iteration can tune. */
    .fine-print {
      /* font-size: 0.95em;  uncomment when ready */
    }

    /* Sans-serif metalinguistic letter — source uses
       `{{sans-serif|…}}` to mark single letters being discussed AS
       LETTERS (alphabetic typography convention).  Distinguishes
       the letter "A" qua letter from the running word "A". */
    .sans-serif {
      font-family: "Helvetica", "Arial", sans-serif;
    }

    /* Explicit serif — `{{Serif|I}}` is the mirror of `{{sans-serif|…}}`.
       Mostly equivalent to default body font; the explicit class lets
       the viewer override if body font is ever changed. */
    .explicit-serif {
      font-family: "Georgia", "Times New Roman", serif;
    }

    /* Math-typography sizing: source uses `{{xx-larger|(}}` (200%) and
       `{{x-larger|[}}` (150%) for math grouping characters scaled up
       in tall equations (STEAM_ENGINE / ORDNANCE).  CSS scales the
       character without affecting line-height. */
    .size-xxl {
      font-size: 200%;
      line-height: 0.7;
    }
    .size-xl {
      font-size: 150%;
      line-height: 0.8;
    }

    /* Horizontal rule — `{{bar|N}}` renders an N-em underline,
       typically for column-sum underlines in tables (AFRICA / GREAT
       BRITAIN territorial summaries). */
    .inline-bar {
      display: inline-block;
      border-bottom: 1px solid currentColor;
      vertical-align: middle;
    }

    /* Multi-row brace — `{{brace2|N|side}}` is the printed-source's
       N-row-tall vertical brace inside a table cell.  Render as the
       Unicode brace char scaled to roughly the cell's row height.
       Hypothesis pending (task #31) whether brace2-containing tables
       are actually outlines in disguise — until that's settled we
       preserve the brace as visible typography. */
    .brace2 {
      display: inline-block;
      font-size: 1.5em;
      line-height: 0.9;
      vertical-align: middle;
    }

    /* Display horizontal rule (vertical spacer) — `{{dhr|N%}}` adds
       block-level vertical space between sections (ABBEY) or inline
       between list items in cells (AFRICA tribal tables). */
    .dhr-block {
      display: block;
      height: 1em;
    }
    .dhr-inline {
      display: inline-block;
      width: 0;
      height: 1em;
    }

    /* Horizontally mirrored glyph — source uses
       `<span style="{{mirrorH}}">…</span>` in ALPHABET to show
       left-right-flipped letters of early/regional alphabets
       (Etruscan, Italic, Cleonae's reversed E).  The pipeline emits
       «MIRROR:…«/MIRROR»; we apply transform: scaleX(-1) here. */
    .mirror-h {
      display: inline-block;
      transform: scaleX(-1);
    }

    .verse {
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      margin: 1em 2em;
      line-height: 1.6;
    }

    /* Definition-list rendering for glossary blocks (DOG "Glossary of
       Points of the Dog" et al.).  Term and definition flow inline on
       the same visual line; entries are stacked one per line via the
       ::after line-break trick.  Term italicisation comes from the
       embedded <i>…</i> markers, so no italic styling at the block. */
    dl.glossary {
      margin: 1em 0;
      line-height: 1.55;
    }
    dl.glossary dt {
      display: inline;
      margin: 0;
    }
    dl.glossary dd {
      display: inline;
      margin: 0 0 0 0.3em;
    }
    dl.glossary dd::after {
      content: "";
      display: block;
    }

    .page-marker {
      float: left;
      margin-left: -7em;
      width: 5.5em;
      text-align: right;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      font-size: 0.65rem;
      font-style: italic;
      color: #8b7355;
      padding-right: 1em;
      font-variant-numeric: tabular-nums;
      user-select: none;
      text-decoration: none;
    }
    a.page-marker:hover {
      color: var(--link);
      text-decoration: underline;
    }

    .page-marker.unproofed {
      color: #d04000;
      font-weight: 700;
    }
    a.page-marker.unproofed:hover {
      color: #b42318;
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .body-text { margin-left: 0; }
      .page-marker { display: none; }
    }

    .hieroglyph {
      font-family: "Noto Sans Egyptian Hieroglyphs", serif;
      font-size: 1.4em;
      vertical-align: middle;
      line-height: 1;
    }

    .hieroglyph-fallback {
      font-family: monospace;
      font-size: 0.85em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      color: var(--muted);
    }

    .text-block {
      font-family: inherit;
      font-size: inherit;
