  <script>
    const app = document.getElementById("app");

    function toggleFnPopup(event, popupId) {
      event.stopPropagation();
      // Accept either a bare number (legacy: ``fnpop-${num}``) or the
      // unique popup ID emitted by ``renderFnMarker`` for shared-name
      // ref reuses (``fnpop-${num}-${instance}``). Numeric form keeps
      // existing call paths working.
      const id = (typeof popupId === "number") ? ('fnpop-' + popupId) : popupId;
      const popup = document.getElementById(id);
      if (!popup) return;
      const wasVisible = popup.classList.contains('visible');
      // Close all open popups
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
      if (!wasVisible) popup.classList.add('visible');
    }

    // Close popups when clicking elsewhere
    document.addEventListener('click', (ev) => {
      const expandBtn = ev.target.closest('.expand-table-btn');
      if (expandBtn) {
        ev.stopPropagation();
        openWideTableModal(expandBtn.dataset.wt);
        return;
      }
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
    });

    function openWideTableModal(id) {
      const src = wideTableSources[id];
      if (!src) return;
      const modal = document.createElement('div');
      modal.className = 'wide-table-modal';
      const trailingPart = src.trailing ? `<div class="wide-table-trailing">${src.trailing}</div>` : "";
      modal.innerHTML = `
        <div class="wide-table-modal-panel">
          <div class="wide-table-modal-header">
            <span class="wide-table-modal-title">Table (expanded view)</span>
            <span class="wide-table-modal-actions">
              <button class="wide-table-modal-btn js-fullscreen" title="Toggle full screen">⛶</button>
              <button class="wide-table-modal-btn js-close" title="Close">✕</button>
            </span>
          </div>
          <div class="wide-table-modal-body">${src.table}${trailingPart}</div>
        </div>`;
      const close = () => modal.remove();
      modal.querySelector('.js-close').onclick = close;
      const fsBtn = modal.querySelector('.js-fullscreen');
      fsBtn.onclick = () => {
        const full = modal.classList.toggle('fullscreen');
        fsBtn.textContent = full ? '⛶' : '⛶';
        fsBtn.title = full ? 'Exit full screen' : 'Full screen';
      };
      modal.addEventListener('click', (e) => {
        if (e.target === modal) close();
      });
      document.addEventListener('keydown', function escOnce(e) {
        if (e.key === 'Escape') {
          close();
          document.removeEventListener('keydown', escOnce);
        }
      });
      document.body.appendChild(modal);
    }

    // Math too wide to scale into the column at any usable font-size
    // (~6 markers corpus-wide; ALGEBRAIC FORMS big determinants,
    // NUMBER, RAILWAYS, DIFFERENCES — see
    // `tools/diagnostics/measure_math_widths.py`).  Render a compact
    // clickable placeholder in the body; the click opens a modal
    // that re-renders the math at a font-size that fits the viewport
    // (no scrollbar inside the modal — the math is scaled to fit).
    //
    // Each placeholder gets a unique id so the click handler can
    // recover the LaTeX without serialising it into HTML attributes.
    const _MATH_POPOUT_LATEX = {};
    let _mathPopoutCounter = 0;
    function renderMathPopout(latex, isDisplay) {
      const id = "mp-" + (_mathPopoutCounter++);
      _MATH_POPOUT_LATEX[id] = latex;
      const cls = isDisplay
        ? "math-popout-link popout-display"
        : "math-popout-link";
      return (
        `<a class="${cls}" data-mp="${id}" `
        + `onclick="openMathPopout('${id}');return false;" href="#">`
        + `[equation ⤢ click to view]</a>`
      );
    }

    function openMathPopout(id) {
      const latex = _MATH_POPOUT_LATEX[id];
      if (!latex) return;
      const modal = document.createElement("div");
      modal.className = "math-popout-modal";
      const panel = document.createElement("div");
      panel.className = "math-popout-panel";
      const closeBtn = document.createElement("button");
      closeBtn.className = "math-popout-close";
      closeBtn.title = "Close (Esc)";
      closeBtn.textContent = "✕";
      panel.appendChild(closeBtn);
      const host = document.createElement("div");
      host.className = "math-popout-host";
      panel.appendChild(host);
      modal.appendChild(panel);
      const close = () => modal.remove();
      closeBtn.onclick = close;
      modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
      document.addEventListener("keydown", function escOnce(e) {
        if (e.key === "Escape") { close(); document.removeEventListener("keydown", escOnce); }
      });
      document.body.appendChild(modal);
      // Render at NATURAL size.  The math is unscalable — the whole
      // reason we routed to popout is that shrinking it produces
      // illegible glyphs.  Let the panel scroll horizontally if the
      // expression is wider than the viewport.  Trades the article-
      // column scrollbar (forbidden) for a modal scrollbar (clearly
      // a separate view, like the wide-table popout).
      if (typeof katex === "undefined") {
        host.textContent = latex;
        return;
      }
      host.style.fontSize = "100%";
      try {
        host.innerHTML = katex.renderToString(latex, {
          throwOnError: false, displayMode: true,
        });
      } catch (e) {
        host.textContent = latex;
      }
    }

    // Wide display-math: clipped at column boundary by CSS
    // (`.body-text .katex-display { overflow: hidden }` and
    // `.math-system-rows { overflow: hidden }`).  We exhausted every
    // CSS-based scaling option to do better — see memory
    // `project_wide_math_dead_end.md`.  Pipeline-side LaTeX
    // rewriting (splitting `\begin{align}` rows at `&=` boundaries)
    // is the proposed real fix; not done yet.
    function scaleDisplayMath() { /* no-op */ }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // Render an article title for display.  Titles may carry inline
    // formatting markers from the pipeline: `«B»…«/B»` (bold, mixed
    // bold/plain in multi-part bio titles), `«I»…«/I»` (italic — for
    // foreign-language alternates), `«SC»…«/SC»` (small-caps —
    // converted from `{{small-caps|…}}` and renders as small-caps
    // with drop-cap on the first letter).  Use everywhere we display
    // a title: H1, TOC, parent-plate link, search results, etc.
    function renderTitleMarkers(value) {
      let h = escapeHtml(value);
      h = h.replace(/«B»([\s\S]*?)«\/B»/g, "<b>$1</b>");
      h = h.replace(/«I»([\s\S]*?)«\/I»/g, "<i>$1</i>");
      h = h.replace(/«SC»([\s\S]*?)«\/SC»/g,
                    '<span class="small-caps">$1</span>');
      return h;
    }

    // H1-only title render: prefer the marked-up `title_display` and
    // render «FN» title footnotes (collected into the article's note
    // list).  Kept separate from renderTitleMarkers — which TOC / search
    // / link callers use — because renderFnMarker has collection
    // side-effects that don't belong in those contexts (and those
    // callers pass the plain title anyway, which has no «FN»).
    function renderArticleTitleDisplay(article) {
      let h = escapeHtml(article.title_display || article.title || "Untitled");
      // Footnote first — its body markers are handled by
      // formatFootnoteText inside renderFnMarker — so the title's own
      // «B»/«I»/«SC» convert afterwards without disturbing the note.
      h = h.replace(/«FN(?:\[([^\]]+)\])?:([\s\S]*?)«\/FN»/g,
                    (m, name, content) => renderFnMarker(name, content));
      h = h.replace(/«B»([\s\S]*?)«\/B»/g, "<b>$1</b>");
      h = h.replace(/«I»([\s\S]*?)«\/I»/g, "<i>$1</i>");
      h = h.replace(/«SC»([\s\S]*?)«\/SC»/g,
                    '<span class="small-caps">$1</span>');
      return h;
    }

    // Reverse of escapeHtml. Used when we need to pass captured text
    // (e.g. an image filename pulled from already-escaped paragraph
    // HTML) back into a URL or attribute context.
    function unescapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&#39;", "'")
        .replaceAll("&quot;", '"')
        .replaceAll("&lt;", "<")
        .replaceAll("&gt;", ">")
        .replaceAll("&amp;", "&");
    }

    // Gardiner Sign List -> Unicode Egyptian Hieroglyphs (U+13000 block)
    // Each category starts at a known base offset; sign number maps to base + (n-1).
    const GARDINER_BASES = {
      A:0x13000,B:0x13032,C:0x13037,D:0x13044,E:0x130A4,F:0x130C6,
      G:0x130F9,H:0x13131,I:0x1313B,K:0x1314D,L:0x13153,M:0x1315C,
      N:0x13189,O:0x131B3,P:0x131E7,Q:0x131F0,R:0x131F7,S:0x13210,
      T:0x1323D,U:0x13260,V:0x13286,W:0x132A9,X:0x132C2,Y:0x132CA,
      Z:0x132CF,Aa:0x132DB,
    };

    // Manuel de Codage phonetic abbreviations -> Gardiner codes
    const MDC_TO_GARDINER = {
      A:"G53",  // Abbreviation for the A-vulture (G53)
      H:"O4",   // reed shelter
      S:"S29",  // folded cloth
      s:"S29",
      t:"X1",   // bread loaf
      q:"Q3",   // stool
      sw:"M23", // sedge
      pr:"O1",  // house
      anx:"S34",// ankh
      nH:"S3",  // Red Crown
      zA:"V17", // sa (protection)
      aA:"G25", // jabiru
      xpr:"L1", // scarab
      nDs:"N33",// grain
      Hm:"U36", // pestle
      Xrd:"A17",// child
      DA:"I10", // cobra
      "N35A":"N35","N35B":"N35","V10A":"V10", // variants
    };

    function gardinerToUnicode(code) {
      if (code.includes("*")) code = code.split("*")[0];
      // Try MdC abbreviation first
      if (MDC_TO_GARDINER[code]) code = MDC_TO_GARDINER[code];
      const m = code.match(/^([A-Z]a?)(\d+)$/);
      if (!m) return null;
      const base = GARDINER_BASES[m[1]];
      if (base == null) return null;
      const cp = base + parseInt(m[2]) - 1;
      return (cp >= 0x13000 && cp <= 0x1342F) ? cp : null;
    }

    function commonsUrl(filename) {
      // Full URLs (e.g. score images from upload.wikimedia.org) pass through
      if (filename.startsWith("http://") || filename.startsWith("https://")) return filename;
      let name = filename.replace(/ /g, "_");
      // Match the sanitization done by download_images.py when saving
      // to disk: characters illegal in Windows filenames are replaced
      // with `_`.  Keeps the viewer URL aligned with what's on S3.
      name = name.replace(/["<>|?*]/g, "_");
      // SVGs are rasterized to .svg.png by the download script
      if (name.toLowerCase().endsWith(".svg")) name += ".png";
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      if (local) return `/data/derived/images/${encodeURIComponent(name)}`;
      return `/data/images/${encodeURIComponent(name)}`;
    }

    // Render an inline glyph (`{{IMG:fn|align=inline|width|height}}`) as
    // an inline `<img>`.  width/height are px ints (either may be null),
    // following MediaWiki sizing:
    //   width only  → width:Wpx, height auto
    //   height only → height:Hpx, width auto  (glyph sized to the line)
    //   both        → bounding box, aspect preserved
    //   neither     → line-height fallback for tiny glyphs
    // Glyph SVGs go through commonsUrl() which routes to .svg.png
    // raster on S3 / local derived images.
    function renderInlineGlyph(filename, width, height) {
      const url = commonsUrl(filename);
      let style;
      if (width && height) style = `max-width:${width}px;max-height:${height}px;width:auto;height:auto;`;
      else if (width) style = `width:${width}px;height:auto;`;
      else if (height) style = `height:${height}px;width:auto;`;
      else style = "height:1.2em;width:auto;";
      return `<img src="${url}" alt="${escapeHtml(filename)}" class="inline-glyph" loading="lazy" style="${style}vertical-align:middle;" />`;
    }

    // Block image marker grammar — mirrors britannica.markers.IMG_PARTS_RE.
    //   {{IMG:filename[|align=center|left|right][|width=N][|height=N][|caption]}}
    // group 1 filename, group 2 meta-block, group 3 caption.  The article
    // encodes this; the renderer is the sole decoder (see markers.py).
    const IMG_PARTS_SRC =
      "\\{\\{IMG:([^|}]+)" +
      "((?:\\|(?:align=(?:center|left|right|inline)|width=\\d+|height=\\d+))*)" +
      "(?:\\|([^{}]*))?\\}\\}";
    const IMG_PARTS_RE_G = new RegExp(IMG_PARTS_SRC, "g");        // replace / exec-all
    const IMG_PARTS_RE = new RegExp(IMG_PARTS_SRC);              // first match anywhere
    const IMG_PARTS_RE_ANCHORED = new RegExp("^" + IMG_PARTS_SRC + "$");

    function parseImgMeta(metaBlock) {
      const out = {};
      if (metaBlock) {
        const re = /(align|width|height)=([^|]+)/g;
        let m;
        while ((m = re.exec(metaBlock)) !== null)
          out[m[1]] = m[1] === "align" ? m[2] : parseInt(m[2], 10);
      }
      return out;
    }

    // Decode a {{TABLE:}} cell's ⟦align/colspan⟧ prefix — mirror of
    // markers.py TABLE_CELL_RE / parse_table_cell.  The producer carries the
    // cell's resolved alignment and group-header colspan here so the viewer
    // renders them mechanically instead of guessing from cell sparseness.
    const TABLE_CELL_RE = /^⟦([rc]?)(\d*)⟧/;
    function parseTableCell(cell) {
      const m = cell.match(TABLE_CELL_RE);
      if (!m) return { align: null, colspan: 1, content: cell };
      const align = m[1] === "r" ? "right" : (m[1] === "c" ? "center" : null);
      const colspan = m[2] ? parseInt(m[2], 10) : 1;
      return { align, colspan, content: cell.slice(m[0].length) };
    }
    function tableCellHtml(tag, cell) {
      const { align, colspan, content } = parseTableCell(cell.trim());
      const attrs = (colspan > 1 ? ` colspan="${colspan}"` : "") +
                    (align ? ` style="text-align:${align}"` : "");
      return `<${tag}${attrs}>${formatCell(content)}</${tag}>`;
    }

    // A figure is "wide" (full column, no 600px box) when its carried
    // width exceeds the default box.  The filename/attribution heuristic
    // is a FALLBACK only when no width was carried — older exports and
    // figure/table-embedded images that don't carry size yet.
    const IMG_DEFAULT_BOX_PX = 600;
    function imgIsWide(meta, filename, caption) {
      if (meta.width) return meta.width > IMG_DEFAULT_BOX_PX;
      return /(?:^|[\s_-])map(?:$|[\s._-])/i.test(filename || "")
          || /Justus Perthes|Emery Walker|Drawn and Engraved/i.test(caption || "");
    }
    // Source width sizes the figure box; CSS max-width:100% clamps it to
    // the column.  "" when no width carried (falls back to the CSS box).
    function imgWidthStyle(meta) {
      return meta.width ? ` style="max-width:${meta.width}px"` : "";
    }

    let footnoteCounter = 0;
    // Named refs (`«FN[NAME]:body«/FN»`) share a footnote number across
    // all anchors with the same name, matching Wikisource convention
    // (one entry in the footer list, N superscripts in body text).
    // The first anchor per name uses unsuffixed IDs; reuses get a
    // ``-${instance}`` suffix so each anchor's popup is independently
    // addressable. The back-link from the footer list keeps targeting
    // the unsuffixed (first) anchor.
    const namedFnNumbers = new Map();
    let fnAnchorInstance = 0;
    function renderFnMarker(name, content) {
      let num, refId, popupId;
      if (name && namedFnNumbers.has(name)) {
        num = namedFnNumbers.get(name);
        fnAnchorInstance++;
        refId = `fnref-${num}-${fnAnchorInstance}`;
        popupId = `fnpop-${num}-${fnAnchorInstance}`;
      } else {
        footnoteCounter++;
        num = footnoteCounter;
        if (name) namedFnNumbers.set(name, num);
        collectedFootnotes.push({ num, text: content });
        refId = `fnref-${num}`;
        popupId = `fnpop-${num}`;
      }
      return `<sup class="footnote-ref" id="${refId}"><a onclick="toggleFnPopup(event,'${popupId}');return false;" href="#">${num}</a><span class="fn-popup" id="${popupId}"><span class="fn-popup-num">${num}.</span>${formatFootnoteText(content)}</span></sup>`;
    }
    let currentVolume = "?";
    // Base scan URL for the current article — populated by
    // renderArticle(). Page-marker <a> tags append ``&pinit=<page>``
    // to land the scan viewer on their specific page instead of the
    // article's first page. Same URL as the top "View scan" link
    // with one extra param — no separate code path.
    let currentScanUrl = "";

    // Side-by-side scan view (opt-in). Toggle adds .scan-mode to body,
    // shrinks the article column, fills the right pane with the scan
    // image of the page currently in view, and tracks scroll. Sticky
    // across articles via localStorage.
    const ScanMode = (() => {
      const KEY = "viewer.scanMode";
      const btn = document.getElementById("scanToggle");
      const pane = document.getElementById("scanPane");
      let active = localStorage.getItem(KEY) === "1";
      let leafMap = null;
      let loadingPromise = null;
      let printedToLeaf = {};
      let currentLeaf = null;
      let currentArticle = null;
      let scrollHandler = null;

      function loadMap() {
        if (loadingPromise) return loadingPromise;
        const url = IS_LOCAL
          ? "/data/derived/printed_pages_leaf.json"
          : "/data/printed_pages_leaf.json";
        loadingPromise = fetch(url)
          .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
          .then(d => { leafMap = d; })
          .catch(() => { leafMap = {}; });
        return loadingPromise;
      }

      function buildIndex(article) {
        printedToLeaf = {};
        if (!leafMap) return;
        const vmap = leafMap[String(article.volume)];
        if (!vmap || !article.leaf_start || !article.leaf_end) return;
        for (let leaf = article.leaf_start; leaf <= article.leaf_end; leaf++) {
          const p = vmap[String(leaf)];
          if (typeof p === "number" && !(p in printedToLeaf)) {
            printedToLeaf[p] = leaf;
          }
        }
      }

      function urlForLeaf(vol, leaf) {
        const padVol = String(vol).padStart(2, "0");
        const padLeaf = String(leaf).padStart(4, "0");
        const name = `vol${padVol}_leaf${padLeaf}.jpg`;
        return IS_LOCAL ? `/data/derived/scans/${name}` : `/data/scans/${name}`;
      }

      function showLeaf(leaf) {
        if (!currentArticle || leaf == null || leaf === currentLeaf) return;
        currentLeaf = leaf;
        const img = new Image();
        img.alt = `Volume ${currentArticle.volume}, leaf ${leaf}`;
        img.onload = () => {
          if (currentLeaf !== leaf) return;  // newer load won the race
          pane.innerHTML = "";
          pane.appendChild(img);
          pane.scrollTop = 0;
        };
        img.onerror = () => {
          if (currentLeaf !== leaf) return;
          pane.innerHTML = `<div class="scan-msg">Scan not available for leaf ${leaf}</div>`;
        };
        img.src = urlForLeaf(currentArticle.volume, leaf);
      }

      // Each "page-marker" anchors the START of a printed page. The
      // page currently dominating the viewport is the one whose marker
      // most recently passed the reading line (~1/3 down the viewport)
      // — i.e. the LATEST marker still above that line. Before any
      // marker has crossed it (article just opened), use the first.
      function findVisiblePage() {
        const markers = document.querySelectorAll('a.page-marker[data-page]');
        if (!markers.length) return null;
        const readingLine = window.innerHeight * 0.33;
        let active = markers[0];
        for (const m of markers) {
          const r = m.getBoundingClientRect();
          if (r.top <= readingLine) active = m;
          else break;
        }
        return parseInt(active.getAttribute("data-page"), 10);
      }

      function refresh() {
        if (!active || !currentArticle) return;
        const printed = findVisiblePage();
        if (printed != null && printedToLeaf[printed] != null) {
          showLeaf(printedToLeaf[printed]);
        } else if (currentLeaf == null && currentArticle.leaf_start) {
          showLeaf(currentArticle.leaf_start);
        }
      }

      function attachScroll() {
        if (scrollHandler) return;
        let pending = false;
        scrollHandler = () => {
          if (pending) return;
          pending = true;
          requestAnimationFrame(() => { pending = false; refresh(); });
        };
        window.addEventListener("scroll", scrollHandler, { passive: true });
      }

      function detachScroll() {
        if (!scrollHandler) return;
        window.removeEventListener("scroll", scrollHandler);
        scrollHandler = null;
      }

      async function setActive(on) {
        active = on;
        localStorage.setItem(KEY, on ? "1" : "0");
        btn.classList.toggle("active", on);
        document.body.classList.toggle("scan-mode", on);
        currentLeaf = null;
        if (on) {
          pane.innerHTML = `<div class="scan-msg">Loading scan…</div>`;
          await loadMap();
          if (currentArticle) buildIndex(currentArticle);
          attachScroll();
          refresh();
        } else {
          detachScroll();
          pane.innerHTML = `<div class="scan-msg">No scan loaded</div>`;
        }
      }

      btn.addEventListener("click", () => setActive(!active));
      if (active) btn.classList.add("active");

      return {
        onArticleRendered(article) {
          currentArticle = article;
          currentLeaf = null;
          if (!active) return;
          document.body.classList.add("scan-mode");
          loadMap().then(() => {
            buildIndex(article);
            attachScroll();
            refresh();
          });
        },
      };
    })();
    let unproofedPages = {};
    let collectedFootnotes = [];
    let sectionCounter = 0;
    let collectedSections = [];
    let wideTableCounter = 0;
    const wideTableSources = {};
    // Track section keys emitted via top-level heading rules (SEC
    // marker, «SC»I.—Foo«/SC» major-section pattern). Used to
    // suppress duplicate top-level emissions for the same name.
    let emittedSectionKeys = new Set();
    let emittedSectionIds = new Set();
    // Pre-pass result: paragraph-index → section info.  Populated once
    // per article by detectSections() and consulted by renderParagraph
    // when emitting heading paragraphs.
    let sectionByIndex = new Map();
    // Pre-computed shoulder-heading metadata, in document order.
    // Each `«SH»…«/SH»` marker in the article body produces one entry
    // (id, display, isPointer); the SH replace step at render time
    // consumes them in order via shoulderCursor.  Pre-computing lets
    // SH anchors be slug-stable across rebuilds the same way SEC/SC
    // anchors are.
    let shoulderQueue = [];
    let shoulderCursor = 0;

    // Reserve a unique heading id derived from `slug`, falling back to
    // `fallback` when slug is empty. If the chosen id is already in
    // use within this article, append `-2`, `-3`, … Two distinct
    // headings whose titles differ only in punctuation collapse to the
    // same slug; suffixing keeps each anchor reachable.
    function reserveSectionId(slug, fallback) {
      let id = slug ? `section-${slug}` : fallback;
      if (!emittedSectionIds.has(id)) {
        emittedSectionIds.add(id);
        return id;
      }
      for (let n = 2; ; n++) {
        const candidate = `${id}-${n}`;
        if (!emittedSectionIds.has(candidate)) {
          emittedSectionIds.add(candidate);
          return candidate;
        }
      }
    }

    // One-pass section detection. Walks article paragraphs, identifies
    // every paragraph that's a top-level section heading via either
    // raw-source signal:
    //   • «SEC:name«/SEC»  pipeline-emitted absorbed-subsection marker
    //   • «SC»...«/SC»     small-caps heading (with optional outer
    //                      Roman prefix and optional inline body tail)
    // Assigns a stable slug-derived id, dedupes cross-signal duplicates
    // (an earlier SEC for "Cyanophyceae" suppresses a later SC for the
    // same section), and records each in `collectedSections` (TOC
    // source).  Returns Map<paraIdx, info>; renderParagraph consults
    // this map and emits the <h3> when the index matches.
    function detectSections(paragraphs) {
      const byIndex = new Map();
      // Reset section state up front; same article is never detected
      // twice in one render pass.
      emittedSectionKeys = new Set();
      emittedSectionIds = new Set();
      collectedSections = [];
      sectionCounter = 0;
      shoulderQueue = [];
      shoulderCursor = 0;

      const SEC_RE = /^«SEC:([^«]+)«\/SEC»$/;
      // Two paragraph shapes captured by the SC regex:
      //   • Standalone heading paragraph (group 4 = "")
      //   • Heading + inline body in same paragraph (group 4 = body)
      // Optional Roman prefix may sit OUTSIDE «SC» (group 1) or INSIDE
      // (group 3).
      const SC_RE = /^(?:([IVXLCA-Z]+\.)[\s—]*)?«SC»(([IVXLCA-Z]+[.—]\s*)?.*?)«\/SC»[.:]?—?(.*)$/s;
      const SH_RE = /«SH»(.*?)«\/SH»/gs;
      const FN_RE = /«FN(?:\[[^\]]+\])?:.*?«\/FN»/gs;
      const ROMAN_PREFIX_RE = /^[IVXLCA-Z]+\.[\s—]*/;
      const EXCLUDED_RE = /^(?:(?:References|Authorities|Bibliography|See also)\b|Fig\.)/i;
      // A standalone SC paragraph immediately followed by an extracted
      // table marker is a table caption (LIGHTHOUSE "Table II.",
      // UNITED STATES "West Central Massachusetts"), not a section
      // heading.  Python mirror: _TABLE_MARKER_PREFIX_RE in
      // src/britannica/export/sections.py.
      const TABLE_MARKER_PREFIX_RE = /^(?:\{\{TABLE:|«HTMLTABLE:)/;

      // Latest top-level heading we've identified — used to flag SH
      // margin pointers (a SH whose dehyphenated text matches the
      // containing section's name is the margin label for that
      // section, not a real subsection, so it's omitted from the TOC).
      let activeSectionKey = "";

      // Detect a SEC- or SC-shape heading on paragraph p.  Returns the
      // info object (and pushes it into byIndex/collectedSections,
      // updates activeSectionKey) or null when p isn't a heading.
      function detectHeading(p, i, paragraphs) {
        let m = p.match(SEC_RE);
        if (m) {
          const name = displaySectionName(m[1].trim());
          const key = sectionKey(name);
          if (emittedSectionKeys.has(key)) return null;
          const slug = sectionSlug(name);
          sectionCounter++;
          const id = reserveSectionId(slug, `section-${sectionCounter}`);
          emittedSectionKeys.add(key);
          collectedSections.push({ id, title: name, level: 1 });
          const info = { kind: "sec", id, slug, title: name, nameKey: key };
          byIndex.set(i, info);
          activeSectionKey = key;
          return info;
        }
        if (p.includes("{{IMG:") || p.includes("{{TABLE:")) return null;
        m = p.match(SC_RE);
        if (!m) return null;
        const outerRoman = m[1];
        const inner = m[2].trim();
        const innerRoman = m[3];
        const tail = (m[4] || "").trim();
        // For the with-inline-body shape, require a Roman prefix and
        // limit the SC inner content to <60 chars.  Without those
        // gates an inline «SC» label embedded in prose ("century «SC»
        // A.D.«/SC» …") would render as a heading.  Standalone shape
        // (whole paragraph = SC) is signal-strong enough on its own.
        const hasNumeral = outerRoman || (innerRoman && innerRoman.length > 0);
        const passesShapeGate = tail ? (hasNumeral && inner.length < 60) : true;
        if (!passesShapeGate) return null;
        // Standalone SC followed by a table marker = table caption.
        if (!tail && paragraphs && TABLE_MARKER_PREFIX_RE.test(paragraphs[i + 1] || "")) {
          return null;
        }
        // Stitch heading title with em-dash separator (matches EB1911
        // typography "I.—Geography").  Keep the raw form (with «FN»
        // markers intact) for heading rendering, but strip FN content
        // out of the slug + TOC title — otherwise an SC heading
        // wrapping a footnote (ARACHNIDA "Tabular Classification«FN:
        // …Pocock…«/FN» of the Arachnida") yields a 1000-char slug of
        // footnote text and a TOC entry full of noise.
        const rawTitle = outerRoman ? `${outerRoman}—${inner}` : inner;
        const title = rawTitle.replace(FN_RE, "").trim();
        if (EXCLUDED_RE.test(title)) return null;
        // Dedup key strips Roman prefix + FN markers so SEC:Foo
        // dedupes a later SC:I. Foo (and vice versa).
        const nameOnly = inner.replace(FN_RE, "").replace(ROMAN_PREFIX_RE, "").trim();
        const key = sectionKey(nameOnly);
        if (emittedSectionKeys.has(key)) return null;
        const slug = sectionSlug(title);
        sectionCounter++;
        const id = reserveSectionId(slug, `section-${sectionCounter}`);
        emittedSectionKeys.add(key);
        collectedSections.push({ id, title, level: 1 });
        const info = { kind: "sc", id, slug, title, rawTitle, nameKey: key, tail };
        byIndex.set(i, info);
        activeSectionKey = key;
        return info;
      }

      // Queue SH markers found in `text` (in the order they appear).
      // Margin pointers — SH whose dehyphenated text matches the most
      // recent top-level heading — get an id but aren't added to the
      // TOC, mirroring the previous render-time behavior.
      function scanShoulders(text) {
        let shMatch;
        SH_RE.lastIndex = 0;
        while ((shMatch = SH_RE.exec(text)) !== null) {
          const display = dehyphenateShoulder(shMatch[1].trim());
          const isPointer = activeSectionKey && sectionKey(display) === activeSectionKey;
          const slug = sectionSlug(display);
          sectionCounter++;
          const id = reserveSectionId(slug, `section-${sectionCounter}`);
          if (!isPointer) {
            collectedSections.push({ id, title: display, level: 2 });
          }
          shoulderQueue.push({ id, display, isPointer });
        }
      }

      for (let i = 0; i < paragraphs.length; i++) {
        const p = paragraphs[i];
        // Detect heading first so activeSectionKey reflects this
        // paragraph's heading (if any) before SHs in the same
        // paragraph are evaluated for margin-pointer status.
        detectHeading(p, i, paragraphs);
        // Scan for SH markers regardless — they can appear in heading
        // titles, inline-body tails, or plain prose paragraphs.
        scanShoulders(p);
      }

      return byIndex;
    }
    // Normalize a section name for dup-detection: lowercase,
    // alphanumerics only (so "Poly-morphism." matches "Polymorphism").
    function sectionKey(name) {
      return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    // Pretty-print a raw SEC name for display. Inserts a space at
    // lowercase→uppercase transitions so source artifacts like
    // "BrewingTrade" render as "Brewing Trade". Leaves names without
    // case transitions (Cyanophyceae, CLEMENT VII) untouched.
    function displaySectionName(name) {
      return name.replace(/([a-z])([A-Z])/g, "$1 $2");
    }

    // Strip line-wrap hyphens inside a shoulder-heading label:
    // "Poly-morphism." → "Polymorphism.". Only removes hyphens sitting
    // between two lowercase letters — a heuristic tuned for the
    // single-word or short-phrase shoulder headings EB1911 uses. Real
    // compound words ("self-help") would be incorrectly collapsed, but
    // those don't appear as shoulder-heading labels in the corpus.
    function dehyphenateShoulder(text) {
      return text.replace(/([a-z])-([a-z])/g, "$1$2");
    }

    function formatFootnoteText(text) {
      // Input may already be HTML-escaped (from formatCell or renderParagraph),
      // so don't escape again.
      let h = text;
      h = h.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
        const hasFile = g3 !== undefined;
        const target = hasFile ? g2 : g1;
        const display = hasFile ? g3 : g2;
        const filename = hasFile ? g1 : null;
        const href = filename ? articleUrl(filename) : `/search.html?q=${encodeURIComponent(target)}`;
        return `<a href="${href}" class="article-link" title="${target}">${display}</a>`;
      });
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      // Footnote bodies now keep image markers (glyphs in notes, e.g.
      // ALPHABET).  Render inline glyphs inline; any block image in a
      // note renders small/inline since a footnote is an inline context.
      h = h.replace(IMG_PARTS_RE_G, (match, filename, metaBlock, caption) => {
        const meta = parseImgMeta(metaBlock);
        if (meta.align === "inline")
          return renderInlineGlyph(unescapeHtml(filename), meta.width, meta.height);
        const url = commonsUrl(unescapeHtml(filename));
        return `<img src="${url}" alt="${escapeHtml(caption || filename)}" class="inline-glyph" loading="lazy" style="max-height:1.4em;vertical-align:middle;" />`;
      });
      return h;
    }

    function formatCell(text) {
      let h = escapeHtml(text);
      h = h.replace(/\u00abFN(?:\[([^\]]+)\])?:(.*?)\u00ab\/FN\u00bb/gs,
                    (match, name, content) => renderFnMarker(name, content));
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      h = h.replace(IMG_PARTS_RE_G, (match, filename, metaBlock, caption) => {
        const url = filename.startsWith("http") ? filename : commonsUrl(filename);
        return `<img src="${url}" alt="${escapeHtml(caption || filename)}" class="cell-image" loading="lazy" style="max-height:60px;" />`;
      });
      h = h.replace(/\[hieroglyph:\s*([^\]]+)\]/g, (match, codes) => {
        const rendered = codes.trim().split(/[:\s\-]+/).map(code => {
          code = code.replace(/\\/g, "");
          if (!code || code === "<" || code === ">" || code === "!" || code === "-") return "";
          const cp = gardinerToUnicode(code);
          if (cp) return `<span class="hieroglyph">&#x${cp.toString(16)};</span>`;
          return `<span class="hieroglyph-fallback" title="Gardiner ${code}">${code}</span>`;
        }).join("");
        return rendered || match;
      });
      // LaTeX math in cells — render inline with KaTeX.
      // Cell math is always inline (no displayMode) \u2014 scale hints
      // don't apply here.  Strip the optional `[hint]` if present.
      h = h.replace(/\u00abMATH(?:\[[^\]]*\])?:(.*?)\u00ab\/MATH\u00bb/gs, (_m, latex) => {
        const tmp = document.createElement("textarea");
        tmp.innerHTML = latex;
        const raw = tmp.value.replace(/\\mbox\b/g, "\\text");
        try {
          if (typeof katex !== "undefined") {
            return katex.renderToString(raw, { throwOnError: false, displayMode: false });
          }
        } catch(e) {
          console.warn("KaTeX cell error:", e.message);
        }
        return `<code class="math-fallback">${escapeHtml(raw)}</code>`;
      });
      // Multi-line VERSE inside a cell — newline-separated lines joined with <br>.
      h = h.replace(/\{\{VERSE:([\s\S]*?)\}VERSE\}/g, (_m, content) => {
        const lines = content.split("\n").filter(l => l.trim());
        return `<span class="cell-verse">${lines.join("<br>")}</span>`;
      });
      // Multi-line PRE inside a cell — single-column sub-tables are
      // emitted as «PRE:line\nline\nline«/PRE». Render as <br>-joined
      // inline content so they fit inside their containing cell.
      h = h.replace(/«PRE:([\s\S]*?)«\/PRE»/g, (_m, content) => {
        const lines = content.split("\n").filter(l => l.trim());
        return `<span class="cell-pre">${lines.join("<br>")}</span>`;
      });
      return h;
    }

    function sectionSlug(name) {
      return name.trim().toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    // Walk forward from ``start`` (which must point at ``«HTMLTABLE:``)
    // and return the index just past the matching ``«/HTMLTABLE»``,
    // respecting nesting.  Returns -1 if unbalanced (caller falls back
    // to leaving the markers visible).
    const HTMLTABLE_OPEN = "\u00abHTMLTABLE:";
    const HTMLTABLE_CLOSE = "\u00ab/HTMLTABLE\u00bb";
    // Chemistry-layout marker \u2014 same wire format as HTMLTABLE (content
    // is an HTML <table>) but a distinct class so the viewer drops the
    // data-table chrome (borders, padding) for the 2-D chemical-
    // reaction schemes that classify as CHEMISTRY_LAYOUT (FULMINIC
    // ACID, POLYMETHYLENES, PURIN, INDAZOLES, \u2026).  Emit side:
    // _process_chemistry_layout in _tables.py.
    const CHEM_OPEN = "\u00abCHEM:";
    const CHEM_CLOSE = "\u00ab/CHEM\u00bb";
    function findMarkerEnd(str, start, openMarker, closeMarker) {
      let depth = 1;
      let i = start + openMarker.length;
      while (i < str.length) {
        if (str.startsWith(openMarker, i)) {
          depth++;
          i += openMarker.length;
        } else if (str.startsWith(closeMarker, i)) {
          depth--;
          i += closeMarker.length;
          if (depth === 0) return i;
        } else {
          i++;
        }
      }
      return -1;
    }
    function findHtmlTableEnd(str, start) {
      return findMarkerEnd(str, start, HTMLTABLE_OPEN, HTMLTABLE_CLOSE);
    }
    function findChemEnd(str, start) {
      return findMarkerEnd(str, start, CHEM_OPEN, CHEM_CLOSE);
    }
    // Strip every ``«HTMLTABLE:``/``«/HTMLTABLE»`` marker in ``s`` —
    // used on the inside of a balanced block so nested tables render
    // as plain nested ``<table>`` elements.
    function stripHtmlTableMarkers(s) {
      return s.split(HTMLTABLE_OPEN).join("").split(HTMLTABLE_CLOSE).join("");
    }
    function stripChemMarkers(s) {
      return s.split(CHEM_OPEN).join("").split(CHEM_CLOSE).join("");
    }

    // Math-only paragraph: optional leading PAGE markers, one MATH
    // marker, optional trailing punctuation, optional `(N)` label,
    // optional trailing punctuation. Capture groups:
    //   [1] leading page markers
    //   [2] the «MATH:…«/MATH» marker
    //   [3] the label content WITHOUT parens (e.g. "6", "2a"),
    //       undefined when the equation is unlabeled.
    const MATH_PARA_RE = /^\s*((?:\x01PAGE:\d+\x01\s*)*)(«MATH(?:\[[^\]]*\])?:[\s\S]*?«\/MATH»)\s*[.,;:]?\s*(?:\(([^)]+)\)\s*)?\s*[.,;:]?\s*$/s;
    const EQNGROUP_OPEN = "«EQNGROUP»";
    const EQNGROUP_CLOSE = "«/EQNGROUP»";
    // Single labeled equation block, emitted by the {{ne}} template
    // handler. Wraps both math-marker and inline-text equation
    // content (the EB1911 source uses both for `{{ne||...|(N)}}`).
    // Capture groups:
    //   [1] leading PAGE markers (rendered as left-margin anchors)
    //   [2] the label content (without parens — already stripped by
    //       the pipeline; renderer adds parens back for display)
    //   [3] the equation content
    const EQN_PARA_RE = /^\s*((?:\x01PAGE:\d+\x01\s*)*)«EQN:([^»]*)»([\s\S]*?)«\/EQN»\s*$/;

    function renderParagraph(p, nextPara, sectionInfo) {
      // If this paragraph was tagged as a section heading by the
      // pre-pass (detectSections), emit the <h3> with its pre-assigned
      // stable id and skip the rest of the rendering pipeline.
      if (sectionInfo) {
        const { id, slug, title, rawTitle, kind, tail } = sectionInfo;
        if (kind === "sec") {
          return `<h3 class="section-heading" id="${id}" data-slug="${slug}">${escapeHtml(title)}</h3>`;
        }
        // SC: render the *raw* title (with «FN»/«I» markers intact)
        // through this same function so footnotes become superscript
        // links and italics render correctly.  The TOC-side `title` is
        // FN-stripped for clean URLs and TOC display.
        const headingHtml = renderParagraph(rawTitle || title);
        const bodyHtml = tail ? renderParagraph(tail) : "";
        return `<h3 class="section-heading" id="${id}" data-slug="${slug}">${headingHtml}</h3>${bodyHtml}`;
      }

      // Numbered display-math block (single equation OR an equation
      // system bundled at the merge phase).  Format:
      //   \u00abEQNGROUP\u00bb<row1>\n<row2>\n\u2026\u00ab/EQNGROUP\u00bb
      // where each row matches MATH_PARA_RE.  Exactly one row carries
      // a label; the rest are bare math.  The CSS grid centres the
      // label vertically against the math stack so a 6-row system
      // shows the label beside the visual middle, not the top.
      if (p.startsWith(EQNGROUP_OPEN) && p.endsWith(EQNGROUP_CLOSE)) {
        const inner = p.substring(
          EQNGROUP_OPEN.length, p.length - EQNGROUP_CLOSE.length);
        const rows = inner.split("\n");
        let labelText = null;
        const rowHtmls = [];
        // Render a LaTeX string as KaTeX displayMode with the same
        // entity decoding and whitespace normalisation as the prose
        // math path uses below.
        const renderDisplayMath = (latex, hint) => {
          const tmp = document.createElement("textarea");
          tmp.innerHTML = latex;
          const raw = tmp.value
            .replace(/\\mbox\b/g, "\\text")
            .replace(/[\u2002\u2003\u2004\u2005\u2006\u2007\u2008\u2009\u200a\u00a0\u200b]/g, " ");
          if (hint === "popout") {
            // EQNGROUP rows are always display-math context — the
            // popout link belongs in the math column, not inline.
            return renderMathPopout(raw, true);
          }
          let fsPct = null;
          if (hint) {
            const m = hint.match(/^fs=(\d+)$/);
            if (m) fsPct = parseInt(m[1], 10);
          }
          try {
            if (typeof katex === "undefined") {
              return `<code class="math-fallback">${escapeHtml(raw)}</code>`;
            }
            const result = katex.renderToString(raw, { throwOnError: false, displayMode: true });
            if (fsPct && fsPct > 0 && fsPct < 100) {
              return `<span class="math-scaled" style="font-size: ${fsPct}%;">${result}</span>`;
            }
            return result;
          } catch (e) {
            return `<code class="math-fallback">${escapeHtml(raw)}</code>`;
          }
        };
        const renderPageMarkers = (pm) => pm.replace(
          /\x01PAGE:(\d+)\x01/g, (_m, page) => {
            const isUnproofed = page in unproofedPages;
            const cls = isUnproofed ? "page-marker unproofed" : "page-marker";
            const title = isUnproofed
              ? `Volume ${currentVolume}, page ${page} (unproofed source) \u2014 click to view scan`
              : `Volume ${currentVolume}, page ${page} \u2014 click to view scan`;
            const href = `${currentScanUrl}&pinit=${page}`;
            return `<a class="${cls}" data-page="${page}" title="${title}" href="${href}">${currentVolume}:${page}</a>`;
          });
        for (const row of rows) {
          // EQN row (from {{ne||content|(N)}}): label sits in the
          // marker, content may be a single MATH marker (KaTeX
          // display) OR inline-text equation (formatCell handles
          // italic/bold/MATH/link substitutions for things like
          // `\u00abI\u00bbpv\u00ab/I\u00bb=RT`).
          const em = row.match(EQN_PARA_RE);
          if (em) {
            labelText = em[2];
            const pageMarkers = em[1] || "";
            const content = em[3].trim();
            const mathOnly = content.match(/^\u00abMATH(?:\[([^\]]*)\])?:([\s\S]*?)\u00ab\/MATH\u00bb\s*[.,;:]?\s*$/);
            const contentHtml = mathOnly
              ? renderDisplayMath(mathOnly[2], mathOnly[1])
              : formatCell(content);
            rowHtmls.push(
              `<div class="math-system-row">${renderPageMarkers(pageMarkers)}${contentHtml}</div>`);
            continue;
          }
          // MATH row: bare \u00abMATH:eq\u00ab/MATH\u00bb (with optional `[hint]`
          // attribute), optionally with `(label)` appended (the
          // wikitable rowspan-label path).
          const rm = row.match(MATH_PARA_RE);
          if (!rm) continue;
          if (rm[3] !== undefined) labelText = rm[3];
          const pageMarkers = rm[1] || "";
          // Parse `[hint]` and extract pure latex
          const marker = rm[2];
          const hintMatch = marker.match(/^\u00abMATH(?:\[([^\]]*)\])?:([\s\S]*?)\u00ab\/MATH\u00bb$/);
          const hint = hintMatch ? hintMatch[1] : null;
          const latex = hintMatch ? hintMatch[2] : marker.substring(
            "\u00abMATH:".length, marker.length - "\u00ab/MATH\u00bb".length);
          rowHtmls.push(
            `<div class="math-system-row">${renderPageMarkers(pageMarkers)}${renderDisplayMath(latex, hint)}</div>`);
        }
        const labelHtml = labelText
          ? `<div class="math-system-label">(${escapeHtml(labelText)})</div>`
          : "";
        return `<div class="math-system">` +
          `<div class="math-system-rows">${rowHtmls.join("")}</div>` +
          labelHtml +
          `</div>`;
      }
      // Single \u00abEQN:\u2026\u00ab/EQN\u00bb paragraphs are wrapped into \u00abEQNGROUP\u00bb
      // by the merge phase above so they share the multi-row
      // renderer and pick up any bare-MATH continuation rows.
      // Section-heading detection (SEC marker + standalone/with-body
      // SC variants) is handled by the detectSections pre-pass \u2014 see
      // the early-return guard at the top of this function.
      const imgMatch = p.match(IMG_PARTS_RE_ANCHORED);
      if (imgMatch) {
        const filename = imgMatch[1];
        const meta = parseImgMeta(imgMatch[2]);
        const caption = imgMatch[3] || "";
        if (meta.align === "inline")
          return renderInlineGlyph(filename, meta.width, meta.height);
        const url = commonsUrl(filename);
        const cls = "inline-image" + (imgIsWide(meta, filename, caption) ? " wide" : "");
        return `<figure class="${cls}"${imgWidthStyle(meta)}>
          <a href="${url}" target="_blank"><img src="${url}" alt="${escapeHtml(caption || filename)}" loading="lazy" /></a>
          ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ""}
        </figure>`;
      }
      // Render preformatted blocks (structural chemical formulas)
      // Hierarchical taxonomic / classificatory outline.  Pipeline
      // emits as `\u00abOUTLINE:\nN|content\nN|content\n\u2026\u00ab/OUTLINE\u00bb` where
      // N is the source indent depth (number of leading `:` characters
      // on the source line).  Render as a nested <ul>, mapping the
      // sparse source depths (typically 0, 2, 3, 4, 6, 8) onto dense
      // nesting levels (0, 1, 2, 3, 4, 5).
      const outlineMatch = p.match(/^\u00ab(PLATE_)?OUTLINE:([\s\S]*)\u00ab\/(?:PLATE_)?OUTLINE\u00bb$/);
      if (outlineMatch) {
        const isPlate = !!outlineMatch[1];
        const rawLines = outlineMatch[2].split("\n").filter(l => l.length > 0);
        const items = [];
        for (const ln of rawLines) {
          const m = ln.match(/^(\d+)\|(.*)$/);
          if (m) items.push({ depth: parseInt(m[1], 10), content: m[2] });
        }
        if (items.length) {
          // Densify depths: rank distinct values so 0/2/3/4 \u2192 0/1/2/3.
          const distinct = [...new Set(items.map(it => it.depth))].sort((a,b)=>a-b);
          const rank = new Map(distinct.map((d, i) => [d, i]));
          const rootClass = isPlate ? "outline plate-outline" : "outline";
          const out = [`<ul class="${rootClass}">`];
          let cur = 0;
          for (const it of items) {
            const lvl = rank.get(it.depth);
            while (cur < lvl) { out.push("<ul>"); cur++; }
            while (cur > lvl) { out.push("</ul>"); cur--; }
            out.push(`<li>${renderParagraph(it.content)}</li>`);
          }
          while (cur > 0) { out.push("</ul>"); cur--; }
          out.push("</ul>");
          return out.join("");
        }
      }
      const preMatch = p.match(/^\u00abPRE:([\s\S]*)\u00ab\/PRE\u00bb$/);
      if (preMatch) {
        let preContent = escapeHtml(preMatch[1]);
        // Process formatting markers inside preformatted blocks
        preContent = preContent.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
        preContent = preContent.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
        preContent = preContent.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
        // Use text-block style (wrapping) unless it looks like a structural formula
        const isFormula = /[─│┌┐└┘|\\\/]{3,}/.test(preMatch[1]);
        const cls = isFormula ? "structural-formula" : "text-block";
        return `<pre class="${cls}">${preContent}</pre>`;
      }
      // Render verse markers.  The verse handler returns early with a
      // complete HTML string, so the global B/I/SC replacements at the
      // bottom of renderParagraph never run on this content — apply
      // them inline here.  Without this, `«I»…«/I»` markers leaked
      // verbatim through the verse path (DOG glossary, MOLECULE
      // Lucretius quote, &c.).
      //
      // VERSE is also (mis)used by the pipeline for glossary-style
      // definition blocks where each line is `«I»term.«/I» definition`
      // (DOG "Glossary of Points of the Dog" is the canonical example —
      // the wikisource wraps it in a single-cell table containing a
      // <poem> block, the pipeline strips the table and emits VERSE).
      // Such blocks have no business styled as poetry (italic-block-
      // quote with a left border).  Detect the term-led pattern and
      // emit a definition list instead.
      const verseMatch = p.match(/^\{\{VERSE:([\s\S]*)\}VERSE\}$/);
      if (verseMatch) {
        const lines = verseMatch[1].split("\n").filter(l => l.trim());
        const applyMarkers = (s) => {
          let h = escapeHtml(s);
          h = h.replace(/«B»(.*?)«\/B»/gs, "<b>$1</b>");
          h = h.replace(/«I»(.*?)«\/I»/gs, "<i>$1</i>");
          h = h.replace(/«SC»(.*?)«\/SC»/gs,
                        '<span class="small-caps">$1</span>');
          return h;
        };
        // Glossary detection: at least 4 lines, AND ≥75% match the
        // `«I»term.«/I» definition` shape.  A plain poem rarely starts
        // every line with an italicised dotted term.
        const GLOSSARY_LINE = /^«I»[^«]+\.«\/I»\s+\S/;
        if (lines.length >= 4) {
          const hits = lines.filter(l => GLOSSARY_LINE.test(l)).length;
          if (hits / lines.length >= 0.75) {
            const items = lines.map(l => {
              const m = l.match(/^«I»([^«]+)«\/I»\s+(.*)$/);
              if (m) {
                return `<dt>${applyMarkers("«I»" + m[1] + "«/I»")}</dt>` +
                       `<dd>${applyMarkers(m[2])}</dd>`;
              }
              return `<dt></dt><dd>${applyMarkers(l)}</dd>`;
            }).join("");
            return `<dl class="glossary">${items}</dl>`;
          }
        }
        return `<blockquote class="verse">${lines.map(applyMarkers).join("<br>")}</blockquote>`;
      }
      // Render figure-legend markers (structured image legends emitted
      // by the image-layout subclass handlers). Format:
      //   {{LEGEND:### Subheading.
      //   A. First entry.
      //   B. Second entry.
      //   ### Another subheading.
      //   C. …}LEGEND}
      // Lines starting with "### " are subheadings; everything else
      // is an entry (letter-dot-text).
      const legendMatch = p.match(/^\{\{LEGEND:([\s\S]*)\}LEGEND\}$/);
      if (legendMatch) {
        const rawLines = legendMatch[1].split("\n").filter(l => l.trim());
        const parts = rawLines.map(line => {
          const s = line.trim();
          if (s.startsWith("### ")) {
            return `<h5 class="legend-subhead">${formatCell(s.slice(4))}</h5>`;
          }
          return `<div class="legend-entry">${formatCell(s)}</div>`;
        });
        return `<aside class="figure-legend">${parts.join("")}</aside>`;
      }
      // Render complex HTML tables (rowspan/colspan preserved).
      // Use balanced-match so an HTMLTABLE whose cell contains another
      // HTMLTABLE (e.g. INTERPOLATION's Everett-formula layout table)
      // doesn't stop at the inner ``«/HTMLTABLE»``.  ``«CHEM:`` is
      // the same wire format as HTMLTABLE; render through the same
      // pipeline but tag the outer ``<table>`` with ``chem-grid`` so
      // CSS can drop borders/padding for chemistry layouts.
      let htmlTableHit = null;
      let isChem = false;
      if (p.startsWith(HTMLTABLE_OPEN)) {
        const end = findHtmlTableEnd(p, 0);
        if (end !== -1) {
          htmlTableHit = {
            block: p.substring(0, end),
            trailing: p.substring(end).trim(),
            inner: p.substring(HTMLTABLE_OPEN.length, end - HTMLTABLE_CLOSE.length),
          };
        }
      } else if (p.startsWith(CHEM_OPEN)) {
        const end = findChemEnd(p, 0);
        if (end !== -1) {
          isChem = true;
          htmlTableHit = {
            block: p.substring(0, end),
            trailing: p.substring(end).trim(),
            inner: p.substring(CHEM_OPEN.length, end - CHEM_CLOSE.length),
          };
        }
      }
      if (htmlTableHit) {
        const tableBlock = htmlTableHit.block;
        const trailing = htmlTableHit.trailing;
        // Strip any nested HTMLTABLE/CHEM markers so nested tables
        // render as native nested ``<table>`` elements.
        const inner = stripChemMarkers(
          stripHtmlTableMarkers(htmlTableHit.inner));
        const outerClass = isChem ? "chem-grid" : "data-table";
        let t = inner.replace("<table>", `<table class="${outerClass}">`);
        // Process <caption> contents through formatCell so internal
        // markers (italic, small-caps, links) render as HTML rather
        // than leaking their «…» form.
        t = t.replace(/<caption>([\s\S]*?)<\/caption>/g,
          (_m, content) => `<caption>${formatCell(content)}</caption>`);
        // Hoist any page markers inside cells to the row level — render
        // them as a floated span at the start of the row's first cell so
        // they land in the left margin alongside body-paragraph markers,
        // instead of disrupting cell-content alignment.
        const makePageSpan = (pg) => {
          const unproofed = pg in unproofedPages;
          const cls = unproofed ? "page-marker unproofed" : "page-marker";
          const title = unproofed
            ? `Volume ${currentVolume}, page ${pg} (unproofed source) — click to view scan`
            : `Volume ${currentVolume}, page ${pg} — click to view scan`;
          const href = `${currentScanUrl}&pinit=${pg}`;
          return `<a class="${cls}" data-page="${pg}" title="${title}" href="${href}">${currentVolume}:${pg}</a>`;
        };
        // Parse as DOM so nested <table>s don't confuse the row/cell
        // walk — regex can't bracket-match. Walk only the OUTER
        // table's direct cell descendants and format their text-node
        // content (leaving nested table DOM untouched).
        let maxCols = 0;
        {
          const doc = new DOMParser().parseFromString(t, "text/html");
          const outer = doc.querySelector(`table.${outerClass}`) || doc.querySelector("table");
          if (outer) {
            // Walk all descendants of a cell and format its text
            // nodes through formatCell. Nested tables get the same
            // treatment — their cells' markers (MATH/FN/IMG/etc.)
            // need rendering too. The HTMLTABLE placeholder stripping
            // earlier in render() collapsed nested «HTMLTABLE»
            // markers to bare <table> elements, so their content is
            // still unformatted raw marker text.
            function formatCellNode(node, pageMarkers) {
              for (const child of Array.from(node.childNodes)) {
                if (child.nodeType === 3) {
                  const txt = child.nodeValue.replace(
                    /\x01PAGE:(\d+)\x01/g, (_x, pg) => {
                      pageMarkers.push(pg); return "";
                    });
                  if (!txt) { child.remove(); continue; }
                  const html = formatCell(txt);
                  const tmp = document.createElement("span");
                  tmp.innerHTML = html;
                  const frag = document.createDocumentFragment();
                  while (tmp.firstChild) frag.appendChild(tmp.firstChild);
                  child.replaceWith(frag);
                } else if (child.nodeType === 1) {
                  formatCellNode(child, pageMarkers);
                }
              }
            }
            for (const tr of Array.from(outer.rows)) {
              const pageMarkers = [];
              const cells = Array.from(tr.children).filter(
                c => c.tagName === "TD" || c.tagName === "TH");
              let rowCols = 0;
              for (const cell of cells) {
                const cs = cell.getAttribute("colspan");
                rowCols += cs ? parseInt(cs, 10) : 1;
                formatCellNode(cell, pageMarkers);
              }
              if (rowCols > maxCols) maxCols = rowCols;
              if (pageMarkers.length > 0 && cells.length > 0) {
                const spans = pageMarkers.map(makePageSpan).join("");
                const tmp = document.createElement("span");
                tmp.innerHTML = spans;
                while (tmp.firstChild) cells[0].insertBefore(
                  tmp.firstChild, cells[0].firstChild);
              }
            }
            t = outer.outerHTML;
          }
        }
        // Any text that follows the closing marker in the same paragraph
        // (e.g. Lighthouse Table VII's footnote-asterisk explanation) —
        // render it as a sibling paragraph, and also include it in the
        // modal's expanded view (the original print laid it out with the
        // table, so it belongs in the expanded view too).

    async function loadArticle(path) {
      if (!path) {

        if (!response.ok) {

        // In both cases, preserve q / match params so search-result

        // rewrite and can drive the in-article search below.

        for (const k of ["q", "match"]) {

          if (v !== null) preserved.set(k, v);
        }

          if (cleanUrl) {

          }

          const url = new URL(window.location.href);
          url.searchParams.set("article", path);

      }

      // Walk text nodes and highlight matches
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");

      function highlightNode(node) {
        if (node.nodeType === 3) {
          const text = node.textContent;
          if (regex.test(text)) {
            regex.lastIndex = 0;
            const span = document.createElement("span");
            span.innerHTML = text.replace(regex, (match) => {
              return `<span class="search-highlight">${match}</span>`;
            });
            node.parentNode.replaceChild(span, node);
          }
        } else if (node.nodeType === 1 && !node.classList?.contains("search-highlight")) {
          Array.from(node.childNodes).forEach(highlightNode);
        }
      }

      highlightNode(bodyEl);
      buildMatchList();
      currentMatchIdx = -1;
      // Show count and list but don't scroll — let the user pick a match
      const total = document.querySelectorAll(".body-text .search-highlight").length;
      matchCountEl.textContent = total ? `${total} match${total !== 1 ? "es" : ""}` : "No matches";
      prevBtn.style.display = total ? "" : "none";
      nextBtn.style.display = total ? "" : "none";
    }

    articleSearchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const query = articleSearchInput.value.trim();
        if (!query) {
          // Empty query: clear everything
          runArticleSearch();
          return;
        }
        const matches = document.querySelectorAll(".body-text .search-highlight");
        if (matches.length === 0) {
          // First Enter: run the search (no scroll)
          runArticleSearch();
        } else {
          // Subsequent Enter: navigate/scroll
          goToMatch(e.shiftKey ? -1 : 1);
        }
      } else if (e.key === "Escape") {
        articleSearchInput.value = "";
        runArticleSearch();
        articleSearchInput.blur();
      }
    });

    // If query text changes from what was last searched, clear old results
    let lastSearchedQuery = "";
    articleSearchInput.addEventListener("input", () => {
      const current = articleSearchInput.value.trim();
      if (current === lastSearchedQuery) return;
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();
      matchCountEl.textContent = "";
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      matchListEl.style.display = "none";
      matchListEl.innerHTML = "";
      currentMatchIdx = -1;
    });
    // --- Top/bottom navigation arrows ---
    // --- Jump-to-article autocomplete ---
    (function() {
      const input = document.getElementById("jumpTo");
      const results = document.getElementById("jumpResults");
      let articles = null;
      let selected = -1;

      async function ensureIndex() {
        if (articles) return;
        const base = IS_LOCAL ? "/data/derived/articles" : "/data/articles";
        const resp = await fetch(`${base}/index.json`);
        const data = await resp.json();
        articles = data
          .filter(a => a.article_type === "article")
          .map(a => ({
            title: a.title,
            filename: a.filename,
            body_start: a.body_start || "",
          }));
      }

      function show(items) {
        selected = -1;
        if (!items.length) { results.style.display = "none"; return; }
        // Items may carry `_kind: "title" | "fulltext"` and `_snippet`
        // (for full-text hits). Title hits show body_start; full-text
        // hits show a snippet with the match.
        results.innerHTML = items.slice(0, 16).map((a, i) => {
          const kindBadge = a._kind === "fulltext"
            ? `<span style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-right:6px;">text</span>`
            : "";
          const sub = a._snippet
            ? `<div style="font-size:0.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a._snippet}</div>`
            : (a.body_start
               ? `<div style="font-size:0.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(a.body_start)}</div>`
               : "");
          return `<li data-idx="${i}" style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border);">
            <div>${kindBadge}${escapeHtml(a.title)}</div>
            ${sub}
          </li>`;
        }).join("");
        results.style.display = "block";
        results.querySelectorAll("li").forEach(li => {
          li.addEventListener("mousedown", e => {
            e.preventDefault();
            go(items[+li.dataset.idx]);
          });
        });
      }

      // Full-text search state (async, debounced)
      const MEILI_URL = IS_LOCAL ? "http://localhost:7700" : "/search-api";
      const MEILI_KEY = IS_LOCAL
        ? "britannica-dev-key"
        : "24e84cf3ca3b70fe166637d797cbbdd0593ba3a27a47a9ed76b552c821199579";
      // Shared Meilisearch client — see /search-api.js.
      const searchClient = createSearchClient(MEILI_URL, MEILI_KEY);
      let ftToken = 0;
      let ftDebounce = null;
      let lastQuery = "";
      let lastTitleHits = [];

      function makeSnippet(body, q) {
        if (!body) return "";
        const lower = body.toLowerCase();
        const ql = q.toLowerCase();
        const idx = lower.indexOf(ql);
        if (idx < 0) return "";
        const start = Math.max(0, idx - 30);
        const end = Math.min(body.length, idx + ql.length + 50);
        const before = escapeHtml(body.slice(start, idx));
        const match = escapeHtml(body.slice(idx, idx + ql.length));
        const after = escapeHtml(body.slice(idx + ql.length, end));
        return (start > 0 ? "…" : "") + before + `<mark>${match}</mark>` + after + (end < body.length ? "…" : "");
      }

      async function runFulltext(q, myToken) {
        if (q.length < 3) return;
        try {
          const hits = await searchClient.searchFulltext(q, {
            limit: 8,
            excludeFilenames: new Set(lastTitleHits.map(a => a.filename)),
          });
          if (myToken !== ftToken) return;  // newer query in flight
          const ftHits = hits
            .map(h => ({
              title: h.title,
              filename: h.filename,
              _kind: "fulltext",
              _snippet: makeSnippet(h.body || "", q),
              _query: q,
            }))
            .slice(0, 8);
          show([...lastTitleHits, ...ftHits]);
        } catch (e) {
          // keep the title-only list
        }
      }

      function highlight(idx) {
        results.querySelectorAll("li").forEach((li, i) => {
          li.style.background = i === idx ? "var(--resolved-bg)" : "";
        });
      }

      function go(item) {
        results.style.display = "none";
        input.value = "";
        let url = articleUrl(item.filename);
        if (item._kind === "fulltext") {
          const q = encodeURIComponent(item._query || "");
          url += (url.includes("?") ? "&" : "?") + `q=${q}&match=1`;
        }
        location.href = url;
      }

      // 5-tier ranking for title autocomplete.
      //   0  exact title match           "PAUL"
      //   1  first word match            "PAUL, SAINT"
      //   2  any full-word match         "ST PAUL"
      //   3  title starts with query     "PAULINIUS"
      //   4  substring match anywhere    "SAO PAULO"
      function titleRank(title, q) {
        const t = title.toLowerCase();
        if (t === q) return 0;
        const words = t.split(/[\s,.'\u2019()\-]+/).filter(Boolean);
        if (words[0] === q) return 1;
        if (words.includes(q)) return 2;
        if (t.startsWith(q)) return 3;
        return 4;
      }

      input.addEventListener("input", async () => {
        await ensureIndex();
        const q = input.value.trim();
        const qLower = q.toLowerCase();
        if (!q) { results.style.display = "none"; return; }
        // Title matches (local, instant)
        const titleMatches = articles.filter(a => a.title.toLowerCase().includes(qLower));
        titleMatches.sort((a, b) => {
          const ra = titleRank(a.title, qLower);
          const rb = titleRank(b.title, qLower);
          return ra - rb || a.title.localeCompare(b.title);
        });
        lastTitleHits = titleMatches.slice(0, 8).map(a => ({
          title: a.title,
          filename: a.filename,
          body_start: a.body_start,
          _kind: "title",
        }));
        lastQuery = q;
        // Show title matches immediately; fulltext results stream in below.
        show(lastTitleHits);
        // Debounced full-text search
        if (ftDebounce) clearTimeout(ftDebounce);
        const myToken = ++ftToken;
        ftDebounce = setTimeout(() => runFulltext(q, myToken), 250);
      });

      input.addEventListener("keydown", e => {
        const items = results.querySelectorAll("li");
        if (e.key === "ArrowDown" && items.length) { e.preventDefault(); selected = Math.min(selected + 1, items.length - 1); highlight(selected); }
        else if (e.key === "ArrowUp" && items.length) { e.preventDefault(); selected = Math.max(selected - 1, 0); highlight(selected); }
        else if (e.key === "Enter") {
          e.preventDefault();
          if (items.length) {
            // Activate whichever row is highlighted, or the first one
            // if the user hasn't arrowed down. Matches the natural
            // "type, see results, press Enter" flow — no one expects
            // to have to arrow-select the top hit.
            const idx = selected >= 0 ? selected : 0;
            items[idx].dispatchEvent(new MouseEvent("mousedown"));
          } else {
            // Typeahead empty — send the user to the index page with
            // the query prefilled so they can run a full search.
            const q = input.value.trim();
            if (q) {
              input.blur();
              const base = IS_LOCAL ? "index.html" : "/index.html";
              location.href = `${base}?q=${encodeURIComponent(q)}`;
            }
          }
        }
        else if (e.key === "Escape") { results.style.display = "none"; }
      });

      input.addEventListener("blur", () => { setTimeout(() => results.style.display = "none", 150); });

      // iPad/touch fallback: blur isn't always fired when tapping
      // outside a focused input. Close on any outside pointer down.
      document.addEventListener("pointerdown", e => {
        if (e.target !== input && !results.contains(e.target)) {
          results.style.display = "none";
        }
      });
    })();
  </script>
