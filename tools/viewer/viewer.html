<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Egyptian+Hieroglyphs&display=swap">
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --unresolved: #b42318;
      --resolved-bg: #f5f0e8;
      --unresolved-bg: #fff1f1;
      --code-bg: #f0ebe3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    .meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input[type="text"] {
      flex: 1 1 380px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      background: var(--panel);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
    }

    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: var(--code-bg); }

    .body-text {
      font-size: 1.08rem;
      margin-left: 6.5em;
      margin-right: 160px;
      position: relative;
    }

    .body-text abbr {
      text-decoration: none;
      border-bottom: 1px dotted #8b7355;
      cursor: help;
    }

    @media (max-width: 900px) {
      .body-text {
        margin-right: 0;
      }
    }

    .body-text p {
      text-indent: 1.5em;
      margin: 0 0 0.5em 0;
      position: relative;
    }


    .body-text p:first-of-type {
      text-indent: 0;
    }

    .body-text .katex-display {
      text-indent: 0;
    }


    .xref-list {
      list-style: none;
      padding: 0;
      margin: 0;
      columns: 2;
      column-gap: 2em;
    }

    .xref-item {
      padding: 2px 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .xref-item.unresolved {
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      background: rgba(139, 115, 85, 0.08);
      border-radius: 2px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .segments {
      display: grid;
      gap: 12px;
    }

    .segment {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafbfc;
    }

    .segment-meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .message {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .error {
      color: var(--unresolved);
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    details summary {
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .article-image {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: var(--panel);
    }

    .article-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .article-image figcaption {
      padding: 8px 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .article-image figcaption.filename {
      color: var(--muted);
      font-size: 0.78rem;
      font-style: normal;
      word-break: break-all;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.93rem;
      border: 1px solid #c4b49a;
    }

    /* Wide data tables: shown inline but horizontally scrollable, with an
       Expand button that pops them into a full-viewport modal. */
    .wide-table-wrap {
      margin: 1em 0;
      position: relative;
    }
    .wide-table-inline {
      overflow-x: auto;
      border: 1px solid #c4b49a;
      background: var(--panel);
    }
    .wide-table-inline .data-table {
      margin: 0;
      border: none;
      min-width: max-content;
    }
    .expand-table-btn {
      display: inline-block;
      font: inherit;
      font-size: 0.75rem;
      color: #8b7355;
      background: #ebe4d6;
      border: 1px solid #c4b49a;
      padding: 2px 10px;
      margin-bottom: 4px;
      border-radius: 3px;
      cursor: pointer;
      user-select: none;
    }
    .expand-table-btn:hover { background: #ddd4c4; }

    .wide-table-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 10, 0.6);
      z-index: 9000;
      padding: 2em;
      box-sizing: border-box;
    }
    .wide-table-modal.fullscreen {
      padding: 0;
    }
    .wide-table-modal-panel {
      position: absolute;
      inset: 2em;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid #c4b49a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      resize: both;
      min-width: 320px;
      min-height: 240px;
      max-width: calc(100vw - 2em);
      max-height: calc(100vh - 2em);
    }
    .wide-table-modal.fullscreen .wide-table-modal-panel {
      inset: 0;
      border: none;
      border-radius: 0;
      resize: none;
      max-width: 100vw;
      max-height: 100vh;
    }
    .wide-table-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #ebe4d6;
      border-bottom: 1px solid #c4b49a;
      font-weight: 600;
      color: #5a4a35;
    }
    .wide-table-modal-title {
      font-variant: small-caps;
      letter-spacing: 0.04em;
    }
    .wide-table-modal-btn {
      font: inherit;
      font-size: 1.1rem;
      line-height: 1;
      color: #8b7355;
      background: transparent;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
    }
    .wide-table-modal-btn:hover {
      background: #ddd4c4;
      color: #3a2f20;
    }
    .wide-table-modal-actions {
      display: flex;
      gap: 2px;
    }
    .wide-table-modal-body {
      flex: 1;
      overflow: auto;
      padding: 1em;
    }
    .wide-table-modal-body .data-table {
      margin: 0;
      min-width: max-content;
    }
    .wide-table-trailing {
      margin-top: 1em;
      font-size: 0.9rem;
      color: #555;
    }

    .data-table td {
      padding: 5px 10px;
      border: 1px solid #ddd4c4;
      vertical-align: top;
    }

    .data-table tr:nth-child(even) td {
      background: #f7f3ec;
    }

    .data-table tr:nth-child(odd) td {
      background: var(--panel);
    }

    .data-table th {
      padding: 6px 10px;
      border: 1px solid #c4b49a;
      background: #ebe4d6;
      font-weight: 600;
      text-align: left;
      font-variant: small-caps;
      letter-spacing: 0.03em;
      color: #5c4a32;
    }

    .small-caps {
      font-variant: small-caps;
    }

    .verse {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      margin: 1em 2em;
      padding-left: 1em;
      border-left: 2px solid #8b7355;
      line-height: 1.6;
    }

    .page-marker {
      float: left;
      margin-left: -6.5em;
      width: 5em;
      text-align: right;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.65rem;
      font-style: italic;
      color: #8b7355;
      padding-right: 0.6em;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    .page-marker.unproofed {
      color: #d04000;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .body-text { margin-left: 0; }
      .page-marker { display: none; }
    }

    .hieroglyph {
      font-family: "Noto Sans Egyptian Hieroglyphs", serif;
      font-size: 1.4em;
      vertical-align: middle;
      line-height: 1;
    }

    .hieroglyph-fallback {
      font-family: monospace;
      font-size: 0.85em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      color: var(--muted);
    }

    .text-block {
      font-family: inherit;
      font-size: inherit;
      margin: 0.8em 2em;
      padding: 0;
      background: none;
      border: none;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .structural-formula {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.95em;
      margin: 0.8em 2em;
      padding: 0.5em 1em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      line-height: 1.4;
      overflow-x: auto;
      white-space: pre;
    }

    .section-heading {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.1rem;
      font-variant: small-caps;
      letter-spacing: 0.04em;
      margin-top: 1.8em;
      margin-bottom: 0.4em;
      color: #5c4a32;
      text-align: center;
      text-indent: 0;
    }

    .section-heading::before,
    .section-heading::after {
      content: "\2014\2014\2014";
      display: block;
      text-align: center;
      color: #b89a6b;
    }

    .body-text p {
      position: relative;
    }

    .shoulder-heading {
      position: absolute;
      right: -170px;
      width: 150px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--muted);
      text-align: left;
      text-indent: 0;
    }

    /* On narrow screens, inline the shoulder headings */
    @media (max-width: 900px) {
      .shoulder-heading {
        position: static;
        display: block;
        width: auto;
        margin: 0.5em 0 0.2em;
        font-weight: 600;
        color: var(--text);
      }
    }

    .toc {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
    }

    .toc h3 {
      margin: 0 0 8px 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .toc ol, .toc ul.toc-contents {
      margin: 0;
      padding-left: 20px;
      columns: 2;
      column-gap: 24px;
    }

    .toc ul.toc-contents {
      list-style: none;
      padding-left: 0;
    }

    .toc ul.toc-contents ul {
      list-style: none;
      padding-left: 20px;
      columns: 1;
    }

    .toc li {
      margin-bottom: 3px;
    }

    .toc a {
      color: var(--link);
      text-decoration: none;
    }

    .toc a:hover { text-decoration: underline; }

    .article-link {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px dotted #b89a6b;
    }

    .article-link:hover {
      border-bottom-style: solid;
    }

    .search-highlight {
      background: #ffe033;
      padding: 1px 2px;
      border-radius: 2px;
    }
    .search-highlight-current {
      background: #ffe033;
      outline: 2px solid #b38600;
    }
    #jumpResults mark { background: #ffe033; padding: 0 2px; border-radius: 2px; color: inherit; }
    .nav-arrow {
      position: fixed;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 50;
      color: #8b7355;
      padding: 4px;
      line-height: 1;
    }
    .nav-arrow:hover { color: #5c4a32; }
    .nav-arrow { top: 50%; }
    #matchList .match-item {
      padding: 4px 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    #matchList .match-item:last-child { border-bottom: none; }
    #matchList .match-item:hover { background: #f0ebe0; }
    #matchList .match-item.active { background: #ffe0b2; }
    #matchList .match-item mark { background: #ffe033; padding: 0 1px; border-radius: 2px; }

    .footnote-ref {
      position: relative;
      display: inline;
    }

    .footnote-ref a {
      color: #7b3f00;
      text-decoration: none;
      font-size: 1em;
      font-weight: 700;
      padding: 0 2px;
      cursor: pointer;
    }

    .fn-popup {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      max-width: 80vw;
      max-height: 200px;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid #8b7355;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 200;
      font-style: normal;
      font-variant: normal;
      font-weight: normal;
      font-size: 0.85rem;
      text-indent: 0;
      text-transform: none;
    }

    .fn-popup.visible {
      display: block;
    }

    .fn-popup-num {
      font-weight: 600;
      color: #8b7355;
      margin-right: 4px;
    }

    .footnotes {
      border-top: 1px solid #8b7355;
      margin-top: 32px;
      padding-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footnotes h3 {
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: #8b7355;
      margin-bottom: 10px;
    }

    .footnotes ol {
      padding-left: 24px;
      list-style: none;
    }

    .footnotes li {
      margin-bottom: 6px;
      text-indent: -1.5em;
      padding-left: 1.5em;
    }

    .footnotes li a {
      color: #8b7355;
      text-decoration: none;
      font-weight: 600;
      margin-right: 2px;
    }

    .inline-image {
      margin: 1.2em auto;
      text-align: center;
      max-width: 600px;
    }

    .inline-image img {
      max-width: 100%;
      max-height: 600px;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .inline-image figcaption {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
      line-height: 1.4;
    }

    .figure-legend {
      margin: -0.6em auto 1.4em;
      max-width: 640px;
      padding: 10px 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
      border-left: 2px solid var(--border);
      background: rgba(245, 241, 235, 0.35);
      column-count: 2;
      column-gap: 24px;
    }
    @media (max-width: 640px) {
      .figure-legend { column-count: 1; }
    }
    .figure-legend .legend-subhead {
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.04em;
      color: var(--text);
      margin: 0 0 4px;
      break-after: avoid-column;
    }
    .figure-legend .legend-entry {
      break-inside: avoid-column;
      text-indent: -1.2em;
      padding-left: 1.2em;
    }
    .figure-legend .legend-entry + .legend-subhead {
      margin-top: 10px;
    }

    .contributors {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h1 style="margin: 0; font-variant: normal; letter-spacing: 0.02em; font-size: 1.3rem; font-style: italic; color: #5c4a32;">Encyclop&aelig;dia Britannica, 11th Edition</h1>
        <div style="font-size: 0.9rem;">
          <a href="/home.html" style="color: var(--link); text-decoration: none;">Home</a>
          &nbsp;&middot;&nbsp;
          <a href="/index.html" style="color: var(--link); text-decoration: none;">Articles</a>
          &nbsp;&middot;&nbsp;
          <a href="/contributors.html" style="color: var(--link); text-decoration: none;">Contributors</a>
        </div>
      </div>
      <div class="controls">
        <div style="position: relative; flex: 0 1 280px; min-width: 180px;">
          <input id="jumpTo" type="text" placeholder="Search titles &amp; full text..." style="width: 100%;" autocomplete="off" />
          <ul id="jumpResults" style="display:none; position:absolute; top:100%; left:0; right:0; margin:0; padding:0; list-style:none; background:var(--panel); border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; max-height:240px; overflow-y:auto; z-index:100; font-size:0.9rem;"></ul>
        </div>
        <input id="articleSearch" type="text" placeholder="Search within article..." style="flex: 0 1 260px; min-width: 160px;" />
        <span id="matchCount" style="color: var(--muted); font-size: 0.85rem;"></span>
        <button id="prevMatch" style="display:none; padding: 2px 8px; font-size: 0.85rem;" title="Previous match (Shift+Enter)">&#x25B2;</button>
        <button id="nextMatch" style="display:none; padding: 2px 8px; font-size: 0.85rem;" title="Next match (Enter)">&#x25BC;</button>
      </div>
      <div id="matchList" style="display:none; max-height: 200px; overflow-y: auto; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 6px; padding: 4px 0; background: var(--bg);"></div>
    </div>
    <div class="header-divider">&#x223C;&#x25C6;&#x223C;</div>
    <div id="app"></div>
  </div>
  <button class="nav-arrow" style="transform:translateY(-20px)" onclick="window.scrollTo({top:0,behavior:'instant'})" title="Top">&#x25B2;</button>
  <button class="nav-arrow" style="transform:translateY(12px)" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'instant'})" title="Bottom">&#x25BC;</button>

  <script>
    const app = document.getElementById("app");

    function toggleFnPopup(event, num) {
      event.stopPropagation();
      const popup = document.getElementById('fnpop-' + num);
      if (!popup) return;
      const wasVisible = popup.classList.contains('visible');
      // Close all open popups
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
      if (!wasVisible) popup.classList.add('visible');
    }

    // Close popups when clicking elsewhere
    document.addEventListener('click', (ev) => {
      const expandBtn = ev.target.closest('.expand-table-btn');
      if (expandBtn) {
        ev.stopPropagation();
        openWideTableModal(expandBtn.dataset.wt);
        return;
      }
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
    });

    function openWideTableModal(id) {
      const src = wideTableSources[id];
      if (!src) return;
      const modal = document.createElement('div');
      modal.className = 'wide-table-modal';
      const trailingPart = src.trailing ? `<div class="wide-table-trailing">${src.trailing}</div>` : "";
      modal.innerHTML = `
        <div class="wide-table-modal-panel">
          <div class="wide-table-modal-header">
            <span class="wide-table-modal-title">Table (expanded view)</span>
            <span class="wide-table-modal-actions">
              <button class="wide-table-modal-btn js-fullscreen" title="Toggle full screen">⛶</button>
              <button class="wide-table-modal-btn js-close" title="Close">✕</button>
            </span>
          </div>
          <div class="wide-table-modal-body">${src.table}${trailingPart}</div>
        </div>`;
      const close = () => modal.remove();
      modal.querySelector('.js-close').onclick = close;
      const fsBtn = modal.querySelector('.js-fullscreen');
      fsBtn.onclick = () => {
        const full = modal.classList.toggle('fullscreen');
        fsBtn.textContent = full ? '⛶' : '⛶';
        fsBtn.title = full ? 'Exit full screen' : 'Full screen';
      };
      modal.addEventListener('click', (e) => {
        if (e.target === modal) close();
      });
      document.addEventListener('keydown', function escOnce(e) {
        if (e.key === 'Escape') {
          close();
          document.removeEventListener('keydown', escOnce);
        }
      });
      document.body.appendChild(modal);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // Reverse of escapeHtml. Used when we need to pass captured text
    // (e.g. an image filename pulled from already-escaped paragraph
    // HTML) back into a URL or attribute context.
    function unescapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&#39;", "'")
        .replaceAll("&quot;", '"')
        .replaceAll("&lt;", "<")
        .replaceAll("&gt;", ">")
        .replaceAll("&amp;", "&");
    }

    // Gardiner Sign List -> Unicode Egyptian Hieroglyphs (U+13000 block)
    // Each category starts at a known base offset; sign number maps to base + (n-1).
    const GARDINER_BASES = {
      A:0x13000,B:0x13032,C:0x13037,D:0x13044,E:0x130A4,F:0x130C6,
      G:0x130F9,H:0x13131,I:0x1313B,K:0x1314D,L:0x13153,M:0x1315C,
      N:0x13189,O:0x131B3,P:0x131E7,Q:0x131F0,R:0x131F7,S:0x13210,
      T:0x1323D,U:0x13260,V:0x13286,W:0x132A9,X:0x132C2,Y:0x132CA,
      Z:0x132CF,Aa:0x132DB,
    };

    // Manuel de Codage phonetic abbreviations -> Gardiner codes
    const MDC_TO_GARDINER = {
      A:"G53",  // Abbreviation for the A-vulture (G53)
      H:"O4",   // reed shelter
      S:"S29",  // folded cloth
      s:"S29",
      t:"X1",   // bread loaf
      q:"Q3",   // stool
      sw:"M23", // sedge
      pr:"O1",  // house
      anx:"S34",// ankh
      nH:"S3",  // Red Crown
      zA:"V17", // sa (protection)
      aA:"G25", // jabiru
      xpr:"L1", // scarab
      nDs:"N33",// grain
      Hm:"U36", // pestle
      Xrd:"A17",// child
      DA:"I10", // cobra
      "N35A":"N35","N35B":"N35","V10A":"V10", // variants
    };

    function gardinerToUnicode(code) {
      if (code.includes("*")) code = code.split("*")[0];
      // Try MdC abbreviation first
      if (MDC_TO_GARDINER[code]) code = MDC_TO_GARDINER[code];
      const m = code.match(/^([A-Z]a?)(\d+)$/);
      if (!m) return null;
      const base = GARDINER_BASES[m[1]];
      if (base == null) return null;
      const cp = base + parseInt(m[2]) - 1;
      return (cp >= 0x13000 && cp <= 0x1342F) ? cp : null;
    }

    function commonsUrl(filename) {
      // Full URLs (e.g. score images from upload.wikimedia.org) pass through
      if (filename.startsWith("http://") || filename.startsWith("https://")) return filename;
      let name = filename.replace(/ /g, "_");
      // SVGs are rasterized to .svg.png by the download script
      if (name.toLowerCase().endsWith(".svg")) name += ".png";
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      // All images served locally (Commons, DjVu crops, chart scans)
      if (local) return `/data/derived/images/${encodeURIComponent(name)}`;
      return `/data/images/${encodeURIComponent(name)}`;
    }

    let footnoteCounter = 0;
    let currentVolume = "?";
    let unproofedPages = {};
    let collectedFootnotes = [];
    let linkedTargets = new Set();
    let sectionCounter = 0;
    let collectedSections = [];
    let wideTableCounter = 0;
    const wideTableSources = {};
    // Track section keys emitted via top-level heading rules (SEC
    // marker, «SC»I.—Foo«/SC» major-section pattern). Used to
    // suppress duplicate top-level emissions for the same name.
    let emittedSectionKeys = new Set();
    // Tracks only the MOST RECENT top-level section key so a shoulder
    // heading sitting in that section's margin (e.g. ALGAE's
    // «SH»Polymorphism.«/SH» inside the Polymorphism section) can be
    // suppressed — it's a margin pointer to the containing section,
    // not a real subsection. Unrelated SHs (e.g. "Fuji." inside
    // JAPAN's "Geography" section) have different keys and stay.
    let currentSectionKey = "";

    // Normalize a section name for dup-detection: lowercase,
    // alphanumerics only (so "Poly-morphism." matches "Polymorphism").
    function sectionKey(name) {
      return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    // Pretty-print a raw SEC name for display. Inserts a space at
    // lowercase→uppercase transitions so source artifacts like
    // "BrewingTrade" render as "Brewing Trade". Leaves names without
    // case transitions (Cyanophyceae, CLEMENT VII) untouched.
    function displaySectionName(name) {
      return name.replace(/([a-z])([A-Z])/g, "$1 $2");
    }

    // Strip line-wrap hyphens inside a shoulder-heading label:
    // "Poly-morphism." → "Polymorphism.". Only removes hyphens sitting
    // between two lowercase letters — a heuristic tuned for the
    // single-word or short-phrase shoulder headings EB1911 uses. Real
    // compound words ("self-help") would be incorrectly collapsed, but
    // those don't appear as shoulder-heading labels in the corpus.
    function dehyphenateShoulder(text) {
      return text.replace(/([a-z])-([a-z])/g, "$1$2");
    }

    function formatFootnoteText(text) {
      // Input may already be HTML-escaped (from formatCell or renderParagraph),
      // so don't escape again.
      let h = text;
      h = h.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
        const hasFile = g3 !== undefined;
        const target = hasFile ? g2 : g1;
        const display = hasFile ? g3 : g2;
        const filename = hasFile ? g1 : null;
        const href = filename ? articleUrl(filename) : `/search.html?q=${encodeURIComponent(target)}`;
        return `<a href="${href}" class="article-link" title="${target}">${display}</a>`;
      });
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      return h;
    }

    function formatCell(text) {
      let h = escapeHtml(text);
      h = h.replace(/\u00abFN:(.*?)\u00ab\/FN\u00bb/gs, (match, content) => {
        footnoteCounter++;
        collectedFootnotes.push({ num: footnoteCounter, text: content });
        return `<sup class="footnote-ref" id="fnref-${footnoteCounter}"><a onclick="toggleFnPopup(event,${footnoteCounter});return false;" href="#">${footnoteCounter}</a><span class="fn-popup" id="fnpop-${footnoteCounter}"><span class="fn-popup-num">${footnoteCounter}.</span>${formatFootnoteText(content)}</span></sup>`;
      });
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      h = h.replace(/\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}/g, (match, filename, caption) => {
        const url = filename.startsWith("http") ? filename : commonsUrl(filename);
        return `<img src="${url}" alt="${escapeHtml(caption || filename)}" class="cell-image" loading="lazy" style="max-height:60px;" />`;
      });
      h = h.replace(/\[hieroglyph:\s*([^\]]+)\]/g, (match, codes) => {
        const rendered = codes.trim().split(/[:\s\-]+/).map(code => {
          code = code.replace(/\\/g, "");
          if (!code || code === "<" || code === ">" || code === "!" || code === "-") return "";
          const cp = gardinerToUnicode(code);
          if (cp) return `<span class="hieroglyph">&#x${cp.toString(16)};</span>`;
          return `<span class="hieroglyph-fallback" title="Gardiner ${code}">${code}</span>`;
        }).join("");
        return rendered || match;
      });
      // LaTeX math in cells — render inline with KaTeX.
      h = h.replace(/\u00abMATH:(.*?)\u00ab\/MATH\u00bb/gs, (_m, latex) => {
        const tmp = document.createElement("textarea");
        tmp.innerHTML = latex;
        const raw = tmp.value.replace(/\\mbox\b/g, "\\text");
        try {
          if (typeof katex !== "undefined") {
            return katex.renderToString(raw, { throwOnError: false, displayMode: false });
          }
        } catch(e) {
          console.warn("KaTeX cell error:", e.message);
        }
        return `<code class="math-fallback">${escapeHtml(raw)}</code>`;
      });
      // Multi-line VERSE inside a cell — newline-separated lines joined with <br>.
      h = h.replace(/\{\{VERSE:([\s\S]*?)\}VERSE\}/g, (_m, content) => {
        const lines = content.split("\n").filter(l => l.trim());
        return `<span class="cell-verse">${lines.join("<br>")}</span>`;
      });
      return h;
    }

    function sectionSlug(name) {
      return name.trim().toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function renderParagraph(p) {
      // Absorbed-subsection heading: «SEC:Cyanophyceae«/SEC»
      // Emitted by boundary detection when a <section begin="X"/> is
      // folded into the open article. Render as a navigable h3 so
      // the section is visible AND targetable by xrefs.
      const secMatch = p.match(/^\u00abSEC:([^\u00ab]+)\u00ab\/SEC\u00bb$/);
      if (secMatch) {
        const rawName = secMatch[1].trim();
        const name = displaySectionName(rawName);
        const slug = sectionSlug(name);
        const id = `section-${slug}`;
        sectionCounter++;
        collectedSections.push({ id, title: name, level: 1 });
        const key = sectionKey(name);
        emittedSectionKeys.add(key);
        currentSectionKey = key;
        return `<h3 class="section-heading" id="${id}" data-slug="${slug}">${escapeHtml(name)}</h3>`;
      }
      const imgMatch = p.match(/^\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}$/);
      if (imgMatch) {
        const filename = imgMatch[1];
        const caption = imgMatch[2] || "";
        const url = commonsUrl(filename);
        return `<figure class="inline-image">
          <a href="${url}" target="_blank"><img src="${url}" alt="${escapeHtml(caption || filename)}" loading="lazy" /></a>
          ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ""}
        </figure>`;
      }
      // Render standalone small-caps paragraphs as section headings
      // (e.g. «SC»II.—The People«/SC» in multi-section articles like JAPAN)
      const scSectionMatch = p.match(/^(?:([IVXLCA-Z]+\.)\s*)?\u00abSC\u00bb(([IVXLCA-Z]+[.—]\s*)?.*?)\u00ab\/SC\u00bb$/s);
      if (scSectionMatch && !p.includes("{{IMG:") && !p.includes("{{TABLE:")) {
        const prefix = scSectionMatch[1] ? scSectionMatch[1] + " " : "";
        const rawText = (prefix + scSectionMatch[2]).trim();
        const text = rawText.replace(/\u00abFN:.*?\u00ab\/FN\u00bb/gs, "").trim();
        const isExcluded = /^(?:(?:References|Authorities|Bibliography|See also)\b|Fig\.)/i.test(text);
        // Skip if a SEC marker already emitted a heading for the same
        // section name (stripped of leading Roman numeral prefix).
        const nameOnly = scSectionMatch[2].replace(/\u00abFN:.*?\u00ab\/FN\u00bb/gs, "").trim();
        const nameKey = sectionKey(nameOnly);
        const isDup = emittedSectionKeys.has(nameKey);
        if (!isExcluded && !isDup) {
          sectionCounter++;
          const sectionId = `section-${sectionCounter}`;
          const slug = text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
          collectedSections.push({ id: sectionId, title: text, level: 1 });
          emittedSectionKeys.add(nameKey);
          currentSectionKey = nameKey;
          const headingHtml = renderParagraph(rawText);
          return `<h3 class="section-heading" id="${sectionId}" data-slug="${slug}">${headingHtml}</h3>`;
        }
        // Excluded (Fig., Bibliography, etc.) or duplicate — fall through.
      }
      // Render preformatted blocks (structural chemical formulas)
      const preMatch = p.match(/^\u00abPRE:([\s\S]*)\u00ab\/PRE\u00bb$/);
      if (preMatch) {
        let preContent = escapeHtml(preMatch[1]);
        // Process formatting markers inside preformatted blocks
        preContent = preContent.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
        preContent = preContent.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
        preContent = preContent.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
        // Use text-block style (wrapping) unless it looks like a structural formula
        const isFormula = /[─│┌┐└┘|\\\/]{3,}/.test(preMatch[1]);
        const cls = isFormula ? "structural-formula" : "text-block";
        return `<pre class="${cls}">${preContent}</pre>`;
      }
      // Render verse markers
      const verseMatch = p.match(/^\{\{VERSE:([\s\S]*)\}VERSE\}$/);
      if (verseMatch) {
        const lines = verseMatch[1].split("\n").filter(l => l.trim());
        return `<blockquote class="verse">${lines.map(l => escapeHtml(l)).join("<br>")}</blockquote>`;
      }
      // Render figure-legend markers (structured image legends emitted
      // by the image-layout subclass handlers). Format:
      //   {{LEGEND:### Subheading.
      //   A. First entry.
      //   B. Second entry.
      //   ### Another subheading.
      //   C. …}LEGEND}
      // Lines starting with "### " are subheadings; everything else
      // is an entry (letter-dot-text).
      const legendMatch = p.match(/^\{\{LEGEND:([\s\S]*)\}LEGEND\}$/);
      if (legendMatch) {
        const rawLines = legendMatch[1].split("\n").filter(l => l.trim());
        const parts = rawLines.map(line => {
          const s = line.trim();
          if (s.startsWith("### ")) {
            return `<h5 class="legend-subhead">${escapeHtml(s.slice(4))}</h5>`;
          }
          return `<div class="legend-entry">${escapeHtml(s)}</div>`;
        });
        return `<aside class="figure-legend">${parts.join("")}</aside>`;
      }
      // Render complex HTML tables (rowspan/colspan preserved)
      const htmlTableMatch = p.match(/^(\u00abHTMLTABLE:[\s\S]*?\u00ab\/HTMLTABLE\u00bb)([\s\S]*)$/);
      if (htmlTableMatch) {
        const tableBlock = htmlTableMatch[1];
        const trailing = htmlTableMatch[2].trim();
        const inner = tableBlock.match(/^\u00abHTMLTABLE:([\s\S]*)\u00ab\/HTMLTABLE\u00bb$/)[1];
        let t = inner.replace("<table>", '<table class="data-table">');
        // Hoist any page markers inside cells to the row level — render
        // them as a floated span at the start of the row's first cell so
        // they land in the left margin alongside body-paragraph markers,
        // instead of disrupting cell-content alignment.
        const makePageSpan = (pg) => {
          const unproofed = pg in unproofedPages;
          const cls = unproofed ? "page-marker unproofed" : "page-marker";
          const title = unproofed
            ? `Volume ${currentVolume}, page ${pg} (unproofed source)`
            : `Volume ${currentVolume}, page ${pg}`;
          return `<span class="${cls}" title="${title}">${currentVolume}:${pg}</span>`;
        };
        let maxCols = 0;
        t = t.replace(/<tr([^>]*)>([\s\S]*?)<\/tr>/g, (_m, trAttrs, inner) => {
          const pageMarkers = [];
          inner = inner.replace(/\x01PAGE:(\d+)\x01/g, (_x, pg) => {
            pageMarkers.push(pg);
            return "";
          });
          let rowCols = 0;
          inner = inner.replace(/<(t[dh])([^>]*)>([\s\S]*?)<\/\1>/g,
            (_x, tag, attrs, content) => {
              const cs = /colspan=["']?(\d+)/i.exec(attrs);
              rowCols += cs ? parseInt(cs[1], 10) : 1;
              return `<${tag}${attrs}>${formatCell(content)}</${tag}>`;
            });
          if (rowCols > maxCols) maxCols = rowCols;
          if (pageMarkers.length > 0) {
            const spans = pageMarkers.map(makePageSpan).join("");
            inner = inner.replace(/<(t[dh])([^>]*)>/,
              (_x, tag, attrs) => `<${tag}${attrs}>${spans}`);
          }
          return `<tr${trAttrs}>${inner}</tr>`;
        });
        // Any text that follows the closing marker in the same paragraph
        // (e.g. Lighthouse Table VII's footnote-asterisk explanation) —
        // render it as a sibling paragraph, and also include it in the
        // modal's expanded view (the original print laid it out with the
        // table, so it belongs in the expanded view too).
        const trailingHtml = trailing ? renderParagraph(trailing) : "";

        // Wrap wide tables (≥10 effective columns) so they can be opened in
        // a full-viewport modal.  The table still renders inline, but an
        // "Expand" button lets the reader see it uncramped.
        let rendered;
        if (maxCols >= 10) {
          const tableId = `wt-${++wideTableCounter}`;
          wideTableSources[tableId] = { table: t, trailing: trailingHtml };
          rendered = `<figure class="wide-table-wrap"><button class="expand-table-btn" data-wt="${tableId}" title="Open full-width view">⤢ Expand (${maxCols} columns)</button><div class="wide-table-inline">${t}</div></figure>`;
        } else {
          rendered = t;
        }
        if (trailingHtml) rendered += trailingHtml;
        return rendered;
      }
      // Render table markers (with or without headers)
      const tableMatch = p.match(/^\{\{TABLE(H?):([\s\S]*)\}TABLE\}$/);
      if (tableMatch) {
        const hasHeader = tableMatch[1] === "H";
        // Protect \n inside {{VERSE:…}VERSE} blocks before row-splitting —
        // VERSE contents are multi-line but belong to a single cell.
        const protectedBody = tableMatch[2].replace(
          /\{\{VERSE:[\s\S]*?\}VERSE\}/g,
          m => m.replace(/\n/g, "\x05"));
        const rows = protectedBody.split("\n")
          .filter(r => r.trim())
          .map(r => r.replace(/\x05/g, "\n"));
        // Single-row tables render inline (common for hieroglyph glosses)
        if (rows.length === 1 && !hasHeader) {
          return `<span class="inline-table">${formatCell(rows[0])}</span>`;
        }
        // Detect max columns for colspan calculation.
        // Protect {{IMG:...}} markers before splitting on " | " — their
        // internal pipe would otherwise be mistaken for a cell separator.
        const splitRows = rows.map(r => {
          const protectedRow = r.replace(/\{\{IMG:[^}]*\}\}/g,
            m => m.replace(/ \| /g, "\x04"));
          return protectedRow.split(" | ").map(
            c => c.replace(/\x04/g, " | "));
        });
        const maxCols = Math.max(...splitRows.map(r => r.length));

        const tableRows = splitRows.map((cells, i) => {
          const tag = (hasHeader && i === 0) ? "th" : "td";
          // Group header row: fewer content cells than data rows,
          // with empty cells between content — use colspan
          const contentCount = cells.filter(c => c.trim()).length;
          if (contentCount < cells.length / 2 && contentCount >= 1 && cells.length === maxCols) {
            // Build cells with colspan for content spanning empty neighbors
            let result = "";
            let j = 0;
            while (j < cells.length) {
              if (cells[j].trim()) {
                // Count following empty cells
                let span = 1;
                while (j + span < cells.length && !cells[j + span].trim()) span++;
                result += `<${tag} colspan="${span}">${formatCell(cells[j].trim())}</${tag}>`;
                j += span;
              } else {
                // Leading empty cell
                result += `<${tag}></${tag}>`;
                j++;
              }
            }
            return `<tr>${result}</tr>`;
          }
          const cellsHtml = cells.map(c => `<${tag}>${formatCell(c.trim())}</${tag}>`).join("");
          return `<tr>${cellsHtml}</tr>`;
        }).join("");
        return `<table class="data-table">${tableRows}</table>`;
      }

      // Detect major section headings: «SC»I.—Geography«/SC» or «SC»A. Principles«/SC»
      // Must have a numeral/letter prefix to distinguish from inline «SC» labels
      const sectionMatch = p.match(/^(?:([IVXLCA-Z]+\.)\s*)?\u00abSC\u00bb(([IVXLCA-Z]+[.—]\s*)?.*?)\u00ab\/SC\u00bb[.:]?\u2014?(.*)$/s);
      const hasNumeral = sectionMatch && (sectionMatch[1] || (sectionMatch[3] && sectionMatch[3].length > 0));
      if (sectionMatch && hasNumeral && sectionMatch[2].length < 60 && !p.includes("{{IMG:") && !p.includes("{{TABLE:")) {
        // Drop leading numeral prefix ("III.") for TOC consistency —
        // sibling sections emitted via SEC markers don't carry one.
        const sectionTitle = sectionMatch[2].trim();
        const isExcluded2 = /^(?:(?:References|Authorities|Bibliography|See also)\b|Fig\.)/i.test(sectionTitle);
        // Dup against an earlier SEC marker on the same section name
        // (ALGAE "I. «SC»Cyanophyceae«/SC».—…" after SEC:Cyanophyceae).
        const nameOnly2 = sectionMatch[2].trim();
        const isDup2 = emittedSectionKeys.has(sectionKey(nameOnly2));
        if (!isExcluded2 && !isDup2) {
          sectionCounter++;
          const sectionId = `section-${sectionCounter}`;
          collectedSections.push({ id: sectionId, title: sectionTitle, level: 1 });
          const k = sectionKey(sectionTitle);
          emittedSectionKeys.add(k);
          currentSectionKey = k;

          const emDashIdx = p.indexOf("\u2014");
          const sectionBody = emDashIdx >= 0 ? p.substring(emDashIdx + 1).trim() : "";
          const bodyHtml = renderParagraph(sectionBody);

          return `<h3 class="section-heading" id="${sectionId}">${escapeHtml(sectionTitle)}</h3>${bodyHtml}`;
        }
        // Excluded — fall through to normal paragraph rendering
      }

      // Replace inline table markers (single-row tables embedded in text)
      let html = escapeHtml(p);
      // Render page markers as left-margin citations (vol:page).
      // Each marker is wrapped in a zero-width inline anchor so that
      // absolute positioning places it in the left margin at the correct
      // vertical position, even when multiple markers appear in one <p>.
      // Render page markers as left-margin citations (vol:page)
      html = html.replace(/\x01PAGE:(\d+)\x01/g, (match, page) => {
        const isUnproofed = page in unproofedPages;
        const cls = isUnproofed ? "page-marker unproofed" : "page-marker";
        const title = isUnproofed
          ? `Volume ${currentVolume}, page ${page} (unproofed source)`
          : `Volume ${currentVolume}, page ${page}`;
        return `<span class="${cls}" title="${title}">${currentVolume}:${page}</span>`;
      });
      // Render inline complex HTML tables
      html = html.replace(/\u00abHTMLTABLE:([\s\S]*?)\u00ab\/HTMLTABLE\u00bb/g, (match, content) => {
        let t = content.replace("<table>", '<table class="data-table">');
        t = t.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
        t = t.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
        t = t.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
        return t;
      });
      html = html.replace(/\{\{TABLE[H]?:([\s\S]*?)\}TABLE\}/g, (match, content) => {
        const rows = content.split("\n").filter(r => r.trim());
        if (rows.length === 1) {
          return `<span class="inline-table">${formatCell(rows[0])}</span>`;
        }
        const tableRows = rows.map(r => {
          const cells = r.split(" | ").map(c => `<td>${formatCell(c.trim())}</td>`).join("");
          return `<tr>${cells}</tr>`;
        }).join("");
        return `<table class="data-table">${tableRows}</table>`;
      });
      html = html.replace(/\u00abFN:(.*?)\u00ab\/FN\u00bb/gs, (match, content) => {
        footnoteCounter++;
        collectedFootnotes.push({ num: footnoteCounter, text: content });
        return `<sup class="footnote-ref" id="fnref-${footnoteCounter}"><a onclick="toggleFnPopup(event,${footnoteCounter});return false;" href="#">${footnoteCounter}</a><span class="fn-popup" id="fnpop-${footnoteCounter}"><span class="fn-popup-num">${footnoteCounter}.</span>${formatFootnoteText(content)}</span></sup>`;
      });
      // Render inline images — captions are pre-cleaned by the pipeline.
      // Filename must be unescaped before URL construction because the
      // surrounding paragraph was run through escapeHtml(), which would
      // otherwise double-encode entities like `'` → `&#39;` → `%26%2339%3B`
      // and produce a 403 on S3.
      html = html.replace(/\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}/g, (match, filename, caption) => {
        const url = commonsUrl(unescapeHtml(filename));
        return `<figure class="inline-image"><a href="${url}" target="_blank"><img src="${url}" alt="${caption || filename}" loading="lazy" /></a>${caption ? `<figcaption>${caption}</figcaption>` : ""}</figure>`;
      });
      // Render inline preformatted blocks (structural formulas)
      html = html.replace(/\u00abPRE:(.*?)\u00ab\/PRE\u00bb/gs, (match, content) => {
        const isFormula = /[─│┌┐└┘|\\\/]{3,}/.test(content);
        const cls = isFormula ? "structural-formula" : "text-block";
        return `<pre class="${cls}">${content}</pre>`;
      });
      // Render bold/italic/small-caps markers
      html = html.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      html = html.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      html = html.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      html = html.replace(/\u00abSH\u00bb(.*?)\u00ab\/SH\u00bb/gs, (match, text) => {
        sectionCounter++;
        const sectionId = `section-${sectionCounter}`;
        // De-hyphenate source line-wrap artifacts: "Poly-morphism." →
        // "Polymorphism." Displayed in margin AND used for comparison.
        const display = dehyphenateShoulder(text.trim());
        // Suppress only when this SH is the margin pointer for its
        // CONTAINING section (same name as the most recent top-level
        // heading, e.g. «SH»Polymorphism.«/SH» inside the Polymorphism
        // SEC section). SHs with different names are real subsections
        // and stay — e.g. "Fuji." inside JAPAN's "Geography" section.
        const isMarginPointer = currentSectionKey && sectionKey(display) === currentSectionKey;
        if (!isMarginPointer) {
          collectedSections.push({ id: sectionId, title: display, level: 2 });
        }
        return `<span class="shoulder-heading" id="${sectionId}">${escapeHtml(display)}</span>`;
      });
      // Detect if this paragraph is a single standalone equation (one math block, no other text)
      const mathCount = (html.match(/\u00abMATH:/g) || []).length;
      const mathOnly = mathCount === 1 && /^\s*(<span class="page-marker[^"]*"[^>]*>[^<]*<\/span>)?\s*\u00abMATH:.*?\u00ab\/MATH\u00bb[,.\s;:]*$/s.test(html);
      // Render math markers with KaTeX
      html = html.replace(/\u00abMATH:(.*?)\u00ab\/MATH\u00bb/gs, (match, latex) => {
        // Undo HTML escaping so KaTeX sees real LaTeX (& not &amp;, etc.)
        // Also convert \mbox to \text (KaTeX doesn't support \mbox)
        const tmp = document.createElement("textarea");
        tmp.innerHTML = latex;
        const raw = tmp.value.replace(/\\mbox\b/g, "\\text")
          .replace(/[\u2002\u2003\u2004\u2005\u2006\u2007\u2008\u2009\u200A\u00A0\u200B]/g, " ")
          .replace(/\\overset\{([^}]*)\}\s*\\underset\{([^}]*)\}\s*\{\\Sigma\s*/g, "\\sum_{$2}^{$1}{");
        const isDisplay = /\\begin\{/.test(raw) || mathOnly;
        try {
          if (typeof katex !== "undefined") {
            const result = katex.renderToString(raw, { throwOnError: false, displayMode: isDisplay });
            return result;
          }
        } catch(e) {
          console.warn("KaTeX error:", e.message, "LaTeX:", raw.substring(0, 80));
        }
        return `<code class="math-fallback">${escapeHtml(raw)}</code>`;
      });
      // Render hieroglyphs
      html = html.replace(/\[hieroglyph:\s*([^\]]+)\]/g, (match, codes) => {
        const rendered = codes.trim().split(/[:\s\-]+/).map(code => {
          code = code.replace(/\\/g, ""); // strip line break markers
          if (!code || code === "<" || code === ">" || code === "!" || code === "-") return "";
          const cp = gardinerToUnicode(code);
          if (cp) return `<span class="hieroglyph">&#x${cp.toString(16)};</span>`;
          return `<span class="hieroglyph-fallback" title="Gardiner ${code}">${code}</span>`;
        }).join("");
        return rendered || match;
      });
      // Replace link markers — only first mention becomes a hyperlink
      // 3-part resolved: «LN:filename|target|display«/LN»  2-part unresolved: «LN:target|display«/LN»
      html = html.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
        const hasFile = g3 !== undefined;
        const target = hasFile ? g2 : g1;
        const display = hasFile ? g3 : g2;
        const filename = hasFile ? g1 : null;
        const key = target.toLowerCase();
        if (linkedTargets.has(key)) return display;
        linkedTargets.add(key);
        const href = filename ? articleUrl(filename) : `/search.html?q=${encodeURIComponent(target)}`;
        return `<a href="${href}" class="article-link" title="${target}">${display}</a>`;
      });
      return `<p>${html}</p>`;
    }

    function articleFileNameFromTarget(target) {
      return `${String(target || "").trim().toLowerCase()}.json`;
    }

    function articleUrl(filename) {
      if (IS_LOCAL) {
        return `?article=/data/derived/articles/${encodeURIComponent(filename)}`;
      }
      const base = filename.replace(/\.json$/, "");
      // Stable IDs: "16-0670-lighthouse-LIGHTHOUSE". The ID is three
      // hyphen-separated tokens (vol, page, section-slug); everything
      // after is the title slug.
      const m = base.match(/^(\d{2}-\d{4}-[a-z0-9][a-z0-9-]*?)-(\p{Lu}[\p{Lu}0-9_-]*)$/u);
      if (m) {
        return `/article/${m[1]}/${m[2].toLowerCase()}`;
      }
      // Legacy numeric-ID filenames (shouldn't occur post-rebuild, but
      // keep the old split as a fallback).
      const page = base.replace(/^0+/, "").split("-")[0];
      const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
      return `/article/${page}/${slug}`;
    }

    function buildXrefHref(xref) {
      let base;
      if (xref?.target_filename) {
        base = articleUrl(xref.target_filename);
      } else if (xref?.normalized_target) {
        const fileName = articleFileNameFromTarget(xref.normalized_target);
        base = articleUrl(fileName);
      } else {
        return "#";
      }
      // If the xref targets a specific section within the article,
      // append the anchor. The viewer emits <h3 id="section-<slug>">
      // for absorbed subsections; match that slug here.
      if (xref?.target_section) {
        // Apply the same display normalization as the renderer so
        // "BrewingTrade" → "brewing-trade" on both sides.
        const slug = displaySectionName(xref.target_section)
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
        if (slug) base = base + "#section-" + slug;
      }
      return base;
    }

    function renderError(message) {
      app.innerHTML = `<div class="card"><div class="message error">${escapeHtml(message)}</div></div>`;
    }

    function scanUrl(article) {
      const back = encodeURIComponent(location.href);
      const base = IS_LOCAL ? 'scans.html' : '/scans.html';
      const start = article.ws_page_start || article.page_start;
      const end = article.ws_page_end || article.page_end;
      return `${base}?vol=${article.volume}&start=${start}&end=${end}&pstart=${article.page_start}&pend=${article.page_end}&label=${encodeURIComponent(article.title)}&back=${back}`;
    }

    function renderArticle(article) {
      currentVolume = article.volume || "?";
      unproofedPages = (article.source_quality && article.source_quality.unproofed_pages) ? article.source_quality.unproofed_pages : {};
      const segments = Array.isArray(article.segments) ? article.segments : [];
      const xrefs = (Array.isArray(article.xrefs) ? article.xrefs : [])
        .slice().sort((a, b) => (a.normalized_target || "").localeCompare(b.normalized_target || ""));
      const images = Array.isArray(article.images) ? article.images : [];
      const contributors = Array.isArray(article.contributors) ? article.contributors : [];
      const plates = Array.isArray(article.plates) ? article.plates : [];

      const xrefHtml = xrefs.length
        ? `
          <ul class="xref-list">
            ${xrefs.map(xref => {
              const normalized = xref.normalized_target || "";
              const resolved = (xref.status || "") === "resolved";

              return `
                <li class="xref-item ${resolved ? "resolved" : "unresolved"}">
                  ${resolved
                    ? `<a href="${buildXrefHref(xref)}">${escapeHtml(normalized)}</a>`
                    : escapeHtml(normalized)}
                </li>`;
            }).join("")}
          </ul>`
        : "";

      const segmentHtml = "";

      app.innerHTML = `
        <div class="card">
          <h1>${(() => {
            const t = escapeHtml(article.title || "Untitled");
            return `<span style="font-size:1.6em; line-height:1; vertical-align:baseline;">${t[0]}</span>${t.slice(1)}`;
          })()}</h1>
          <div style="font-size: 0.85rem; color: #6b5e4f; font-style: italic; margin-bottom: 6px;">
            <a href="${scanUrl(article)}" style="color: #6b5e4f;">vol. ${escapeHtml(article.volume ?? "?")}, ${article.page_start !== article.page_end ? `pp. ${escapeHtml(article.page_start ?? "")}–${escapeHtml(article.page_end ?? "")}` : `p. ${escapeHtml(article.page_start ?? "")}`}</a>
            ${article.word_count ? `&middot; ${article.word_count.toLocaleString()} words` : ""}
          </div>
          ${article.parent_article ? `<div style="margin-bottom: 8px; font-size: 0.95rem;">Plate for <a href="${articleUrl(article.parent_article.filename)}">${escapeHtml(article.parent_article.title)}</a></div>` : ""}
          ${contributors.length ? `<div class="contributors">By ${contributors.map(c => `<a href="/contributors.html?q=${encodeURIComponent(c.full_name)}" style="color: var(--muted);">${escapeHtml(c.full_name)}</a> <span style="color: var(--muted); font-size: 0.85em;">(${escapeHtml(c.initials)})</span>`).join(", ")}</div>` : ""}
          ${(() => {
            const topics = topicMap && article.filename
              ? (topicMap[article.filename] || []) : [];
            if (!topics.length) return "";
            const sep = ` <span style="color:var(--muted);">›</span> `;
            const list = topics.map(t => {
              const cat = `<a href="/topics.html#${encodeURIComponent(t.category)}" style="color:var(--link);">${escapeHtml(t.category)}</a>`;
              // Drop a sole 'General' path (the catch-all for cats
              // without a real subdivision) — showing 'History › General'
              // adds noise. Keep General when nested deeper.
              const path = (t.path || []);
              const trail = (path.length === 1 && path[0] === "General")
                ? ""
                : path.map(n => escapeHtml(n)).join(sep);
              return trail ? `${cat}${sep}${trail}` : cat;
            }).join("; ");
            return `<div class="contributors">In: ${list}</div>`;
          })()}
          ${(() => {
            const roman = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
            return (plates.length && article.article_type !== "plate") ? `<div class="contributors">Plates: ${plates.map((p, i) => `<a href="${articleUrl(p.filename)}">Plate ${roman[i] || i+1}</a>`).join(", ")}</div>` : "";
          })()}
          ${article.source_quality && article.source_quality.lowest_level <= 1
            ? `<div style="text-align: center; margin: 10px 0;">
                 <div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 6px 14px; font-size: 0.9rem; display: inline-block;">
                   <strong>Source quality notice:</strong> This article spans pages with unproofread transcriptions.
                 </div>
               </div>`
            : ""}
          ${(() => {
            footnoteCounter = 0; collectedFootnotes = []; linkedTargets = new Set(); sectionCounter = 0; collectedSections = []; emittedSectionKeys = new Set(); currentSectionKey = ""; wideTableCounter = 0; for (const k in wideTableSources) delete wideTableSources[k];

            // Page markers (\x01PAGE:N\x01) are embedded directly in the
            // body text by the transform stage.  If none are present
            // (e.g. single-page articles), inject one for page_start.
            let markedBody = article.body || "";
            if (markedBody.indexOf("\x01PAGE:") === -1 && article.page_start) {
              markedBody = `\x01PAGE:${article.page_start}\x01` + markedBody;
            }

            // Merge shoulder heading paragraphs with surrounding text.
            // A shoulder heading sits in the margin mid-sentence, so it
            // should not create paragraph breaks. Merge: prev + SH + next
            // into one paragraph.
            const rawParas = markedBody.split("\n\n");
            const mergedParas = [];
            let i = 0;
            while (i < rawParas.length) {
              if (rawParas[i].startsWith("\u00abSH\u00bb")) {
                // Shoulder heading: attach to previous, then absorb next
                const sh = rawParas[i];
                if (mergedParas.length > 0) {
                  mergedParas[mergedParas.length - 1] += " " + sh;
                } else {
                  mergedParas.push(sh);
                }
                // Also absorb the next paragraph (continuation of sentence)
                if (i + 1 < rawParas.length && !rawParas[i + 1].startsWith("\u00abSH\u00bb")) {
                  mergedParas[mergedParas.length - 1] += " " + rawParas[i + 1];
                  i++;
                }
              } else {
                mergedParas.push(rawParas[i]);
              }
              i++;
            }
            const bodyHtml = mergedParas.map((p, idx) => renderParagraph(p, mergedParas[idx + 1])).join("");
            const level1 = collectedSections.filter(s => s.level === 1);
            const level2 = collectedSections.filter(s => s.level === 2);
            let tocHtml = "";
            if (level1.length >= 2 && level2.length >= 1) {
              // Interleaved: major sections with shoulder headings
              // nested below. Level-2 items appearing before any
              // level-1 (orphans) render as standalone top-level items
              // so the HTML structure stays valid.
              let tocInner = "";
              let inSub = false;
              let seenLevel1 = false;
              for (const s of collectedSections) {
                if (s.level === 1) {
                  if (inSub) { tocInner += "</ul></li>"; inSub = false; }
                  else if (seenLevel1) { tocInner += "</li>"; }
                  tocInner += `<li><a href="#${s.id}">${escapeHtml(s.title)}</a>`;
                  seenLevel1 = true;
                } else if (!seenLevel1) {
                  // Orphan level-2: render as standalone top-level item
                  tocInner += `<li><a href="#${s.id}">${escapeHtml(s.title)}</a></li>`;
                } else {
                  if (!inSub) { tocInner += "<ul>"; inSub = true; }
                  tocInner += `<li><a href="#${s.id}">${escapeHtml(s.title)}</a></li>`;
                }
              }
              if (inSub) tocInner += "</ul></li>";
              else if (seenLevel1) tocInner += "</li>";
              tocHtml = `<div class="toc"><h3>Contents</h3><ul class="toc-contents">${tocInner}</ul></div>`;
            } else if (level1.length >= 2) {
              // Major sections only — unnumbered
              tocHtml = `<div class="toc"><h3>Contents</h3><ul class="toc-contents">${level1.map(s => `<li><a href="#${s.id}">${escapeHtml(s.title)}</a></li>`).join("")}</ul></div>`;
            } else if (level2.length >= 3) {
              // Shoulder headings only — numbered
              tocHtml = `<div class="toc"><h3>Sections</h3><ol>${level2.map(s => `<li><a href="#${s.id}">${escapeHtml(s.title)}</a></li>`).join("")}</ol></div>`;
            }
            return tocHtml + `<div class="body-text">${bodyHtml}</div>`;
          })()}
          ${collectedFootnotes.length ? `<div class="footnotes"><h3>Notes</h3><ol>${collectedFootnotes.map(fn => `<li id="fn-${fn.num}" value="${fn.num}"><a onclick="var el=document.getElementById('fnref-${fn.num}');if(el)el.scrollIntoView({behavior:'instant',block:'start'});return false;" href="#">${fn.num}.</a> ${formatFootnoteText(fn.text)}</li>`).join("")}</ol></div>` : ""}
        </div>

        ${xrefHtml ? `<div class="card">
          <h2>Cross-references</h2>
          ${xrefHtml}
        </div>` : ""}

      `;
    }

    async function loadArticle(path) {
      if (!path) {
        renderError("No article path provided.");
        return;
      }

      try {
        const [response] = await Promise.all([fetch(path), loadTopicMap()]);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} loading ${path}`);
        }

        const article = await response.json();
        // Derive filename from path so topicMap lookup works
        const fnMatch = path.match(/([^/]+\.json)$/);
        if (fnMatch) article.filename = fnMatch[1];
        renderArticle(article);
        // applyAbbreviations();  // Disabled: index abbreviations (Fr.=France)
        // differ from article abbreviations (Fr.=French). Needs a
        // context-aware or article-specific abbreviation list.

        // Update URL: production uses clean /article/{id}/{slug}, local uses ?article=
        // In both cases, preserve q / match params so search-result
        // links (viewer.html?article=…&q=term&match=3) survive the
        // rewrite and can drive the in-article search below.
        const existingParams = new URLSearchParams(window.location.search);
        const preserved = new URLSearchParams();
        for (const k of ["q", "match"]) {
          const v = existingParams.get(k);
          if (v !== null) preserved.set(k, v);
        }
        const suffix = preserved.toString() ? "?" + preserved.toString() : "";
        if (!IS_LOCAL) {
          // Stable ID form: "16-0670-lighthouse-TITLE.json" →
          // /article/16-0670-lighthouse/title
          let fnMatch = path.match(/(\d{2}-\d{4}-[a-z0-9][a-z0-9-]*?)-(\p{Lu}[\p{Lu}0-9_-]*)\.json$/u);
          if (fnMatch) {
            const cleanUrl = `/article/${fnMatch[1]}/${fnMatch[2].toLowerCase()}${suffix}`;
            window.history.replaceState({}, "", cleanUrl);
          } else {
            // Legacy numeric fallback
            fnMatch = path.match(/(\d+)-([^/]+)\.json$/);
            if (fnMatch) {
              const cleanUrl = `/article/${fnMatch[1]}/${fnMatch[2].toLowerCase()}${suffix}`;
              window.history.replaceState({}, "", cleanUrl);
            }
          }
        } else {
          const url = new URL(window.location.href);
          url.searchParams.set("article", path);
          // Delete + re-set preserved params so order is stable.
          for (const k of ["q", "match"]) url.searchParams.delete(k);
          for (const [k, v] of preserved) url.searchParams.set(k, v);
          window.history.replaceState({}, "", url);
        }
      } catch (error) {
        renderError(`Could not load article JSON from \"${path}\". ${error.message}`);
      }
    }

    // Determine article path: local uses ?article= param, production uses /article/{id}/{slug}
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE = IS_LOCAL ? "/data/derived/articles" : "/data/articles";
    const TOC_URL = IS_LOCAL ? "/data/derived/classified_toc.json" : "/data/classified_toc.json";

    // ── Abbreviation tooltips ──────────────────────────────────
    const ABBREV_URL = IS_LOCAL ? "/data/derived/abbreviations.json" : "/data/abbreviations.json";
    let abbrevsLoaded = null;  // Promise<Map<string,string>>
    function loadAbbreviations() {
      if (abbrevsLoaded) return abbrevsLoaded;
      abbrevsLoaded = fetch(ABBREV_URL)
        .then(r => r.ok ? r.json() : {})
        .then(obj => {
          // Build regex: sort keys longest-first, escape for regex.
          const keys = Object.keys(obj).sort((a, b) => b.length - a.length);
          const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
          // Match at word boundary or start of token, followed by
          // non-alphanumeric (punctuation/space/end).
          const pattern = new RegExp("(?<=\\s|^|>)(" + escaped.join("|") + ")(?=\\s|[,;:)\"<]|$)", "g");
          return { map: obj, pattern };
        })
        .catch(() => null);
      return abbrevsLoaded;
    }

    function applyAbbreviations() {
      loadAbbreviations().then(abbr => {
        if (!abbr) return;
        const bodyEl = document.querySelector(".body-text");
        if (!bodyEl) return;
        // Walk text nodes only — don't touch tags or existing <abbr>.
        const walker = document.createTreeWalker(bodyEl, NodeFilter.SHOW_TEXT);
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        for (const node of nodes) {
          // Skip nodes inside <abbr>, <a>, <code>, <pre>
          const parent = node.parentElement;
          if (parent && /^(ABBR|A|CODE|PRE|SCRIPT)$/i.test(parent.tagName)) continue;
          const text = node.textContent;
          if (!abbr.pattern.test(text)) continue;
          abbr.pattern.lastIndex = 0;
          const frag = document.createDocumentFragment();
          let lastIdx = 0;
          let m;
          while ((m = abbr.pattern.exec(text)) !== null) {
            if (m.index > lastIdx) {
              frag.appendChild(document.createTextNode(text.slice(lastIdx, m.index)));
            }
            const abbrEl = document.createElement("abbr");
            abbrEl.title = abbr.map[m[1]];
            abbrEl.textContent = m[1];
            frag.appendChild(abbrEl);
            lastIdx = m.index + m[0].length;
          }
          if (lastIdx < text.length) {
            frag.appendChild(document.createTextNode(text.slice(lastIdx)));
          }
          node.parentNode.replaceChild(frag, node);
        }
      });
    }

    // Reverse-index of classified_toc.json: filename → [{category, path}].
    // `path` is the full sub-tree trail (["Zoology","Systematic","Invertebrata"])
    // so deeper-nested leaves are addressable, not just level-2.
    let topicMap = null;
    async function loadTopicMap() {
      if (topicMap !== null) return topicMap;
      try {
        const resp = await fetch(TOC_URL);
        if (!resp.ok) { topicMap = {}; return topicMap; }
        const data = await resp.json();
        topicMap = {};
        function walk(cat, node, path) {
          const newPath = path.concat([node.name]);
          for (const art of node.articles || []) {
            if (!art.filename) continue;
            (topicMap[art.filename] = topicMap[art.filename] || [])
              .push({ category: cat, path: newPath });
          }
          for (const child of node.children || []) {
            walk(cat, child, newPath);
          }
        }
        for (const cat of data.categories || []) {
          for (const sub of cat.subsections || []) {
            walk(cat.name, sub, []);
          }
        }
      } catch (e) {
        topicMap = {};
      }
      return topicMap;
    }
    let initialPath = new URLSearchParams(window.location.search).get("article");
    if (!initialPath && !IS_LOCAL) {
      // Production: /article/16-0670-lighthouse/LIGHTHOUSE -> 16-0670-lighthouse-LIGHTHOUSE.json
      // (stable IDs: {vol:02d}-{page:04d}-{section-slug}, durable across rebuilds)
      const stableMatch = window.location.pathname.match(/^\/article\/(\d{2}-\d{4}-[a-z0-9-]+)\/(.+)/);
      if (stableMatch) {
        const id = stableMatch[1];
        const slug = decodeURIComponent(stableMatch[2]).toUpperCase();
        initialPath = `${DATA_BASE}/${id}-${slug}.json`;
      } else {
        // Legacy numeric-ID URL (pre-stable-ids rebuild). Try the old
        // format so bookmarks placed before the switch still load.
        const legacyMatch = window.location.pathname.match(/^\/article\/(\d+)\/(.+)/);
        if (legacyMatch) {
          const id = legacyMatch[1];
          const slug = decodeURIComponent(legacyMatch[2]).toUpperCase();
          initialPath = `${DATA_BASE}/${id}-${slug}.json`;
        }
      }
    }
    if (initialPath) {
      loadArticle(initialPath).then(() => {
        // If the URL carries ?q=…[&match=N], pre-populate the
        // in-article search box and jump to the Nth match. This is
        // how search.html / index.html's occurrence-click handoff
        // lands the reader right on the hit.
        const p = new URLSearchParams(window.location.search);
        const q = p.get("q");
        const matchParam = parseInt(p.get("match") || "1", 10);
        if (q) {
          articleSearchInput.value = q;
          runArticleSearch();
          const matches = document.querySelectorAll(".body-text .search-highlight");
          if (matches.length) {
            const n = Math.min(Math.max(1, matchParam || 1), matches.length);
            currentMatchIdx = n - 1;
            updateMatchNav();
          }
        }
      });
    }

    // In-article search
    const articleSearchInput = document.getElementById("articleSearch");
    const matchCountEl = document.getElementById("matchCount");
    const prevBtn = document.getElementById("prevMatch");
    const nextBtn = document.getElementById("nextMatch");
    const matchListEl = document.getElementById("matchList");
    let currentMatchIdx = -1;

    function buildMatchList() {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      matchListEl.innerHTML = "";
      if (matches.length === 0) {
        matchListEl.style.display = "none";
        return;
      }
      matchListEl.style.display = "block";
      // Group matches by parent paragraph to avoid duplicate snippets
      const seen = new Map();  // parent element → first match index
      matches.forEach((el, i) => {
        const parent = el.closest("p, td, blockquote, h3, li") || el.parentNode;
        if (seen.has(parent)) return;
        seen.set(parent, i);

        const fullText = parent.textContent || "";
        const matchText = el.textContent;
        const pos = fullText.indexOf(matchText);
        const ctxStart = Math.max(0, pos - 50);
        const ctxEnd = Math.min(fullText.length, pos + matchText.length + 50);
        // Highlight ALL occurrences of the query in the snippet
        const query = articleSearchInput.value.trim();
        const snippetRaw = (ctxStart > 0 ? "\u2026" : "") +
          fullText.slice(ctxStart, ctxEnd) +
          (ctxEnd < fullText.length ? "\u2026" : "");
        const snippetHtml = snippetRaw.replace(
          new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"),
          "<mark>$1</mark>"
        );

        const item = document.createElement("div");
        item.className = "match-item";
        item.innerHTML = snippetHtml;
        item.addEventListener("click", () => {
          currentMatchIdx = i;
          updateMatchNav();
        });
        matchListEl.appendChild(item);
      });
    }

    function updateMatchNav() {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      const total = matches.length;
      if (total === 0) {
        matchCountEl.textContent = "No matches";
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        matchListEl.style.display = "none";
        currentMatchIdx = -1;
        return;
      }
      prevBtn.style.display = "";
      nextBtn.style.display = "";
      matchCountEl.textContent = `${currentMatchIdx + 1} of ${total}`;
      matches.forEach((m, i) => {
        m.classList.toggle("search-highlight-current", i === currentMatchIdx);
      });
      // Update active state in match list
      matchListEl.querySelectorAll(".match-item").forEach((item, i) => {
        item.classList.toggle("active", i === currentMatchIdx);
      });
      if (currentMatchIdx >= 0 && currentMatchIdx < total) {
        matches[currentMatchIdx].scrollIntoView({ behavior: "instant", block: "center" });
        // Scroll match list panel (not the page) to keep active item visible
        const activeItem = matchListEl.querySelector(".match-item.active");
        if (activeItem) {
          const listTop = matchListEl.scrollTop;
          const listHeight = matchListEl.clientHeight;
          const itemTop = activeItem.offsetTop - matchListEl.offsetTop;
          if (itemTop < listTop || itemTop + activeItem.offsetHeight > listTop + listHeight) {
            matchListEl.scrollTop = itemTop - listHeight / 2;
          }
        }
      }
    }

    function goToMatch(delta) {
      const matches = document.querySelectorAll(".body-text .search-highlight");
      if (!matches.length) return;
      currentMatchIdx = (currentMatchIdx + delta + matches.length) % matches.length;
      updateMatchNav();
    }

    prevBtn.addEventListener("click", () => goToMatch(-1));
    nextBtn.addEventListener("click", () => goToMatch(1));

    function runArticleSearch() {
      const query = articleSearchInput.value.trim();
      lastSearchedQuery = query;
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;

      // Remove existing highlights
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();

      if (!query) {
        matchCountEl.textContent = "";
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
        matchListEl.style.display = "none";
        matchListEl.innerHTML = "";
        currentMatchIdx = -1;
        return;
      }

      // Walk text nodes and highlight matches
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");

      function highlightNode(node) {
        if (node.nodeType === 3) {
          const text = node.textContent;
          if (regex.test(text)) {
            regex.lastIndex = 0;
            const span = document.createElement("span");
            span.innerHTML = text.replace(regex, (match) => {
              return `<span class="search-highlight">${match}</span>`;
            });
            node.parentNode.replaceChild(span, node);
          }
        } else if (node.nodeType === 1 && !node.classList?.contains("search-highlight")) {
          Array.from(node.childNodes).forEach(highlightNode);
        }
      }

      highlightNode(bodyEl);
      buildMatchList();
      currentMatchIdx = -1;
      // Show count and list but don't scroll — let the user pick a match
      const total = document.querySelectorAll(".body-text .search-highlight").length;
      matchCountEl.textContent = total ? `${total} match${total !== 1 ? "es" : ""}` : "No matches";
      prevBtn.style.display = total ? "" : "none";
      nextBtn.style.display = total ? "" : "none";
    }

    articleSearchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const query = articleSearchInput.value.trim();
        if (!query) {
          // Empty query: clear everything
          runArticleSearch();
          return;
        }
        const matches = document.querySelectorAll(".body-text .search-highlight");
        if (matches.length === 0) {
          // First Enter: run the search (no scroll)
          runArticleSearch();
        } else {
          // Subsequent Enter: navigate/scroll
          goToMatch(e.shiftKey ? -1 : 1);
        }
      } else if (e.key === "Escape") {
        articleSearchInput.value = "";
        runArticleSearch();
        articleSearchInput.blur();
      }
    });

    // If query text changes from what was last searched, clear old results
    let lastSearchedQuery = "";
    articleSearchInput.addEventListener("input", () => {
      const current = articleSearchInput.value.trim();
      if (current === lastSearchedQuery) return;
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();
      matchCountEl.textContent = "";
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      matchListEl.style.display = "none";
      matchListEl.innerHTML = "";
      currentMatchIdx = -1;
    });
    // --- Top/bottom navigation arrows ---
    // --- Jump-to-article autocomplete ---
    (function() {
      const input = document.getElementById("jumpTo");
      const results = document.getElementById("jumpResults");
      let articles = null;
      let selected = -1;
