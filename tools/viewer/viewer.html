<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Britannica Viewer</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --border: #d0d7de;
      --link: #0969da;
      --unresolved: #b42318;
      --resolved-bg: #eff6ff;
      --unresolved-bg: #fff1f1;
      --code-bg: #f6f8fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input[type="text"] {
      flex: 1 1 380px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
    }

    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: #f3f4f6; }

    .body-text {
      font-size: 1.08rem;
    }

    .body-text p {
      text-indent: 1.5em;
      margin: 0 0 0.4em 0;
    }

    .xref-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .xref-item {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .xref-item.resolved {
      background: var(--resolved-bg);
    }

    .xref-item.unresolved {
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .xref-item.unresolved a,
    .unresolved-text {
      color: var(--unresolved);
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .segments {
      display: grid;
      gap: 12px;
    }

    .segment {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafbfc;
    }

    .segment-meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .message {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .error {
      color: var(--unresolved);
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    details summary {
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .article-image {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fafbfc;
    }

    .article-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .article-image figcaption {
      padding: 8px 10px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.85rem;
      color: var(--text);
    }

    .article-image figcaption.filename {
      color: var(--muted);
      font-size: 0.8rem;
      word-break: break-all;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.95rem;
    }

    .data-table td {
      padding: 4px 10px;
      border: 1px solid var(--border);
      vertical-align: top;
    }

    .data-table tr:first-child td {
    }

    .article-link {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px dotted var(--link);
    }

    .article-link:hover {
      border-bottom-style: solid;
    }

    .search-highlight {
      background: #fff3cd;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .footnote-ref a {
      color: var(--link);
      text-decoration: none;
      font-size: 0.8em;
      padding: 0 2px;
    }

    .footnotes {
      border-top: 1px solid var(--border);
      margin-top: 24px;
      padding-top: 16px;
    }

    .footnotes h3 {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .footnotes ol {
      font-size: 0.9rem;
      padding-left: 24px;
      color: var(--text);
    }

    .footnotes li {
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .footnotes li a {
      color: var(--link);
      text-decoration: none;
      margin-right: 4px;
    }

    .inline-image {
      margin: 1em auto;
      text-align: center;
      max-width: 600px;
    }

    .inline-image img {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .inline-image figcaption {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    .contributors {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Britannica Minimal Viewer</h1>
      <div style="margin-bottom: 12px; font-size: 0.9rem;">
        <a href="index.html" style="color: var(--link); text-decoration: none;">&larr; Index</a>
        &nbsp;&nbsp;
        <a href="search.html" style="color: var(--link); text-decoration: none;">Search</a>
        &nbsp;&nbsp;
        <a href="contributors.html" style="color: var(--link); text-decoration: none;">Contributors</a>
      </div>
      <div class="controls">
        <input id="articlePath" type="text" placeholder="data/derived/articles/abandon.json" />
        <button id="loadButton">Load Article</button>
      </div>
      <div class="controls">
        <input id="articleSearch" type="text" placeholder="Search within article..." style="flex: 0 1 260px; min-width: 160px;" />
        <span id="matchCount" style="color: var(--muted); font-size: 0.85rem;"></span>
      </div>
      <div class="message">
        Enter a path to an exported article JSON file, or open this page with
        <code>?article=data/derived/articles/abandon.json</code>.
      </div>
    </div>

    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById("app");
    const articlePathInput = document.getElementById("articlePath");
    const loadButton = document.getElementById("loadButton");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function commonsUrl(filename) {
      const name = filename.replace(/ /g, "_");
      // Simple MD5 — we'll use the SubtleCrypto API
      // For now, use the pre-computed URL from the images array if available
      // Fall back to the wiki thumbnail API which doesn't need MD5
      return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(name)}?width=600`;
    }

    let footnoteCounter = 0;
    let collectedFootnotes = [];
    let linkedTargets = new Set();

    function renderParagraph(p) {
      const imgMatch = p.match(/^\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}$/);
      if (imgMatch) {
        const filename = imgMatch[1];
        const caption = imgMatch[2] || "";
        const url = commonsUrl(filename);
        return `<figure class="inline-image">
          <a href="${url}" target="_blank"><img src="${url}" alt="${escapeHtml(caption || filename)}" loading="lazy" /></a>
          ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ""}
        </figure>`;
      }
      // Render table markers
      const tableMatch = p.match(/^\{\{TABLE:([\s\S]*)\}TABLE\}$/);
      if (tableMatch) {
        const rows = tableMatch[1].split("\n").filter(r => r.trim());
        const tableRows = rows.map(r => {
          const cells = r.split(" | ").map(c => `<td>${escapeHtml(c.trim())}</td>`).join("");
          return `<tr>${cells}</tr>`;
        }).join("");
        return `<table class="data-table">${tableRows}</table>`;
      }

      // Replace footnote markers with superscript numbers
      let html = escapeHtml(p);
      html = html.replace(/\u00abFN:(.*?)\u00bb/gs, (match, content) => {
        footnoteCounter++;
        collectedFootnotes.push({ num: footnoteCounter, text: content });
        return `<sup class="footnote-ref"><a href="#fn-${footnoteCounter}" id="fnref-${footnoteCounter}">${footnoteCounter}</a></sup>`;
      });
      // Replace link markers — only first mention becomes a hyperlink
      html = html.replace(/\u00abLN:([^|]*)\|([^\u00bb]*)\u00bb/g, (match, target, display) => {
        const key = target.toLowerCase();
        if (linkedTargets.has(key)) {
          return display; // subsequent mentions: plain text
        }
        linkedTargets.add(key);
        // Search for the target article
        return `<a href="search.html?q=${encodeURIComponent(target)}" class="article-link" title="${target}">${display}</a>`;
      });
      return `<p>${html}</p>`;
    }

    function articleFileNameFromTarget(target) {
      return `${String(target || "").trim().toLowerCase()}.json`;
    }

    function buildXrefHref(xref) {
      if (xref?.target_filename) {
        return `?article=/data/derived/articles/${encodeURIComponent(xref.target_filename)}`;
      }
      if (!xref?.normalized_target) return "#";
      const fileName = articleFileNameFromTarget(xref.normalized_target);
      return `?article=/data/derived/articles/${encodeURIComponent(fileName)}`;
    }

    function renderError(message) {
      app.innerHTML = `<div class="card"><div class="message error">${escapeHtml(message)}</div></div>`;
    }

    function renderArticle(article) {
      const segments = Array.isArray(article.segments) ? article.segments : [];
      const xrefs = Array.isArray(article.xrefs) ? article.xrefs : [];
      const images = Array.isArray(article.images) ? article.images : [];
      const contributors = Array.isArray(article.contributors) ? article.contributors : [];
      const plates = Array.isArray(article.plates) ? article.plates : [];

      const xrefHtml = xrefs.length
        ? `
          <ul class="xref-list">
            ${xrefs.map(xref => {
              const status = xref.status || "unknown";
              const type = xref.xref_type || "xref";
              const rawSurface = xref.surface_text || xref.normalized_target || "(unknown target)";
              const surface = rawSurface.replace(/\u00abLN:[^|]*\|([^\u00bb]*)\u00bb/g, "$1");
              const normalized = xref.normalized_target || "";
              const resolved = status === "resolved";

              return `
                <li class="xref-item ${resolved ? "resolved" : "unresolved"}">
                  <strong>${escapeHtml(surface)}</strong>
                  <span class="pill">${escapeHtml(type)}</span>
                  <span class="pill">${escapeHtml(status)}</span>
                  <div style="margin-top:8px;">
                    ${resolved
                      ? `<a href="${buildXrefHref(xref)}">Open target: ${escapeHtml(normalized)}</a>`
                      : `<span class="unresolved-text">Unresolved target: ${escapeHtml(normalized || "(missing normalized target)")}</span>`}
                  </div>
                </li>`;
            }).join("")}
          </ul>`
        : `<div class="message">No cross-references for this article.</div>`;

      const segmentHtml = segments.length
        ? `
          <details>
            <summary>Show segments (${segments.length})</summary>
            <div class="segments">
              ${segments.map(segment => `
                <div class="segment">
                  <div class="segment-meta">
                    Sequence ${escapeHtml(segment.sequence_in_article)}
                    · Source page ${escapeHtml(segment.source_page_id)}
                  </div>
                  <div>${escapeHtml(segment.segment_text || "")}</div>
                </div>
              `).join("")}
            </div>
          </details>`
        : `<div class="message">No segments available.</div>`;

      app.innerHTML = `
        <div class="card">
          <h1>${escapeHtml(article.title || "Untitled")}</h1>
          <div class="meta">
            Volume ${escapeHtml(article.volume ?? "?")}
            · pages ${escapeHtml(article.page_start ?? "?")}–${escapeHtml(article.page_end ?? "?")}
            · article id ${escapeHtml(article.id ?? "?")}
          </div>
          ${contributors.length ? `<div class="contributors">By ${contributors.map(c => `<span title="${escapeHtml(c.initials)}">${escapeHtml(c.full_name)}</span>`).join(", ")}</div>` : ""}
          ${plates.length ? `<div class="contributors">Plates: ${plates.map(p => `<a href="?article=/data/derived/articles/${encodeURIComponent(p.filename)}">${escapeHtml(p.title)}</a>`).join(", ")}</div>` : ""}
          <div class="body-text">${(() => { footnoteCounter = 0; collectedFootnotes = []; linkedTargets = new Set(); return (article.body || "").split("\n\n").map(p => renderParagraph(p)).join(""); })()}</div>
          ${collectedFootnotes.length ? `<div class="footnotes"><h3>Notes</h3><ol>${collectedFootnotes.map(fn => `<li id="fn-${fn.num}"><a href="#fnref-${fn.num}">\u2191</a> ${fn.text}</li>`).join("")}</ol></div>` : ""}
        </div>

        ${images.length ? `
        <div class="card">
          <h2>Images (${images.length})</h2>
          <div class="image-grid">
            ${images.map(img => `
              <figure class="article-image">
                <a href="${escapeHtml(img.commons_url)}" target="_blank">
                  <img src="${escapeHtml(img.commons_url)}" alt="${escapeHtml(img.caption || img.filename)}" loading="lazy" />
                </a>
                ${img.caption ? `<figcaption>${escapeHtml(img.caption)}</figcaption>` : `<figcaption class="filename">${escapeHtml(img.filename)}</figcaption>`}
              </figure>
            `).join("")}
          </div>
        </div>` : ""}

        <div class="card">
          <h2>Cross-references</h2>
          ${xrefHtml}
        </div>

      `;
    }

    async function loadArticle(path) {
      if (!path) {
        renderError("No article path provided.");
        return;
      }

      articlePathInput.value = path;

      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} loading ${path}`);
        }

        const article = await response.json();
        renderArticle(article);

        const url = new URL(window.location.href);
        url.searchParams.set("article", path);
        window.history.replaceState({}, "", url);
      } catch (error) {
        renderError(`Could not load article JSON from \"${path}\". ${error.message}`);
      }
    }

    loadButton.addEventListener("click", () => {
      loadArticle(articlePathInput.value.trim());
    });

    articlePathInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        loadArticle(articlePathInput.value.trim());
      }
    });

    const initialPath = new URLSearchParams(window.location.search).get("article");
    if (initialPath) {
      loadArticle(initialPath);
    }

    // In-article search
    const articleSearchInput = document.getElementById("articleSearch");
    const matchCountEl = document.getElementById("matchCount");

    articleSearchInput.addEventListener("input", () => {
      const query = articleSearchInput.value.trim();
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;

      // Remove existing highlights
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();

      if (!query) {
        matchCountEl.textContent = "";
        return;
      }

      // Walk text nodes and highlight matches
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
      let count = 0;

      function highlightNode(node) {
        if (node.nodeType === 3) {
          const text = node.textContent;
          if (regex.test(text)) {
            regex.lastIndex = 0;
            const span = document.createElement("span");
            span.innerHTML = text.replace(regex, (match) => {
              count++;
              return `<span class="search-highlight">${match}</span>`;
            });
            node.parentNode.replaceChild(span, node);
          }
        } else if (node.nodeType === 1 && !node.classList?.contains("search-highlight")) {
          Array.from(node.childNodes).forEach(highlightNode);
        }
      }

      highlightNode(bodyEl);
      matchCountEl.textContent = count ? `${count} match${count !== 1 ? "es" : ""}` : "No matches";

      // Scroll to first match
      const first = bodyEl.querySelector(".search-highlight");
      if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  </script>
</body>
</html>
