<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Egyptian+Hieroglyphs&display=swap">
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --unresolved: #b42318;
      --resolved-bg: #f5f0e8;
      --unresolved-bg: #fff1f1;
      --code-bg: #f0ebe3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }

    h1, h2, h3 {
      margin-top: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    .meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input[type="text"] {
      flex: 1 1 380px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      background: var(--panel);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
    }

    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      cursor: pointer;
      font: inherit;
    }

    button:hover { background: var(--code-bg); }

    .body-text {
      font-size: 1.08rem;
      margin-left: 6.5em;
      margin-right: 160px;
      position: relative;
    }

    @media (max-width: 900px) {
      .body-text {
        margin-right: 0;
      }
    }

    .body-text p {
      text-indent: 1.5em;
      margin: 0 0 0.5em 0;
      position: relative;
    }

    .body-text p:first-of-type {
      text-indent: 0;
    }

    .xref-list {
      list-style: none;
      padding: 0;
      margin: 0;
      columns: 2;
      column-gap: 2em;
    }

    .xref-item {
      padding: 2px 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .xref-item.unresolved {
      color: var(--muted);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      background: rgba(139, 115, 85, 0.08);
      border-radius: 2px;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 8px;
      vertical-align: middle;
    }

    .segments {
      display: grid;
      gap: 12px;
    }

    .segment {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fafbfc;
    }

    .segment-meta {
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .message {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .error {
      color: var(--unresolved);
      background: var(--unresolved-bg);
      border-color: #f0c4c4;
    }

    code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }

    details summary {
      cursor: pointer;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .article-image {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: var(--panel);
    }

    .article-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .article-image figcaption {
      padding: 8px 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .article-image figcaption.filename {
      color: var(--muted);
      font-size: 0.78rem;
      font-style: normal;
      word-break: break-all;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.93rem;
      border: 1px solid #c4b49a;
    }

    .data-table td {
      padding: 5px 10px;
      border: 1px solid #ddd4c4;
      vertical-align: top;
    }

    .data-table tr:nth-child(even) td {
      background: #f7f3ec;
    }

    .data-table tr:nth-child(odd) td {
      background: var(--panel);
    }

    .data-table th {
      padding: 6px 10px;
      border: 1px solid #c4b49a;
      background: #ebe4d6;
      font-weight: 600;
      text-align: left;
      font-variant: small-caps;
      letter-spacing: 0.03em;
      color: #5c4a32;
    }

    .small-caps {
      font-variant: small-caps;
    }

    .verse {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      margin: 1em 2em;
      padding-left: 1em;
      border-left: 2px solid #8b7355;
      line-height: 1.6;
    }

    .page-marker {
      float: left;
      margin-left: -6.5em;
      width: 5em;
      text-align: right;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.65rem;
      font-style: italic;
      color: #8b7355;
      padding-right: 0.6em;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    .page-marker.unproofed {
      color: #b85c00;
      font-weight: 600;
    }

    .page-marker.unproofed::after {
      content: " \25C6";
      font-size: 0.5em;
      vertical-align: super;
    }

    @media (max-width: 700px) {
      .body-text { margin-left: 0; }
      .page-marker { display: none; }
    }

    .hieroglyph {
      font-family: "Noto Sans Egyptian Hieroglyphs", serif;
      font-size: 1.4em;
      vertical-align: middle;
      line-height: 1;
    }

    .hieroglyph-fallback {
      font-family: monospace;
      font-size: 0.85em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      color: var(--muted);
    }

    .structural-formula {
      font-family: "Courier New", Courier, monospace;
      font-size: 0.95em;
      margin: 0.8em 2em;
      padding: 0.5em 1em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      line-height: 1.4;
      overflow-x: auto;
      white-space: pre;
    }

    .section-heading {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.1rem;
      font-variant: small-caps;
      letter-spacing: 0.04em;
      margin-top: 1.8em;
      margin-bottom: 0.4em;
      color: #5c4a32;
      text-align: center;
      text-indent: 0;
    }

    .section-heading::before {
      content: "\2014\2002";
    }

    .section-heading::after {
      content: "\2002\2014";
    }

    .body-text p {
      position: relative;
    }

    .shoulder-heading {
      position: absolute;
      right: -170px;
      width: 150px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--muted);
      text-align: left;
      text-indent: 0;
    }

    /* On narrow screens, inline the shoulder headings */
    @media (max-width: 900px) {
      .shoulder-heading {
        position: static;
        display: block;
        width: auto;
        margin: 0.5em 0 0.2em;
        font-weight: 600;
        color: var(--text);
      }
    }

    .toc {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
    }

    .toc h3 {
      margin: 0 0 8px 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .toc ol {
      margin: 0;
      padding-left: 20px;
      columns: 2;
      column-gap: 24px;
    }

    .toc li {
      margin-bottom: 3px;
    }

    .toc a {
      color: var(--link);
      text-decoration: none;
    }

    .toc a:hover { text-decoration: underline; }

    .article-link {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px dotted #b89a6b;
    }

    .article-link:hover {
      border-bottom-style: solid;
    }

    .search-highlight {
      background: #fff3cd;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .footnote-ref {
      position: relative;
      display: inline;
    }

    .footnote-ref a {
      color: #7b3f00;
      text-decoration: none;
      font-size: 1em;
      font-weight: 700;
      padding: 0 2px;
      cursor: pointer;
    }

    .fn-popup {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      max-width: 80vw;
      max-height: 200px;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid #8b7355;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 200;
      font-style: normal;
      font-variant: normal;
      text-indent: 0;
    }

    .fn-popup.visible {
      display: block;
    }

    .fn-popup-num {
      font-weight: 600;
      color: #8b7355;
      margin-right: 4px;
    }

    .footnotes {
      border-top: 1px solid #8b7355;
      margin-top: 32px;
      padding-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footnotes h3 {
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: #8b7355;
      margin-bottom: 10px;
    }

    .footnotes ol {
      padding-left: 24px;
      list-style: none;
    }

    .footnotes li {
      margin-bottom: 6px;
      text-indent: -1.5em;
      padding-left: 1.5em;
    }

    .footnotes li a {
      color: #8b7355;
      text-decoration: none;
      font-weight: 600;
      margin-right: 2px;
    }

    .inline-image {
      margin: 1.2em auto;
      text-align: center;
      max-width: 600px;
    }

    .inline-image img {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .inline-image figcaption {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
      line-height: 1.4;
    }

    .contributors {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h1 style="margin: 0; font-variant: normal; letter-spacing: 0.02em; font-size: 1.3rem; font-style: italic; color: #5c4a32;">Encyclop&aelig;dia Britannica, 11th Edition</h1>
        <div style="font-size: 0.9rem;">
          <a href="/home.html" style="color: var(--link); text-decoration: none;">Home</a>
          &nbsp;&middot;&nbsp;
          <a href="/index.html" style="color: var(--link); text-decoration: none;">Articles</a>
          &nbsp;&middot;&nbsp;
          <a href="/contributors.html" style="color: var(--link); text-decoration: none;">Contributors</a>
        </div>
      </div>
      <div class="controls">
        <div style="position: relative; flex: 0 1 280px; min-width: 180px;">
          <input id="jumpTo" type="text" placeholder="Go to article..." style="width: 100%;" autocomplete="off" />
          <ul id="jumpResults" style="display:none; position:absolute; top:100%; left:0; right:0; margin:0; padding:0; list-style:none; background:var(--panel); border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; max-height:240px; overflow-y:auto; z-index:100; font-size:0.9rem;"></ul>
        </div>
        <input id="articleSearch" type="text" placeholder="Search within article..." style="flex: 0 1 260px; min-width: 160px;" />
        <span id="matchCount" style="color: var(--muted); font-size: 0.85rem;"></span>
      </div>
    </div>
    <div class="header-divider">&#x223C;&#x25C6;&#x223C;</div>
    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById("app");

    function toggleFnPopup(event, num) {
      event.stopPropagation();
      const popup = document.getElementById('fnpop-' + num);
      if (!popup) return;
      const wasVisible = popup.classList.contains('visible');
      // Close all open popups
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
      if (!wasVisible) popup.classList.add('visible');
    }

    // Close popups when clicking elsewhere
    document.addEventListener('click', () => {
      document.querySelectorAll('.fn-popup.visible').forEach(p => p.classList.remove('visible'));
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // Gardiner Sign List -> Unicode Egyptian Hieroglyphs (U+13000 block)
    // Each category starts at a known base offset; sign number maps to base + (n-1).
    const GARDINER_BASES = {
      A:0x13000,B:0x13032,C:0x13037,D:0x13044,E:0x130A4,F:0x130C6,
      G:0x130F9,H:0x13131,I:0x1313B,K:0x1314D,L:0x13153,M:0x1315C,
      N:0x13189,O:0x131B3,P:0x131E7,Q:0x131F0,R:0x131F7,S:0x13210,
      T:0x1323D,U:0x13260,V:0x13286,W:0x132A9,X:0x132C2,Y:0x132CA,
      Z:0x132CF,Aa:0x132DB,
    };

    // Manuel de Codage phonetic abbreviations -> Gardiner codes
    const MDC_TO_GARDINER = {
      A:"G53",  // Abbreviation for the A-vulture (G53)
      H:"O4",   // reed shelter
      S:"S29",  // folded cloth
      s:"S29",
      t:"X1",   // bread loaf
      q:"Q3",   // stool
      sw:"M23", // sedge
      pr:"O1",  // house
      anx:"S34",// ankh
      nH:"S3",  // Red Crown
      zA:"V17", // sa (protection)
      aA:"G25", // jabiru
      xpr:"L1", // scarab
      nDs:"N33",// grain
      Hm:"U36", // pestle
      Xrd:"A17",// child
      DA:"I10", // cobra
      "N35A":"N35","N35B":"N35","V10A":"V10", // variants
    };

    function gardinerToUnicode(code) {
      if (code.includes("*")) code = code.split("*")[0];
      // Try MdC abbreviation first
      if (MDC_TO_GARDINER[code]) code = MDC_TO_GARDINER[code];
      const m = code.match(/^([A-Z]a?)(\d+)$/);
      if (!m) return null;
      const base = GARDINER_BASES[m[1]];
      if (base == null) return null;
      const cp = base + parseInt(m[2]) - 1;
      return (cp >= 0x13000 && cp <= 0x1342F) ? cp : null;
    }

    function commonsUrl(filename) {
      // Full URLs (e.g. score images from upload.wikimedia.org) pass through
      if (filename.startsWith("http://") || filename.startsWith("https://")) return filename;
      const name = filename.replace(/ /g, "_");
      // Simple MD5 — we'll use the SubtleCrypto API
      // For now, use the pre-computed URL from the images array if available
      // Fall back to the wiki thumbnail API which doesn't need MD5
      return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(name)}?width=600`;
    }

    let footnoteCounter = 0;
    let currentVolume = "?";
    let unproofedPages = {};
    let collectedFootnotes = [];
    let linkedTargets = new Set();
    let sectionCounter = 0;
    let collectedSections = [];

    function formatFootnoteText(text) {
      // Input may already be HTML-escaped (from formatCell or renderParagraph),
      // so don't escape again.
      let h = text;
      h = h.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
        const hasFile = g3 !== undefined;
        const target = hasFile ? g2 : g1;
        const display = hasFile ? g3 : g2;
        const filename = hasFile ? g1 : null;
        const href = filename ? articleUrl(filename) : `/search.html?q=${encodeURIComponent(target)}`;
        return `<a href="${href}" class="article-link" title="${target}">${display}</a>`;
      });
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      return h;
    }

    function formatCell(text) {
      let h = escapeHtml(text);
      h = h.replace(/\u00abFN:(.*?)\u00ab\/FN\u00bb/gs, (match, content) => {
        footnoteCounter++;
        collectedFootnotes.push({ num: footnoteCounter, text: content });
        return `<sup class="footnote-ref" id="fnref-${footnoteCounter}"><a onclick="toggleFnPopup(event,${footnoteCounter});return false;" href="#">${footnoteCounter}</a><span class="fn-popup" id="fnpop-${footnoteCounter}"><span class="fn-popup-num">${footnoteCounter}.</span>${formatFootnoteText(content)}</span></sup>`;
      });
      h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      h = h.replace(/\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}/g, (match, filename, caption) => {
        const url = filename.startsWith("http") ? filename : commonsUrl(filename);
        return `<img src="${url}" alt="${escapeHtml(caption || filename)}" class="cell-image" loading="lazy" style="max-height:60px;" />`;
      });
      h = h.replace(/\[hieroglyph:\s*([^\]]+)\]/g, (match, codes) => {
        const rendered = codes.trim().split(/[:\s\-]+/).map(code => {
          code = code.replace(/\\/g, "");
          if (!code || code === "<" || code === ">" || code === "!" || code === "-") return "";
          const cp = gardinerToUnicode(code);
          if (cp) return `<span class="hieroglyph">&#x${cp.toString(16)};</span>`;
          return `<span class="hieroglyph-fallback" title="Gardiner ${code}">${code}</span>`;
        }).join("");
        return rendered || match;
      });
      return h;
    }

    function renderParagraph(p) {
      const imgMatch = p.match(/^\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}$/);
      if (imgMatch) {
        const filename = imgMatch[1];
        const caption = imgMatch[2] || "";
        const url = commonsUrl(filename);
        return `<figure class="inline-image">
          <a href="${url}" target="_blank"><img src="${url}" alt="${escapeHtml(caption || filename)}" loading="lazy" /></a>
          ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ""}
        </figure>`;
      }
      // Render standalone small-caps paragraphs as section headings
      // (e.g. «SC»II.—The People«/SC» in multi-section articles like JAPAN)
      const scSectionMatch = p.match(/^\u00abSC\u00bb([^\u00ab]+)\u00ab\/SC\u00bb$/);
      if (scSectionMatch) {
        sectionCounter++;
        const text = scSectionMatch[1].trim();
        const sectionId = `section-${sectionCounter}`;
        const slug = text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        collectedSections.push({ id: sectionId, title: text, slug });
        return `<h3 class="section-heading" id="${sectionId}" data-slug="${slug}">${escapeHtml(text)}</h3>`;
      }
      // Render preformatted blocks (structural chemical formulas)
      const preMatch = p.match(/^\u00abPRE:([\s\S]*)\u00ab\/PRE\u00bb$/);
      if (preMatch) {
        return `<pre class="structural-formula">${escapeHtml(preMatch[1])}</pre>`;
      }
      // Render verse markers
      const verseMatch = p.match(/^\{\{VERSE:([\s\S]*)\}VERSE\}$/);
      if (verseMatch) {
        const lines = verseMatch[1].split("\n").filter(l => l.trim());
        return `<blockquote class="verse">${lines.map(l => escapeHtml(l)).join("<br>")}</blockquote>`;
      }
      // Render table markers (with or without headers)
      const tableMatch = p.match(/^\{\{TABLE(H?):([\s\S]*)\}TABLE\}$/);
      if (tableMatch) {
        const hasHeader = tableMatch[1] === "H";
        const rows = tableMatch[2].split("\n").filter(r => r.trim());
        // Single-row tables render inline (common for hieroglyph glosses)
        if (rows.length === 1 && !hasHeader) {
          return `<span class="inline-table">${formatCell(rows[0])}</span>`;
        }
        const tableRows = rows.map((r, i) => {
          const tag = (hasHeader && i === 0) ? "th" : "td";
          const cells = r.split(" | ").map(c => `<${tag}>${formatCell(c.trim())}</${tag}>`).join("");
          return `<tr>${cells}</tr>`;
        }).join("");
        return `<table class="data-table">${tableRows}</table>`;
      }

      // Detect section headings: "Section Name.—rest of paragraph"
      // Strip «SC»/«/SC» markers so small-caps headings like «SC»Bibliography.«/SC»— are detected
      const pStripped = p.replace(/\u00abSC\u00bb/g, "").replace(/\u00ab\/SC\u00bb/g, "");
      const sectionMatch = pStripped.match(/^([A-Z][A-Za-z\s,\-&]+)\.\u2014(.*)$/s);
      if (sectionMatch && sectionMatch[1].length < 60) {
        sectionCounter++;
        const sectionTitle = sectionMatch[1].trim();
        const sectionId = `section-${sectionCounter}`;
        collectedSections.push({ id: sectionId, title: sectionTitle });

        // Extract the body from the ORIGINAL paragraph (preserving all markers)
        const emDashIdx = p.indexOf("\u2014");
        const sectionBody = emDashIdx >= 0 ? p.substring(emDashIdx + 1).trim() : "";
        const bodyHtml = renderParagraph(sectionBody);

        return `<h3 class="section-heading" id="${sectionId}">${escapeHtml(sectionTitle)}</h3>${bodyHtml}`;
      }

      // Replace inline table markers (single-row tables embedded in text)
      let html = escapeHtml(p);
      // Render page markers as left-margin citations (vol:page).
      // Each marker is wrapped in a zero-width inline anchor so that
      // absolute positioning places it in the left margin at the correct
      // vertical position, even when multiple markers appear in one <p>.
      // Render page markers as left-margin citations (vol:page)
      html = html.replace(/\x01PAGE:(\d+)\x01/g, (match, page) => {
        const isUnproofed = page in unproofedPages;
        const cls = isUnproofed ? "page-marker unproofed" : "page-marker";
        const title = isUnproofed
          ? `Volume ${currentVolume}, page ${page} (unproofed source)`
          : `Volume ${currentVolume}, page ${page}`;
        return `<span class="${cls}" title="${title}">${currentVolume}:${page}</span>`;
      });
      html = html.replace(/\{\{TABLE[H]?:([\s\S]*?)\}TABLE\}/g, (match, content) => {
        const rows = content.split("\n").filter(r => r.trim());
        if (rows.length === 1) {
          return `<span class="inline-table">${formatCell(rows[0])}</span>`;
        }
        const tableRows = rows.map(r => {
          const cells = r.split(" | ").map(c => `<td>${formatCell(c.trim())}</td>`).join("");
          return `<tr>${cells}</tr>`;
        }).join("");
        return `<table class="data-table">${tableRows}</table>`;
      });
      html = html.replace(/\u00abFN:(.*?)\u00ab\/FN\u00bb/gs, (match, content) => {
        footnoteCounter++;
        collectedFootnotes.push({ num: footnoteCounter, text: content });
        return `<sup class="footnote-ref" id="fnref-${footnoteCounter}"><a onclick="toggleFnPopup(event,${footnoteCounter});return false;" href="#">${footnoteCounter}</a><span class="fn-popup" id="fnpop-${footnoteCounter}"><span class="fn-popup-num">${footnoteCounter}.</span>${formatFootnoteText(content)}</span></sup>`;
      });
      // Render inline images — captions are pre-cleaned by the pipeline
      html = html.replace(/\{\{IMG:([^|}]+)(?:\|([^}]*))?\}\}/g, (match, filename, caption) => {
        const url = commonsUrl(filename);
        return `<figure class="inline-image"><a href="${url}" target="_blank"><img src="${url}" alt="${escapeHtml(caption || filename)}" loading="lazy" /></a>${caption ? `<figcaption>${caption}</figcaption>` : ""}</figure>`;
      });
      // Render inline preformatted blocks (structural formulas)
      html = html.replace(/\u00abPRE:(.*?)\u00ab\/PRE\u00bb/gs, '<pre class="structural-formula">$1</pre>');
      // Render bold/italic/small-caps markers
      html = html.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      html = html.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      html = html.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span class="small-caps">$1</span>');
      html = html.replace(/\u00abSH\u00bb(.*?)\u00ab\/SH\u00bb/gs, (match, text) => {
        sectionCounter++;
        const sectionId = `section-${sectionCounter}`;
        collectedSections.push({ id: sectionId, title: text.trim() });
        return `<span class="shoulder-heading" id="${sectionId}">${escapeHtml(text)}</span>`;
      });
      // Render math markers with KaTeX
      html = html.replace(/\u00abMATH:(.*?)\u00ab\/MATH\u00bb/gs, (match, latex) => {
        try {
          if (typeof katex !== "undefined") {
            return katex.renderToString(latex, { throwOnError: false, displayMode: false });
          }
        } catch(e) {}
        return `<code class="math-fallback">${latex}</code>`;
      });
      // Render hieroglyphs
      html = html.replace(/\[hieroglyph:\s*([^\]]+)\]/g, (match, codes) => {
        const rendered = codes.trim().split(/[:\s\-]+/).map(code => {
          code = code.replace(/\\/g, ""); // strip line break markers
          if (!code || code === "<" || code === ">" || code === "!" || code === "-") return "";
          const cp = gardinerToUnicode(code);
          if (cp) return `<span class="hieroglyph">&#x${cp.toString(16)};</span>`;
          return `<span class="hieroglyph-fallback" title="Gardiner ${code}">${code}</span>`;
        }).join("");
        return rendered || match;
      });
      // Replace link markers — only first mention becomes a hyperlink
      // 3-part resolved: «LN:filename|target|display«/LN»  2-part unresolved: «LN:target|display«/LN»
      html = html.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
        const hasFile = g3 !== undefined;
        const target = hasFile ? g2 : g1;
        const display = hasFile ? g3 : g2;
        const filename = hasFile ? g1 : null;
        const key = target.toLowerCase();
        if (linkedTargets.has(key)) return display;
        linkedTargets.add(key);
        const href = filename ? articleUrl(filename) : `/search.html?q=${encodeURIComponent(target)}`;
        return `<a href="${href}" class="article-link" title="${target}">${display}</a>`;
      });
      return `<p>${html}</p>`;
    }

    function articleFileNameFromTarget(target) {
      return `${String(target || "").trim().toLowerCase()}.json`;
    }

    function articleUrl(filename) {
      if (IS_LOCAL) {
        return `?article=/data/derived/articles/${encodeURIComponent(filename)}`;
      }
      const base = filename.replace(/\.json$/, "");
      const page = base.replace(/^0+/, "").split("-")[0];
      const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
      return `/article/${page}/${slug}`;
    }

    function buildXrefHref(xref) {
      if (xref?.target_filename) {
        return articleUrl(xref.target_filename);
      }
      if (!xref?.normalized_target) return "#";
      const fileName = articleFileNameFromTarget(xref.normalized_target);
      return articleUrl(fileName);
    }

    function renderError(message) {
      app.innerHTML = `<div class="card"><div class="message error">${escapeHtml(message)}</div></div>`;
    }

    function renderArticle(article) {
      currentVolume = article.volume || "?";
      unproofedPages = (article.source_quality && article.source_quality.unproofed_pages) ? article.source_quality.unproofed_pages : {};
      const segments = Array.isArray(article.segments) ? article.segments : [];
      const xrefs = (Array.isArray(article.xrefs) ? article.xrefs : [])
        .slice().sort((a, b) => (a.normalized_target || "").localeCompare(b.normalized_target || ""));
      const images = Array.isArray(article.images) ? article.images : [];
      const contributors = Array.isArray(article.contributors) ? article.contributors : [];
      const plates = Array.isArray(article.plates) ? article.plates : [];

      const xrefHtml = xrefs.length
        ? `
          <ul class="xref-list">
            ${xrefs.map(xref => {
              const normalized = xref.normalized_target || "";
              const resolved = (xref.status || "") === "resolved";

              return `
                <li class="xref-item ${resolved ? "resolved" : "unresolved"}">
                  ${resolved
                    ? `<a href="${buildXrefHref(xref)}">${escapeHtml(normalized)}</a>`
                    : escapeHtml(normalized)}
                </li>`;
            }).join("")}
          </ul>`
        : "";

      const segmentHtml = "";

      app.innerHTML = `
        <div class="card">
          <h1>${(() => {
            const t = escapeHtml(article.title || "Untitled");
            return `<span style="font-size:1.6em; line-height:1; vertical-align:baseline;">${t[0]}</span>${t.slice(1)}`;
          })()}</h1>
          <div style="font-size: 0.85rem; color: #6b5e4f; font-style: italic; margin-bottom: 6px;">
            vol. ${escapeHtml(article.volume ?? "?")}${article.page_start !== article.page_end ? `, pp. ${escapeHtml(article.page_start ?? "")}–${escapeHtml(article.page_end ?? "")}` : `, p. ${escapeHtml(article.page_start ?? "")}`}
            ${article.word_count ? `&middot; ${article.word_count.toLocaleString()} words` : ""}
          </div>
          ${article.parent_article ? `<div style="margin-bottom: 8px; font-size: 0.95rem;">Plate for <a href="${articleUrl(article.parent_article.filename)}">${escapeHtml(article.parent_article.title)}</a></div>` : ""}
          ${contributors.length ? `<div class="contributors">By ${contributors.map(c => `<a href="/contributors.html?q=${encodeURIComponent(c.full_name)}" style="color: var(--muted);">${escapeHtml(c.full_name)}</a> <span style="color: var(--muted); font-size: 0.85em;">(${escapeHtml(c.initials)})</span>`).join(", ")}</div>` : ""}
          ${(() => {
            const otherPlates = plates.filter(p => p.title !== article.title);
            return otherPlates.length ? `<div class="contributors">Plates: ${otherPlates.map(p => `<a href="${articleUrl(p.filename)}">${escapeHtml(p.title)}</a>`).join(", ")}</div>` : "";
          })()}
          ${article.source_quality && article.source_quality.lowest_level <= 1
            ? `<div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 8px 12px; margin: 8px 0; font-size: 0.9rem;">
                 <strong>Source quality notice:</strong> ${escapeHtml(article.source_quality.note || "Some pages may contain unverified text.")}
                 This article spans pages with unproofread transcriptions. Text should be verified against the original scans.
               </div>`
            : ""}
          ${(() => {
            footnoteCounter = 0; collectedFootnotes = []; linkedTargets = new Set(); sectionCounter = 0; collectedSections = [];

            // Page markers (\x01PAGE:N\x01) are embedded directly in the
            // body text by the transform stage.  If none are present
            // (e.g. single-page articles), inject one for page_start.
            let markedBody = article.body || "";
            if (markedBody.indexOf("\x01PAGE:") === -1 && article.page_start) {
              markedBody = `\x01PAGE:${article.page_start}\x01` + markedBody;
            }

            // Merge shoulder heading paragraphs with surrounding text.
            // A shoulder heading sits in the margin mid-sentence, so it
            // should not create paragraph breaks. Merge: prev + SH + next
            // into one paragraph.
            const rawParas = markedBody.split("\n\n");
            const mergedParas = [];
            let i = 0;
            while (i < rawParas.length) {
              if (rawParas[i].startsWith("\u00abSH\u00bb")) {
                // Shoulder heading: attach to previous, then absorb next
                const sh = rawParas[i];
                if (mergedParas.length > 0) {
                  mergedParas[mergedParas.length - 1] += " " + sh;
                } else {
                  mergedParas.push(sh);
                }
                // Also absorb the next paragraph (continuation of sentence)
                if (i + 1 < rawParas.length && !rawParas[i + 1].startsWith("\u00abSH\u00bb")) {
                  mergedParas[mergedParas.length - 1] += " " + rawParas[i + 1];
                  i++;
                }
              } else {
                mergedParas.push(rawParas[i]);
              }
              i++;
            }
            const bodyHtml = mergedParas.map(p => renderParagraph(p)).join("");
            const tocHtml = collectedSections.length >= 3
              ? `<div class="toc"><h3>Contents</h3><ol>${collectedSections.map(s => `<li><a href="#${s.id}">${escapeHtml(s.title)}</a></li>`).join("")}</ol></div>`
              : "";
            return tocHtml + `<div class="body-text">${bodyHtml}</div>`;
          })()}
          ${collectedFootnotes.length ? `<div class="footnotes"><h3>Notes</h3><ol>${collectedFootnotes.map(fn => `<li id="fn-${fn.num}" value="${fn.num}"><a onclick="var el=document.getElementById('fnref-${fn.num}');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});return false;" href="#">${fn.num}.</a> ${formatFootnoteText(fn.text)}</li>`).join("")}</ol></div>` : ""}
        </div>

        ${xrefHtml ? `<div class="card">
          <h2>Cross-references</h2>
          ${xrefHtml}
        </div>` : ""}

      `;
    }

    async function loadArticle(path) {
      if (!path) {
        renderError("No article path provided.");
        return;
      }

      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} loading ${path}`);
        }

        const article = await response.json();
        renderArticle(article);

        // Update URL: production uses clean /article/{id}/{slug}, local uses ?article=
        if (!IS_LOCAL) {
          const fnMatch = path.match(/(\d+)-([^/]+)\.json$/);
          if (fnMatch) {
            const cleanUrl = `/article/${fnMatch[1]}/${fnMatch[2].toLowerCase()}`;
            window.history.replaceState({}, "", cleanUrl);
          }
        } else {
          const url = new URL(window.location.href);
          url.searchParams.set("article", path);
          window.history.replaceState({}, "", url);
        }
      } catch (error) {
        renderError(`Could not load article JSON from \"${path}\". ${error.message}`);
      }
    }

    // Determine article path: local uses ?article= param, production uses /article/{id}/{slug}
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE = IS_LOCAL ? "/data/derived/articles" : "/data";
    let initialPath = new URLSearchParams(window.location.search).get("article");
    if (!initialPath && !IS_LOCAL) {
      // Production: /article/367/pharaoh -> 0367-PHARAOH.json
      const match = window.location.pathname.match(/^\/article\/(\d+)\/(.+)/);
      if (match) {
        const id = match[1];
        const slug = decodeURIComponent(match[2]).toUpperCase();
        initialPath = `${DATA_BASE}/${id}-${slug}.json`;
      }
    }
    if (initialPath) {
      loadArticle(initialPath);
    }

    // In-article search
    const articleSearchInput = document.getElementById("articleSearch");
    const matchCountEl = document.getElementById("matchCount");

    articleSearchInput.addEventListener("input", () => {
      const query = articleSearchInput.value.trim();
      const bodyEl = document.querySelector(".body-text");
      if (!bodyEl) return;

      // Remove existing highlights
      bodyEl.querySelectorAll(".search-highlight").forEach(el => {
        el.replaceWith(el.textContent);
      });
      bodyEl.normalize();

      if (!query) {
        matchCountEl.textContent = "";
        return;
      }

      // Walk text nodes and highlight matches
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
      let count = 0;

      function highlightNode(node) {
        if (node.nodeType === 3) {
          const text = node.textContent;
          if (regex.test(text)) {
            regex.lastIndex = 0;
            const span = document.createElement("span");
            span.innerHTML = text.replace(regex, (match) => {
              count++;
              return `<span class="search-highlight">${match}</span>`;
            });
            node.parentNode.replaceChild(span, node);
          }
        } else if (node.nodeType === 1 && !node.classList?.contains("search-highlight")) {
          Array.from(node.childNodes).forEach(highlightNode);
        }
      }

      highlightNode(bodyEl);
      matchCountEl.textContent = count ? `${count} match${count !== 1 ? "es" : ""}` : "No matches";
    });
    // --- Jump-to-article autocomplete ---
    (function() {
      const input = document.getElementById("jumpTo");
      const results = document.getElementById("jumpResults");
      let articles = null;
      let selected = -1;

      async function ensureIndex() {
        if (articles) return;
        const base = IS_LOCAL ? "/data/derived/articles" : "/data";
        const resp = await fetch(`${base}/index.json`);
        const data = await resp.json();
        articles = data
          .filter(a => a.article_type === "article")
          .map(a => ({ title: a.title, filename: a.filename }));
      }

      function show(items) {
        selected = -1;
        if (!items.length) { results.style.display = "none"; return; }
        results.innerHTML = items.slice(0, 12).map((a, i) =>
          `<li data-idx="${i}" style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border);">${a.title}</li>`
        ).join("");
        results.style.display = "block";
        results.querySelectorAll("li").forEach(li => {
          li.addEventListener("mousedown", e => {
            e.preventDefault();
            go(items[+li.dataset.idx]);
          });
        });
      }

      function highlight(idx) {
        results.querySelectorAll("li").forEach((li, i) => {
          li.style.background = i === idx ? "var(--resolved-bg)" : "";
        });
      }

      function go(item) {
        results.style.display = "none";
        input.value = "";
        location.href = articleUrl(item.filename);
      }

      input.addEventListener("input", async () => {
        await ensureIndex();
        const q = input.value.trim().toLowerCase();
        if (!q) { results.style.display = "none"; return; }
        const matches = articles.filter(a => a.title.toLowerCase().includes(q));
        // Sort: starts-with first, then alphabetical
        matches.sort((a, b) => {
          const aStarts = a.title.toLowerCase().startsWith(q) ? 0 : 1;
          const bStarts = b.title.toLowerCase().startsWith(q) ? 0 : 1;
          return aStarts - bStarts || a.title.localeCompare(b.title);
        });
        show(matches);
      });

      input.addEventListener("keydown", e => {
        const items = results.querySelectorAll("li");
        if (!items.length) return;
        if (e.key === "ArrowDown") { e.preventDefault(); selected = Math.min(selected + 1, items.length - 1); highlight(selected); }
        else if (e.key === "ArrowUp") { e.preventDefault(); selected = Math.max(selected - 1, 0); highlight(selected); }
        else if (e.key === "Enter" && selected >= 0) { e.preventDefault(); items[selected].dispatchEvent(new MouseEvent("mousedown")); }
        else if (e.key === "Escape") { results.style.display = "none"; }
      });

      input.addEventListener("blur", () => { setTimeout(() => results.style.display = "none", 150); });
    })();
  </script>
</body>
</html>
