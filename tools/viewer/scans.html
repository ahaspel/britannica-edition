<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Scans - Encyclopaedia Britannica, 11th Edition</title>
<style>
  :root { --bg: #f5f0e8; --text: #2c2416; --muted: #6b5d4d; --link: #8b4513; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
  .back-bar { margin-bottom: 12px; }
  .back-bar a { color: var(--link); text-decoration: none; }
  .back-bar a:hover { text-decoration: underline; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 1.3rem; margin: 0; }
  .header .subtitle { color: var(--muted); font-size: 0.9rem; }
  .nav { text-align: center; margin: 16px 0; }
  .nav button { font-family: Georgia, serif; font-size: 1.5rem; padding: 6px 18px; margin: 0 4px;
    background: transparent; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; color: var(--text); }
  .nav button:hover { background: rgba(0,0,0,0.05); }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .nav .page-info { display: inline-block; min-width: 120px; text-align: center; }
  .nav .jump { display: inline-flex; align-items: center; gap: 6px; margin-left: 16px; font-size: 0.95rem; color: var(--muted); }
  .nav .jump input { font-family: Georgia, serif; font-size: 1rem; width: 70px; padding: 4px 6px;
    border: 1px solid #ccc; border-radius: 4px; text-align: center; }
  .nav .jump button { font-size: 0.95rem; padding: 4px 10px; }
  .scan-container { text-align: center; }
  .scan-container img { max-width: 100%; border: 1px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .scan-container .error { color: var(--muted); font-style: italic; padding: 40px; }
  a { color: var(--link); }
</style>
<script>
  (function() {
    var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    var base = isLocal ? "/tools/viewer/" : "/";
    document.write('<link rel="icon" type="image/svg+xml" href="' + base + 'favicon.svg">');
  })();
</script>
</head>
<body>
<div class="back-bar">
  <a id="backLink" href="index.html">&larr; Back to index</a>
</div>
<div class="header">
  <h1 id="title">Page Scans</h1>
  <div class="subtitle" id="subtitle"></div>
</div>
<div class="nav">
  <button id="firstBtn" onclick="goTo(startLeaf)">&laquo;</button>
  <button id="prevBtn" onclick="go(-1)">&lsaquo;</button>
  <span class="page-info" id="pageInfo"></span>
  <button id="nextBtn" onclick="go(1)">&rsaquo;</button>
  <button id="lastBtn" onclick="goTo(endLeaf)">&raquo;</button>
  <span class="jump">
    <label for="jumpInput">Go to page</label>
    <input id="jumpInput" type="text" inputmode="numeric" autocomplete="off" />
    <button id="jumpBtn" onclick="jumpToPrinted()">Go</button>
  </span>
</div>
<div class="scan-container" id="scanContainer"></div>
<script>
  // Leaf-only scan viewer.  The URL provides a leaf range; every
  // label comes from printed_pages_leaf.json (int → "p. N",
  // "fm N" / any string → verbatim, missing → "(unnumbered)").
  // No ws translation, no modes, no fallback offsets.  Fix label
  // errors by editing the map, not the viewer.
  const params = new URLSearchParams(location.search);
  const vol = parseInt(params.get("vol")) || 1;
  const startLeaf = parseInt(params.get("start")) || 1;
  const endLeaf = parseInt(params.get("end")) || startLeaf;
  const label = params.get("label") || "Pages";
  const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";

  let currentLeaf = startLeaf;
  const initPrinted = parseInt(params.get("pinit")) || 0;

  document.getElementById("title").textContent = `Volume ${vol}: ${label}`;

  const backUrl = params.get("back");
  if (backUrl) {
    document.getElementById("backLink").href = backUrl;
    document.getElementById("backLink").innerHTML = "&larr; Back to article";
  } else {
    document.getElementById("backLink").href = IS_LOCAL ? "index.html" : "/index.html";
  }

  let printedPages = null;

  async function loadPrintedPages() {
    try {
      const url = IS_LOCAL ? "/data/derived/printed_pages_leaf.json" : "/data/printed_pages_leaf.json";
      const resp = await fetch(url);
      if (resp.ok) printedPages = await resp.json();
    } catch (e) { /* map missing → everything labels as (unnumbered) */ }
  }

  function labelForLeaf(leaf) {
    if (!printedPages || !printedPages[String(vol)]) return null;
    const v = printedPages[String(vol)][String(leaf)];
    return v === undefined ? null : v;
  }

  function displayLabel(leaf) {
    const v = labelForLeaf(leaf);
    if (v === null) return "(unnumbered)";
    if (typeof v === "number") return `p. ${v}`;
    return String(v);
  }

  function updateSubtitle() {
    const first = displayLabel(startLeaf);
    const last = displayLabel(endLeaf);
    document.getElementById("subtitle").textContent = `${first} – ${last}`;
  }

  function scanUrl(leaf) {
    const padVol = String(vol).padStart(2, "0");
    const padLeaf = String(leaf).padStart(4, "0");
    const name = `vol${padVol}_leaf${padLeaf}.jpg`;
    return IS_LOCAL ? `/data/derived/scans/${name}` : `/data/scans/${name}`;
  }

  function render() {
    const container = document.getElementById("scanContainer");
    const img = new Image();
    img.alt = `Volume ${vol}, leaf ${currentLeaf}`;
    img.loading = "eager";
    img.onload = () => { container.innerHTML = ""; container.appendChild(img); };
    img.onerror = () => { container.innerHTML = `<div class="error">Scan not available for leaf ${currentLeaf}</div>`; };
    img.src = scanUrl(currentLeaf);
    container.innerHTML = `<div class="error">Loading...</div>`;

    document.getElementById("pageInfo").textContent = displayLabel(currentLeaf);
    document.getElementById("firstBtn").disabled = currentLeaf <= startLeaf;
    document.getElementById("prevBtn").disabled = currentLeaf <= startLeaf;
    document.getElementById("nextBtn").disabled = currentLeaf >= endLeaf;
    document.getElementById("lastBtn").disabled = currentLeaf >= endLeaf;
  }

  function go(delta) {
    currentLeaf = Math.max(startLeaf, Math.min(endLeaf, currentLeaf + delta));
    render();
  }

  function goTo(leaf) {
    currentLeaf = Math.max(startLeaf, Math.min(endLeaf, leaf));
    render();
  }

  // Jump resolves entered text against the map: prefer integer
  // match (printed page), else string match ("fm 3"), else treat as
  // a leaf number.  Whatever matches first wins.
  function jumpToPrinted() {
    const input = document.getElementById("jumpInput");
    const raw = input.value.trim();
    if (!raw) return;

    if (printedPages && printedPages[String(vol)]) {
      const volMap = printedPages[String(vol)];
      const asInt = parseInt(raw, 10);
      for (let leaf = startLeaf; leaf <= endLeaf; leaf++) {
        const v = volMap[String(leaf)];
        if (v === undefined) continue;
        if (typeof v === "number" && !Number.isNaN(asInt) && v === asInt) {
          goTo(leaf);
          return;
        }
        if (typeof v === "string" && v.toLowerCase() === raw.toLowerCase()) {
          goTo(leaf);
          return;
        }
      }
    }

    const n = parseInt(raw, 10);
    if (!Number.isNaN(n)) goTo(n);
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") go(-1);
    if (e.key === "ArrowRight") go(1);
    if (e.key === "Home") goTo(startLeaf);
    if (e.key === "End") goTo(endLeaf);
  });

  loadPrintedPages().then(() => {
    updateSubtitle();
    if (initPrinted > 0) {
      document.getElementById("jumpInput").value = String(initPrinted);
      jumpToPrinted();
      document.getElementById("jumpInput").value = "";
    } else {
      // Auto-advance past leading nulls (cover / blanks) so users
      // land on the first labeled page in the requested range.  The
      // explicit null entries in the map drive this — no hard-coded
      // skip logic in the viewer.
      while (currentLeaf < endLeaf && labelForLeaf(currentLeaf) === null) {
        currentLeaf += 1;
      }
      render();
    }
  });
</script>
</body>
</html>
