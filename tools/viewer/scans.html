<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Scans - Encyclopaedia Britannica, 11th Edition</title>
<style>
  :root { --bg: #f5f0e8; --text: #2c2416; --muted: #6b5d4d; --link: #8b4513; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
  .back-bar { margin-bottom: 12px; }
  .back-bar a { color: var(--link); text-decoration: none; }
  .back-bar a:hover { text-decoration: underline; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 1.3rem; margin: 0; }
  .header .subtitle { color: var(--muted); font-size: 0.9rem; }
  .nav { text-align: center; margin: 16px 0; }
  .nav button { font-family: Georgia, serif; font-size: 1.5rem; padding: 6px 18px; margin: 0 4px;
    background: transparent; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; color: var(--text); }
  .nav button:hover { background: rgba(0,0,0,0.05); }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .nav .page-info { display: inline-block; min-width: 120px; text-align: center; }
  .nav .jump { display: inline-flex; align-items: center; gap: 6px; margin-left: 16px; font-size: 0.95rem; color: var(--muted); }
  .nav .jump input { font-family: Georgia, serif; font-size: 1rem; width: 70px; padding: 4px 6px;
    border: 1px solid #ccc; border-radius: 4px; text-align: center; }
  .nav .jump button { font-size: 0.95rem; padding: 4px 10px; }
  .scan-container { text-align: center; }
  .scan-container img { max-width: 100%; border: 1px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .scan-container .error { color: var(--muted); font-style: italic; padding: 40px; }
  a { color: var(--link); }
</style>
</head>
<body>
<div class="back-bar">
  <a id="backLink" href="index.html">&larr; Back to index</a>
</div>
<div class="header">
  <h1 id="title">Page Scans</h1>
  <div class="subtitle" id="subtitle"></div>
</div>
<div class="nav">
  <button id="firstBtn" onclick="goTo(startPage)">&laquo;</button>
  <button id="prevBtn" onclick="go(-1)">&lsaquo;</button>
  <span class="page-info" id="pageInfo"></span>
  <button id="nextBtn" onclick="go(1)">&rsaquo;</button>
  <button id="lastBtn" onclick="goTo(endPage)">&raquo;</button>
  <span class="jump">
    <label for="jumpInput">Go to p.</label>
    <input id="jumpInput" type="text" inputmode="numeric" autocomplete="off" />
    <button id="jumpBtn" onclick="jumpToPrinted()">Go</button>
  </span>
</div>
<div class="scan-container" id="scanContainer"></div>
<script>
  const params = new URLSearchParams(location.search);
  const vol = parseInt(params.get("vol")) || 1;
  const startPage = parseInt(params.get("start")) || 1;
  const endPage = parseInt(params.get("end")) || startPage;
  // Printed page numbers for display (fall back to ws numbers)
  const printedStart = parseInt(params.get("pstart")) || startPage;
  const printedEnd = parseInt(params.get("pend")) || endPage;
  const label = params.get("label") || "Pages";
  const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";

  let currentPage = startPage;
  // Optional: jump to a printed page on initial load. Set by the
  // volume-scans link so vol 3 opens on printed p.1 rather than the
  // first article's start page.
  const initPrinted = parseInt(params.get("pinit")) || 0;

  document.getElementById("title").textContent = `Volume ${vol}: ${label}`;
  document.getElementById("subtitle").textContent = `pp. ${printedStart}\u2013${printedEnd}`;
  const backUrl = params.get("back");
  if (backUrl) {
    document.getElementById("backLink").href = backUrl;
    document.getElementById("backLink").innerHTML = "&larr; Back to article";
  } else {
    document.getElementById("backLink").href = IS_LOCAL ? "index.html" : "/index.html";
  }

  const prefix = params.get("prefix") || "page";  // "page" or "fm"

  // Leaf offset fallback (for pages not in scan_map)
  const LEAF_OFFSET = {
    1:7, 2:7, 3:9, 4:9, 5:12, 6:12, 7:7, 8:7,
    9:9, 10:10, 11:8, 12:7, 13:7, 14:6, 15:17, 16:6,
    17:9, 18:6, 19:7, 20:0, 21:6, 22:6, 23:7, 24:4,
    25:8, 26:4, 27:6, 28:5, 29:6
  };

  let scanMap = null;
  let printedPages = null;

  async function loadScanMap() {
    try {
      const url = IS_LOCAL ? "/data/derived/scan_map.json" : "/data/scan_map.json";
      const resp = await fetch(url);
      if (resp.ok) scanMap = await resp.json();
    } catch (e) { /* fall back to offset */ }
  }

  async function loadPrintedPages() {
    try {
      // Scan viewer needs leaf-keyed printed pages (it navigates by leaf).
      // The ws-keyed printed_pages.json is for article exports.
      const url = IS_LOCAL ? "/data/derived/printed_pages_leaf.json" : "/data/printed_pages_leaf.json";
      const resp = await fetch(url);
      if (resp.ok) printedPages = await resp.json();
    } catch (e) { /* fall back to linear interpolation */ }
  }

  function printedForLeaf(vol, leaf) {
    if (printedPages && printedPages[String(vol)]) {
      const p = printedPages[String(vol)][String(leaf)];
      if (p !== undefined) return p;
    }
    return null; // no printed number (plate / blank / unknown)
  }

  function leafForPage(vol, wsPage) {
    if (scanMap && scanMap[String(vol)] && scanMap[String(vol)][String(wsPage)]) {
      return scanMap[String(vol)][String(wsPage)];
    }
    // Fallback: offset
    return wsPage + (LEAF_OFFSET[vol] || 0);
  }

  function scanUrl(vol, num) {
    const padVol = String(vol).padStart(2, "0");
    if (prefix === "fm") {
      const padNum = String(num).padStart(2, "0");
      const name = `vol${padVol}_fm${padNum}.jpg`;
      return IS_LOCAL ? `/data/derived/scans/${name}` : `/data/scans/${name}`;
    }
    // prefix === "leaf": currentPage IS the physical leaf number.
    // prefix === "page": currentPage is a Wikisource page; translate.
    const leaf = prefix === "leaf" ? num : leafForPage(vol, num);
    const padLeaf = String(leaf).padStart(4, "0");
    const name = `vol${padVol}_leaf${padLeaf}.jpg`;
    return IS_LOCAL ? `/data/derived/scans/${name}` : `/data/scans/${name}`;
  }

  function render() {
    const container = document.getElementById("scanContainer");
    const img = new Image();
    img.alt = `Volume ${vol}, page ${currentPage}`;
    img.loading = "eager";
    img.onload = () => { container.innerHTML = ""; container.appendChild(img); };
    img.onerror = () => { container.innerHTML = `<div class="error">Scan not available for page ${currentPage}</div>`; };
    img.src = scanUrl(vol, currentPage);
    container.innerHTML = `<div class="error">Loading...</div>`;

    // Look up the printed page by LEAF, not by ws. The ws → leaf
    // translation is done via scan_map (identity fallback). Keeping
    // the printed_pages lookup in leaf space avoids corruption from
    // stale scan_map entries (vol 20 had several bogus ws → leaf
    // translations that mangled the display).
    let pageInfoText;
    if (prefix === "fm") {
      pageInfoText = `fm ${currentPage}`;
    } else {
      const leaf = prefix === "leaf" ? currentPage : leafForPage(vol, currentPage);
      const printed = printedForLeaf(vol, leaf);
      if (printed !== null) {
        pageInfoText = `p. ${printed}`;
      } else {
        pageInfoText = `(unnumbered)`;
      }
    }
    document.getElementById("pageInfo").textContent = pageInfoText;
    document.getElementById("firstBtn").disabled = currentPage <= startPage;
    document.getElementById("prevBtn").disabled = currentPage <= startPage;
    document.getElementById("nextBtn").disabled = currentPage >= endPage;
    document.getElementById("lastBtn").disabled = currentPage >= endPage;
  }

  function go(delta) {
    currentPage = Math.max(startPage, Math.min(endPage, currentPage + delta));
    render();
  }

  function goTo(page) {
    currentPage = Math.max(startPage, Math.min(endPage, page));
    render();
  }

  // Resolve a user-entered number to a ws page within this viewer's
  // range. Tries printed-page match first (reader-friendly), then leaf
  // (useful for debugging), then treats the entry as a ws page directly.
  function jumpToPrinted() {
    const input = document.getElementById("jumpInput");
    const raw = input.value.trim();
    if (!raw) return;
    const n = parseInt(raw, 10);
    if (Number.isNaN(n)) return;

    if (prefix === "fm") {
      // Front-matter mode uses leaves directly (no printed-page mapping).
      goTo(n);
      return;
    }

    if (prefix === "leaf") {
      // Leaf mode: try printed-page match first, else go to leaf n.
      if (printedPages && printedPages[String(vol)]) {
        const volMap = printedPages[String(vol)];
        for (let leaf = startPage; leaf <= endPage; leaf++) {
          if (volMap[String(leaf)] === n) {
            goTo(leaf);
            return;
          }
        }
      }
      goTo(n);
      return;
    }

    // prefix === "page": currentPage is a ws page.
    // 1. Printed page: scan this volume's leaves for printed == n.
    if (printedPages && printedPages[String(vol)]) {
      const volMap = printedPages[String(vol)];
      for (let p = startPage; p <= endPage; p++) {
        const leaf = leafForPage(vol, p);
        if (volMap[String(leaf)] === n) {
          goTo(p);
          return;
        }
      }
    }

    // 2. Leaf: find the ws page that maps to leaf == n.
    if (scanMap && scanMap[String(vol)]) {
      const volScan = scanMap[String(vol)];
      for (const [wsStr, leafVal] of Object.entries(volScan)) {
        if (leafVal === n) {
          const ws = parseInt(wsStr, 10);
          if (ws >= startPage && ws <= endPage) {
            goTo(ws);
            return;
          }
        }
      }
    }
    // Offset-based fallback: ws + offset == leaf  =>  ws = n - offset
    const off = LEAF_OFFSET[vol] || 0;
    const wsFromLeaf = n - off;
    if (wsFromLeaf >= startPage && wsFromLeaf <= endPage) {
      goTo(wsFromLeaf);
      return;
    }

    // 3. Treat as ws page directly.
    goTo(n);
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") go(-1);
    if (e.key === "ArrowRight") go(1);
    if (e.key === "Home") goTo(startPage);
    if (e.key === "End") goTo(endPage);
  });

  if (prefix === "page" || prefix === "leaf") {
    Promise.all([loadScanMap(), loadPrintedPages()]).then(() => {
      if (initPrinted > 0) {
        document.getElementById("jumpInput").value = String(initPrinted);
        jumpToPrinted();
        document.getElementById("jumpInput").value = "";
      } else {
        render();
      }
    });
  } else {
    render();
  }
</script>
</body>
</html>
