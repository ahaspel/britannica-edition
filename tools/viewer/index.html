<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Britannica Index</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --border: #d0d7de;
      --link: #0969da;
      --warn: #b42318;
      --warn-bg: #fff1f1;
      --code-bg: #f6f8fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1 { margin-top: 0; font-size: 1.8rem; }

    .stats {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--link);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .filter-btn:hover { background: #f3f4f6; }
    .filter-btn.active { background: var(--link); color: #fff; border-color: var(--link); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 2px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--text); }
    th .sort-arrow { font-size: 0.7rem; margin-left: 4px; }

    td {
      padding: 6px 10px;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
    }

    td a {
      color: var(--link);
      text-decoration: none;
    }

    td a:hover { text-decoration: underline; }

    .short-body { color: var(--warn); }
    .xref-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      background: var(--code-bg);
      color: var(--muted);
    }

    .xref-badge.has-unresolved {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .empty { color: var(--muted); padding: 40px; text-align: center; }

    .page-range { color: var(--muted); font-size: 0.85rem; }
    .body-start { color: var(--muted); font-size: 0.85rem; font-style: italic; margin-left: 8px; }

    .volume-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 16px;
    }

    .vol-btn {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    .vol-btn:hover { background: #f3f4f6; }
    .vol-btn.active { background: var(--link); color: #fff; border-color: var(--link); }
    .vol-btn.disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Britannica 11th Edition</h1>
      <div id="stats" class="stats">Loading...</div>
      <div style="margin-bottom: 12px; font-size: 0.9rem;">
        <a href="search.html" style="color: var(--link); text-decoration: none;">Full-Text Search &rarr;</a>
        &nbsp;&nbsp;
        <a href="contributors.html" style="color: var(--link); text-decoration: none;">Contributors &rarr;</a>
      </div>
      <div id="volume-bar" class="volume-bar"></div>
      <input id="search" class="search-box" type="text" placeholder="Search articles..." />
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="short">Short body (&lt;20 words)</button>
        <button class="filter-btn" data-filter="has-xrefs">Has xrefs</button>
        <button class="filter-btn" data-filter="unresolved">Unresolved xrefs</button>
        <button class="filter-btn" data-filter="front_matter">Front matter</button>
        <button class="filter-btn" data-filter="plates">Plates</button>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th data-sort="title">Title <span class="sort-arrow"></span></th>
            <th data-sort="page_start">Pages <span class="sort-arrow"></span></th>
            <th data-sort="body_length">Length <span class="sort-arrow"></span></th>
            <th data-sort="xref_count">Xrefs <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="article-list"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none">No matching articles.</div>
    </div>
  </div>

  <script>
    let articles = [];
    let currentFilter = "all";
    let currentSort = "title";
    let sortAsc = true;
    let currentVolume = null; // null = all volumes
    const searchInput = document.getElementById("search");
    const tbody = document.getElementById("article-list");
    const emptyMsg = document.getElementById("empty");
    const statsEl = document.getElementById("stats");

    function escapeHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function viewerUrl(filename) {
      return `viewer.html?article=/data/derived/articles/${encodeURIComponent(filename)}`;
    }

    function applyFilter(article) {
      if (currentFilter === "all") return (article.article_type || "article") === "article";
      if (currentFilter === "short") return article.body_length < 20 && (article.article_type || "article") === "article";
      if (currentFilter === "has-xrefs") return article.xref_count > 0;
      if (currentFilter === "unresolved") return article.xref_count > article.resolved_count;
      if (currentFilter === "front_matter") return (article.article_type || "article") === "front_matter";
      if (currentFilter === "plates") return (article.article_type || "article") === "plate";
      return true;
    }

    function applySearch(article, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      return article.title.toLowerCase().includes(q)
        || (article.body_start || "").toLowerCase().includes(q);
    }

    function render() {
      const query = searchInput.value.trim();
      const filtered = articles
        .filter(a => (currentVolume === null || a.volume === currentVolume) && applyFilter(a) && applySearch(a, query))
        .sort((a, b) => {
          // Default sort: volume then page (original encyclopedia order)
          if (currentSort === "page_start" || currentSort === "title") {
            if (a.volume !== b.volume) return (a.volume - b.volume) * (sortAsc ? 1 : -1);
            if (a.page_start !== b.page_start) return (a.page_start - b.page_start) * (sortAsc ? 1 : -1);
            return a.title.localeCompare(b.title) * (sortAsc ? 1 : -1);
          }
          let va = a[currentSort], vb = b[currentSort];
          if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
          if (va < vb) return sortAsc ? -1 : 1;
          if (va > vb) return sortAsc ? 1 : -1;
          return 0;
        });

      if (filtered.length === 0) {
        tbody.innerHTML = "";
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      tbody.innerHTML = filtered.map(a => {
        const shortClass = a.body_length < 100 ? " short-body" : "";
        const xrefBadge = a.xref_count > 0
          ? `<span class="xref-badge${a.xref_count > a.resolved_count ? " has-unresolved" : ""}">${a.resolved_count}/${a.xref_count}</span>`
          : "";
        const pageRange = a.page_start === a.page_end
          ? `p.${a.page_start}`
          : `pp.${a.page_start}\u2013${a.page_end}`;

        return `<tr>
          <td><a href="${viewerUrl(a.filename)}">${escapeHtml(a.title)}</a>${a.body_start ? `<span class="body-start">${escapeHtml(a.body_start)}</span>` : ""}</td>
          <td class="page-range">${pageRange}</td>
          <td class="${shortClass}">${a.body_length.toLocaleString()}</td>
          <td>${xrefBadge}</td>
        </tr>`;
      }).join("");
    }

    // Event: search
    searchInput.addEventListener("input", render);

    // Event: filter buttons
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // Event: column sort
    document.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (currentSort === col) {
          sortAsc = !sortAsc;
        } else {
          currentSort = col;
          sortAsc = true;
        }
        document.querySelectorAll("th .sort-arrow").forEach(s => s.textContent = "");
        th.querySelector(".sort-arrow").textContent = sortAsc ? "\u25b2" : "\u25bc";
        render();
      });
    });

    // Load index
    fetch("/data/derived/articles/index.json")
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        articles = data;
        const totalXrefs = articles.reduce((s, a) => s + a.xref_count, 0);
        const resolvedXrefs = articles.reduce((s, a) => s + a.resolved_count, 0);
        statsEl.textContent = `${articles.length} articles \u00b7 ${totalXrefs} cross-references (${resolvedXrefs} resolved)`;

        // Build volume bar
        const volumes = [...new Set(articles.map(a => a.volume))].sort((a, b) => a - b);
        const volBar = document.getElementById("volume-bar");
        const allBtn = document.createElement("button");
        allBtn.className = "vol-btn active";
        allBtn.textContent = "All";
        allBtn.addEventListener("click", () => {
          currentVolume = null;
          volBar.querySelectorAll(".vol-btn").forEach(b => b.classList.remove("active"));
          allBtn.classList.add("active");
          render();
        });
        volBar.appendChild(allBtn);

        // Generate volume labels from actual article data
        for (let v = 1; v <= 29; v++) {
          const volArts = articles
            .filter(a => a.volume === v && (a.article_type || "article") === "article")
            .sort((a, b) => a.page_start - b.page_start);
          let label = `Vol ${v}`;
          if (volArts.length > 0) {
            const first = volArts[0].title.split(",")[0].split(" ")[0];
            const last = volArts[volArts.length - 1].title.split(",")[0].split(" ")[0];
            label = `${first}\u2013${last}`;
          }
          const btn = document.createElement("button");
          btn.className = "vol-btn" + (volumes.includes(v) ? "" : " disabled");
          btn.textContent = label;
          btn.title = `Volume ${v}`;
          if (volumes.includes(v)) {
            const vol = v;
            btn.addEventListener("click", () => {
              currentVolume = vol;
              volBar.querySelectorAll(".vol-btn").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
              render();
            });
          }
          volBar.appendChild(btn);
        }

        render();
      })
      .catch(err => {
        statsEl.textContent = `Failed to load index: ${err.message}`;
      });
  </script>
</body>
</html>
