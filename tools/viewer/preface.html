<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editorial Preface — Encyclop&aelig;dia Britannica, 11th Edition</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #4b5563;
      --border: #d0d7de;
      --link: #0969da;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 36px;
      margin-bottom: 20px;
    }

    h1 { margin-top: 0; font-size: 1.6rem; }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .nav-links {
      margin-bottom: 12px;
      font-size: 0.9rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .nav-links a {
      color: var(--link);
      text-decoration: none;
    }

    .nav-links a:hover { text-decoration: underline; }

    .preface-body p {
      text-indent: 1.5em;
      margin: 0 0 0.6em 0;
      position: relative;
    }

    .preface-body p:first-child {
      text-indent: 0;
    }

    .preface-body {
      margin-right: 160px;
      position: relative;
    }

    .shoulder-heading {
      position: absolute;
      right: -170px;
      width: 150px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--muted);
      text-align: left;
      text-indent: 0;
    }

    @media (max-width: 900px) {
      .preface-body { margin-right: 0; }
      .shoulder-heading {
        position: static;
        display: block;
        width: auto;
      }
    }

    .drop-cap {
      font-size: 3em;
      float: left;
      line-height: 0.8;
      margin: 0.05em 6px 0 0;
      font-weight: bold;
      color: var(--text);
    }

    .small-caps { font-variant: small-caps; }

    .loading {
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="nav-links"><a href="home.html">Home</a> &middot; <a href="index.html">Articles</a></div>
      <h1>Editorial Preface</h1>
      <div class="meta">By Hugh Chisholm &middot; London, December 10, 1910</div>
      <div id="preface-body" class="preface-body">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE = IS_LOCAL ? "/data/derived/articles" : "/data";

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    fetch(`${DATA_BASE}/front_matter.json`)
      .then(r => r.json())
      .then(fm => {
        const preface = fm.preface;
        if (!preface || !preface.body) {
          document.getElementById("preface-body").innerHTML = "<p>Preface not available.</p>";
          return;
        }

        // Merge shoulder heading paragraphs with surrounding text,
        // same as the article viewer does.
        const rawParas = preface.body.split("\n\n");
        const merged = [];
        let i = 0;
        while (i < rawParas.length) {
          if (rawParas[i].includes("\u00abSH\u00bb")) {
            if (merged.length > 0) {
              merged[merged.length - 1] += " " + rawParas[i];
            } else {
              merged.push(rawParas[i]);
            }
            if (i + 1 < rawParas.length && !rawParas[i + 1].includes("\u00abSH\u00bb")) {
              merged[merged.length - 1] += " " + rawParas[i + 1];
              i++;
            }
          } else {
            merged.push(rawParas[i]);
          }
          i++;
        }

        const html = merged.map(p => {
          let h = escapeHtml(p);

          // Drop cap: the fetch stage stripped {{dropinitial|X}} leaving
          // nodent|HE (was T+HE) and nodent|LSEWHERE (was E+LSEWHERE)
          h = h.replace(/^nodent\|HE /, '<span class="drop-cap">T</span>HE ');
          h = h.replace(/^nodent\|LSEWHERE/, '<span class="drop-cap">E</span>LSEWHERE');
          h = h.replace(/^nodent\|/, "");

          // Shoulder headings
          h = h.replace(/\u00abSH\u00bb(.*?)\u00ab\/SH\u00bb/gs,
            '<span class="shoulder-heading">$1</span>');

          // Bold, italic, small caps
          h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
          h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
          h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs,
            '<span class="small-caps">$1</span>');

          // Strip footnotes, links (show display text only), remaining markers
          h = h.replace(/\u00abFN:.*?\u00ab\/FN\u00bb/gs, "");
          h = h.replace(/\u00abLN:[^|]*\|([^«]*)\u00ab\/LN\u00bb/g, "$1");
          h = h.replace(/\u00ab\/?[A-Z]+\u00bb/g, "");

          // Clean up whitespace from shoulder heading markers
          h = h.replace(/\u2003/g, " ").replace(/\s{2,}/g, " ");

          return `<p>${h}</p>`;
        }).join("");

        document.getElementById("preface-body").innerHTML = html;
      })
      .catch(err => {
        document.getElementById("preface-body").innerHTML =
          `<p>Could not load preface. ${err.message}</p>`;
      });
  </script>
</body>
</html>
