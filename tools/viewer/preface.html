<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editorial Preface — Encyclop&aelig;dia Britannica, 11th Edition</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; background: rgba(139, 115, 85, 0.08); border-radius: 2px; }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      margin-bottom: 16px;
    }

    .preface-body {
      margin-right: 160px;
      position: relative;
      font-size: 1.08rem;
    }

    .preface-body p {
      text-indent: 1.5em;
      margin: 0 0 0.5em 0;
      position: relative;
    }

    .preface-body p:first-child {
      text-indent: 0;
    }

    .shoulder-heading {
      position: absolute;
      right: -170px;
      width: 150px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.65rem;
      font-style: italic;
      color: #8b7355;
      padding-right: 0.6em;
      text-align: left;
      text-indent: 0;
    }

    @media (max-width: 900px) {
      .preface-body { margin-right: 0; }
      .shoulder-heading {
        position: static;
        display: block;
        width: auto;
        margin: 0.5em 0 0.2em;
        font-weight: 600;
        color: var(--text);
      }
    }

    .drop-cap {
      font-size: 3.2em;
      float: left;
      line-height: 0.8;
      margin: 0.05em 2px 0 0;
      color: #5c4a32;
      font-weight: normal;
    }

    .small-caps { font-variant: small-caps; }

    .footnote-ref a {
      color: #7b3f00;
      text-decoration: none;
      font-size: 1em;
      font-weight: 700;
      padding: 0 2px;
      cursor: pointer;
    }

    .footnotes {
      border-top: 1px solid #8b7355;
      margin-top: 32px;
      padding-top: 16px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .footnotes h3 {
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: #8b7355;
      margin-bottom: 10px;
    }

    .footnotes ol {
      padding-left: 24px;
      list-style: none;
    }

    .footnotes li {
      margin-bottom: 6px;
      text-indent: -1.5em;
      padding-left: 1.5em;
    }

    .footnotes li a {
      color: #8b7355;
      text-decoration: none;
      font-weight: 600;
      margin-right: 2px;
    }

    .toc {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .toc h3 {
      margin: 0 0 8px 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .toc ol {
      margin: 0;
      padding-left: 20px;
      columns: 2;
      column-gap: 24px;
    }

    .toc li {
      margin-bottom: 3px;
    }

    .toc a {
      color: var(--text);
      font-size: 0.88rem;
    }

    .loading {
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h1 style="margin: 0; font-size: 1.15rem; color: #5c4a32;"><span style="font-variant: small-caps; letter-spacing: 0.04em;">Editorial Preface</span> <span style="font-variant: normal; font-style: italic; letter-spacing: 0.01em;">&mdash; 11th Edition</span></h1>
        <div style="font-size: 0.9rem;">
          <a href="/home.html">Home</a>
          &nbsp;&middot;&nbsp;
          <a href="/index.html">Articles</a>
          &nbsp;&middot;&nbsp;
          <a href="/contributors.html">Contributors</a>
          &nbsp;&middot;&nbsp;
          <a href="/topics.html">Topics</a>
          &nbsp;&middot;&nbsp;
          <a href="/ancillary.html">Ancillary</a>
        </div>
      </div>
      <div class="meta">By <a href="/contributors.html?q=Hugh+Chisholm" style="color: var(--muted);">Hugh Chisholm</a> &middot; London, December 10, 1910</div>
    </div>
    <div class="header-divider">&#x223C;&#x25C6;&#x223C;</div>
    <div class="card">
      <div id="preface-body" class="preface-body">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE = IS_LOCAL ? "/data/derived/articles" : "/data/articles";

    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    let footnoteCounter = 0;
    let sectionCounter = 0;
    let collectedFootnotes = [];
    let tocEntries = [];

    fetch(`${DATA_BASE}/front_matter.json`)
      .then(r => r.json())
      .then(fm => {
        const preface = fm.preface;
        if (!preface || !preface.body) {
          document.getElementById("preface-body").innerHTML = "<p>Preface not available.</p>";
          return;
        }

        // Merge shoulder heading paragraphs with surrounding text
        const rawParas = preface.body.split("\n\n");
        const merged = [];
        let i = 0;
        while (i < rawParas.length) {
          if (rawParas[i].includes("\u00abSH\u00bb")) {
            if (merged.length > 0) {
              merged[merged.length - 1] += " " + rawParas[i];
            } else {
              merged.push(rawParas[i]);
            }
            if (i + 1 < rawParas.length && !rawParas[i + 1].includes("\u00abSH\u00bb")) {
              merged[merged.length - 1] += " " + rawParas[i + 1];
              i++;
            }
          } else {
            merged.push(rawParas[i]);
          }
          i++;
        }

        const html = merged.map(p => {
          let h = escapeHtml(p);

          // Split off any preceding date line from nodent| paragraph
          if (h.includes("nodent|")) {
            h = h.replace(/(.+?)\s*nodent\|/, (m, before) => {
              return before ? before + '</p><p>' : '';
            });
          }
          // Restore the initial letters that {{dropinitial}} stripped
          h = h.replace(/<\/p><p>HE /, '</p><p>THE ');
          h = h.replace(/<\/p><p>LSEWHERE/, '</p><p>ELSEWHERE');
          h = h.replace(/^HE /, 'THE ');
          h = h.replace(/^LSEWHERE/, 'ELSEWHERE');

          // Shoulder headings — collect for TOC and add anchors
          h = h.replace(/\u00abSH\u00bb(.*?)\u00ab\/SH\u00bb/gs, (match, text) => {
            sectionCounter++;
            const id = `sh-${sectionCounter}`;
            // Clean em-spaces used for line-breaking in the shoulder margin
            const tocText = text.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">")
              .replace(/\u2003/g, " ").replace(/- /g, "").replace(/\s{2,}/g, " ").trim();
            tocEntries.push({ id, text: tocText });
            const cleanText = text.replace(/\u2003/g, " ").replace(/- /g, "").replace(/\s{2,}/g, " ").trim();
            return `<span class="shoulder-heading" id="${id}">${cleanText}</span>`;
          });

          // Footnotes
          h = h.replace(/\u00abFN:(.*?)\u00ab\/FN\u00bb/gs, (match, content) => {
            footnoteCounter++;
            collectedFootnotes.push({ num: footnoteCounter, text: content });
            return `<sup class="footnote-ref"><a href="#fn-${footnoteCounter}">${footnoteCounter}</a></sup>`;
          });

          // Bold, italic, small caps
          h = h.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
          h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
          h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs,
            '<span class="small-caps">$1</span>');

          // Links — resolve to article or contributor URLs
          h = h.replace(/\u00abLN:([^|]*)\|([^|«]*?)(?:\|([^«]*))?\u00ab\/LN\u00bb/g, (match, g1, g2, g3) => {
            const hasFile = g3 !== undefined;
            const target = hasFile ? g2 : g1;
            const display = hasFile ? g3 : g2;
            const filename = hasFile ? g1 : null;
            if (filename) {
              const base = filename.replace(/\.json$/, "");
              const sm = base.match(/^(\d{2}-\d{4}-[a-z0-9][a-z0-9-]*?)-(\p{Lu}[\p{Lu}0-9_-]*)$/u);
              if (sm) return `<a href="/article/${sm[1]}/${sm[2].toLowerCase()}">${display}</a>`;
              const page = base.replace(/^0+/, "").split("-")[0];
              const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
              return `<a href="/article/${page}/${slug}">${display}</a>`;
            }
            return `<a href="/contributors.html?q=${encodeURIComponent(target)}">${display}</a>`;
          });

          // Strip remaining markers
          h = h.replace(/\u00ab\/?[A-Z]+\u00bb/g, "");

          // Clean whitespace
          h = h.replace(/\u2003/g, " ").replace(/\s{2,}/g, " ");

          return `<p>${h}</p>`;
        }).join("");

        // Build footnotes section
        let footnotesHtml = "";
        if (collectedFootnotes.length) {
          footnotesHtml = `<div class="footnotes"><h3>Notes</h3><ol>${collectedFootnotes.map(fn =>
            `<li id="fn-${fn.num}" value="${fn.num}"><a href="#">${fn.num}.</a> ${fn.text}</li>`
          ).join("")}</ol></div>`;
        }

        // Build TOC from collected shoulder headings
        let tocHtml = "";
        if (tocEntries.length) {
          tocHtml = `<div class="toc"><h3>Contents</h3><ol>${tocEntries.map(e =>
            `<li><a href="#${e.id}">${e.text}</a></li>`
          ).join("")}</ol></div>`;
        }

        document.getElementById("preface-body").innerHTML = tocHtml + html + footnotesHtml;
      })
      .catch(err => {
        document.getElementById("preface-body").innerHTML =
          `<p>Could not load preface. ${err.message}</p>`;
      });
  </script>
</body>
</html>
