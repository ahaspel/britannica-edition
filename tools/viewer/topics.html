<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition &mdash; Topic Index</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --resolved-bg: #f0e8d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Cambria Math", "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page { max-width: 960px; margin: 0 auto; padding: 24px; }
    .card { background: var(--panel); border: 1px solid var(--border);
      border-radius: 2px; padding: 20px 24px; margin-bottom: 20px; }
    h1 { margin-top: 0; font-size: 1.8rem; font-variant: small-caps;
      letter-spacing: 0.06em; }
    .nav-link { color: var(--link); text-decoration: none; font-size: 0.95rem; }
    .nav-link:hover { text-decoration: underline; }
    .source-note { color: var(--muted); font-size: 0.9rem; margin: 8px 0 18px; }
    .controls { margin-bottom: 14px; }
    .controls button { background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: 5px 12px; cursor: pointer; font-family: inherit;
      font-size: 0.9rem; border-radius: 2px; }
    .controls button:hover { background: var(--resolved-bg); }
    details.category { border: 1px solid var(--border); margin-bottom: 8px;
      background: var(--panel); border-radius: 2px; }
    details.category > summary {
      cursor: pointer; padding: 10px 16px; font-size: 1.1rem;
      font-weight: bold; user-select: none; outline: none;
    }
    details.category > summary:hover { background: var(--resolved-bg); }
    details.category[open] > summary { border-bottom: 1px solid var(--border); }
    .cat-meta { color: var(--muted); font-size: 0.85rem; font-weight: normal;
      margin-left: 8px; }
    .empty-cat { color: var(--muted); font-style: italic; padding: 12px 16px; }
    .subsection { padding: 10px 18px 16px; }
    details.sub { margin: 6px 0; }
    details.sub > summary {
      cursor: pointer; user-select: none; outline: none;
      padding: 3px 6px; border-radius: 2px;
    }
    details.sub > summary:hover { background: var(--resolved-bg); }
    details.sub > summary::marker { color: var(--muted); }
    .sub-meta { color: var(--muted); font-size: 0.82rem; font-weight: normal;
      margin-left: 6px; }
    .subsection-l2 > h3, details.sub-l2 > summary > .sub-name {
      font-size: 1.05rem; font-variant: small-caps; letter-spacing: 0.05em;
      color: var(--text); font-weight: bold;
    }
    .subsection-l2 > h3 { margin: 12px 0 6px;
      border-bottom: 1px solid var(--border); padding-bottom: 3px; }
    .subsection-l3 > h3, details.sub-l3 > summary > .sub-name {
      font-size: 0.9rem; font-variant: small-caps; letter-spacing: 0.04em;
      color: var(--muted); font-weight: bold;
    }
    .subsection-l3 > h3 { margin: 10px 0 4px; }
    .subsection-l4 > h4, details.sub-l4 > summary > .sub-name {
      font-size: 0.9rem; font-variant: small-caps; letter-spacing: 0.04em;
      color: var(--muted); font-weight: bold;
    }
    .subsection-l4 > h4 { margin: 8px 0 3px; }
    .subsection-l5 > h4, details.sub-l5 > summary > .sub-name {
      font-size: 0.9rem; font-variant: small-caps; letter-spacing: 0.04em;
      color: var(--muted); font-weight: bold;
    }
    /* Level 2's body was the only one left un-indented, so its level-3
       children sat flush with the level-2 headers and read as the same
       level.  A plain indent (no rail -- level 2 stays a lightweight header,
       level 3+ keep the boxed rails) steps the children clearly under it. */
    details.sub-l2 > .sub-body { margin-left: 16px; }
    .subsection-l3, details.sub-l3 > .sub-body { margin-left: 16px;
      padding: 4px 12px 10px;
      border-left: 3px solid var(--border); background: rgba(123, 63, 0, 0.02); }
    .subsection-l4, details.sub-l4 > .sub-body { margin-left: 12px;
      padding: 2px 10px 8px;
      border-left: 2px dashed var(--border); background: rgba(123, 63, 0, 0.04); }
    .subsection-l5, details.sub-l5 > .sub-body { margin-left: 10px;
      padding: 2px 8px 6px;
      border-left: 1px dotted var(--border); background: rgba(123, 63, 0, 0.06); }
    .nav-arrow {
      position: fixed;
      right: 8px;
      top: 50%;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 50;
      color: #8b7355;
      padding: 4px;
      line-height: 1;
    }
    .nav-arrow:hover { color: #5c4a32; }
    /* Multi-column layout so long alphabetical lists (like the
       original printed TOC) read naturally. CSS columns keep items
       in alphabetical order column-by-column automatically. */
    .article-list {
      columns: 3 18em;
      column-gap: 24px;
      column-rule: 1px solid var(--border);
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .article-list li {
      line-height: 1.55;
      /* Don't split an item across columns. */
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .article-list a { color: var(--link); text-decoration: none; }
    .article-list a:hover { text-decoration: underline; }
    .article-list .unresolved { color: var(--muted); cursor: default; }
    .article-list .emphasized a { font-weight: bold; }
    .notes { list-style: none; margin: 4px 0 8px; padding: 0; }
    .note-link { font-style: normal; color: var(--link); text-decoration: none; }
    .note-link:hover { text-decoration: underline; }
    .notes li { color: var(--muted); font-style: italic; font-size: 0.85rem;
      margin: 1px 0; }
    .footer { color: var(--muted); font-size: 0.85rem; margin-top: 20px;
      text-align: center; }
    .intro-wrap { margin: 12px 0 16px; }
    .intro-wrap > summary { cursor: pointer; color: var(--link);
      font-size: 0.9rem; padding: 4px 0; user-select: none;
      list-style: revert; }
    .intro-wrap > summary:hover { text-decoration: underline; }
    .intro { background: #fbf7ef; border: 1px solid var(--border);
      padding: 14px 22px; margin: 8px 0 0; font-size: 0.95rem; }
    .intro p { margin: 0 0 10px; }
    .intro p:first-child::first-letter { font-size: 2.2em; float: left;
      line-height: 0.95; padding: 3px 6px 0 0; font-weight: bold;
      font-family: Georgia, serif; }
    .intro em { font-style: italic; }
  </style>
  <script>
    (function() {
      var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      var base = isLocal ? "/tools/viewer/" : "/";
      document.write('<link rel="icon" type="image/svg+xml" href="' + base + 'favicon.svg">');
      document.write('<scr' + 'ipt src="' + base + 'article-urls.js"></scr' + 'ipt>');
    })();
  </script>
</head>
<body>
<div class="page">
  <div class="card">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
      <h1 style="margin: 0; font-size: 1.3rem; color: #5c4a32;"><a href="/home.html" style="color: inherit; text-decoration: none;"><svg viewBox="0 0 32 32" width="32" height="32" style="vertical-align: middle; margin-right: 10px;" aria-hidden="true"><rect x="1" y="1" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1"/><rect x="3.5" y="3.5" width="25" height="25" fill="none" stroke="currentColor" stroke-width="0.6"/><text x="16" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="currentColor" style="letter-spacing:-0.3px">EB</text></svg><span style="font-variant: small-caps; letter-spacing: 0.06em;">Topics</span> <span style="font-variant: normal; font-style: italic; letter-spacing: 0.02em;">&mdash; 11th Edition</span></a></h1>
      <div style="font-size: 0.9rem;">
        <a href="/index.html" style="color: var(--link); text-decoration: none;">Articles</a>
        &nbsp;&middot;&nbsp;
        <a href="/contributors.html" style="color: var(--link); text-decoration: none;">Contributors</a>
        &nbsp;&middot;&nbsp;
        <a href="/ancillary.html" style="color: var(--link); text-decoration: none;">Ancillary</a>
        &nbsp;&middot;&nbsp;
        <a href="/download.html" style="color: var(--link); text-decoration: none;">Download</a>
      </div>
    </div>
    <div class="source-scans-link" style="margin:0.5em 0;">
      <a class="nav-link"
         href="scans.html?vol=29&amp;start=893&amp;end=961&amp;label=Classified+Table+of+Contents&amp;back=topics.html">View
        source scans &rarr;</a>
    </div>
    <details id="introWrap" class="intro-wrap" hidden>
      <summary>Editors' Introduction</summary>
      <div id="intro" class="intro"></div>
    </details>
    <div class="controls">
      <button id="expandAll">Expand all</button>
      <button id="collapseAll">Collapse all</button>
    </div>
    <div id="categories"></div>
  </div>
  <div class="footer" id="footer"></div>
</div>

<button class="nav-arrow" style="transform:translateY(-20px)" onclick="window.scrollTo({top:0,behavior:'instant'})" title="Top">&#x25B2;</button>
<button class="nav-arrow" style="transform:translateY(12px)" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'instant'})" title="Bottom">&#x25BC;</button>

<script>
  const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
  const TOC_URL = IS_LOCAL ? "/data/derived/classified_toc.json" : "/data/classified_toc.json";

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  const IS_LOCAL_TOPICS = location.hostname === "localhost" || location.hostname === "127.0.0.1";

  function articleUrl(filename) {
    return BritannicaUrls.filenameToUrl(filename, IS_LOCAL_TOPICS);
  }

  function renderArticle(art) {
    // An unresolved entry (no linked article) is OUR problem, not the user's --
    // omit it entirely rather than show a dead greyed-out line.
    if (!art.filename) return "";
    const display = escapeHtml(art.display || art.target);
    const cls = art.emphasized ? ' class="emphasized"' : '';
    // A "§ Section" reference (Denmark § Literature) links to the article's
    // section anchor, not the whole article.  The article viewer stamps
    // section anchors as id="section-<slug>" (see viewer.html), so the href
    // must match that -- a bare "#<slug>" lands at the article top.
    const href = articleUrl(art.filename) + (art.anchor ? "#section-" + art.anchor : "");
    return `<li${cls}><a href="${href}">${display}</a></li>`;
  }

  function hasContent(node) {
    // A RESOLVED article is content; so is a note -- an xref-only leaf
    // ("Belgium (See NETHERLANDS)") renders its note and nothing else, but it
    // is real content and must claim its header.  Unresolved-only nodes (no
    // article, no note) render nothing, so they don't.
    if (node.articles && node.articles.some(a => a.filename)) return true;
    if (node.notes && node.notes.length) return true;
    if (node.children) {
      for (const c of node.children) if (hasContent(c)) return true;
    }
    return false;
  }

  function renderNotes(node) {
    if (!node.notes || !node.notes.length) return "";
    return `<ul class="notes">` +
      node.notes.map(n => {
        if (typeof n === "string") return `<li>${escapeHtml(n)}</li>`;   // legacy plain note
        const text = n.text || "";
        const links = (n.links || []).slice().sort((a, b) => a.start - b.start);
        let out = "", pos = 0;
        for (const lk of links) {
          if (lk.start < pos) continue;                 // drop an overlapping span
          out += escapeHtml(text.slice(pos, lk.start));
          // The source is inconsistent about a comma before the § section
          // divider ("LITERATURE, § Hebrew" vs "RELIGION § Comparative"):
          // drop it so every pointer reads "X § Y".
          const disp = escapeHtml(
            text.slice(lk.start, lk.end).replace(/,\s*(§+)/g, " $1"));
          const href = lk.anchor.startsWith("art:")
            ? articleUrl(lk.anchor.slice(4))            // a cross-ref to an ARTICLE
            : "#" + encodeURIComponent(lk.anchor);      // a cross-ref to a TOPIC NODE
          out += `<a href="${href}" class="note-link">${disp}</a>`;
          pos = lk.end;
        }
        out += escapeHtml(text.slice(pos));
        return `<li>${out}</li>`;
      }).join("") +
      `</ul>`;
  }

  function renderSubsection(sub, depth, pathPrefix) {
    if (!hasContent(sub)) return "";
    const level = depth + 2;  // level 2 for top subs
    const path = pathPrefix ? `${pathPrefix} > ${sub.name}` : sub.name;
    const arts = sub.articles && sub.articles.length
      ? `<ul class="article-list">${sub.articles.map(renderArticle).join("")}</ul>`
      : "";
    const kids = (sub.children || [])
      .map(c => renderSubsection(c, depth + 1, path))
      .filter(Boolean)
      .join("");
    const name = escapeHtml(sub.name);
    const idAttr = ` id="${escapeHtml(path)}"`;
    // A flat category whose single subsection is named after the category
    // (Sports and Pastimes) renders as a plain list — drop the redundant
    // header that would just repeat the category title above it.
    if (sub.name === pathPrefix) {
      return `<div class="subsection subsection-l${level}"${idAttr}>` +
             renderNotes(sub) + arts + kids + `</div>`;
    }
    // Every subsection is collapsible with an open/close arrow, at EVERY
    // level — including level 2. Show article count in the summary.
    // Count only resolved (shown) articles -- the unresolved are hidden.
    const counts = countAll(sub);
    const meta = counts.resolved
      ? `<span class="sub-meta">${counts.resolved}</span>` : "";
    // Closed by default at EVERY level: opening a category (or any subcat)
    // shows a compact list of its child headers, so you click straight to the
    // one you want (Anthropology > Biographies) instead of scrolling past the
    // previous subcats' entries. "Expand all" overrides when you want the lot.
    return `<details class="sub sub-l${level}"${idAttr}>` +
           `<summary><span class="sub-name">${name}</span>${meta}</summary>` +
           `<div class="sub-body">${renderNotes(sub)}${arts}${kids}</div>` +
           `</details>`;
  }

  function countAll(node) {
    let arts = node.articles ? node.articles.length : 0;
    let resolved = node.articles ? node.articles.filter(a => a.filename).length : 0;
    for (const c of (node.children || [])) {
      const sub = countAll(c);
      arts += sub.arts;
      resolved += sub.resolved;
    }
    return { arts, resolved };
  }

  function renderCategory(cat) {
    let resolvedArts = 0;
    for (const s of cat.subsections) resolvedArts += countAll(s).resolved;
    // A flat major (Sports) carries its links directly on the category as
    // `articles`, with no subsections -- render them as a plain list.
    const flatArts = (cat.articles || []).filter(a => a.filename).length;
    resolvedArts += flatArts;
    const flatBody = (cat.articles && cat.articles.length)
      ? `<ul class="article-list">${cat.articles.map(renderArticle).join("")}</ul>`
      : "";
    const meta = resolvedArts
      ? `<span class="cat-meta">${resolvedArts} articles</span>`
      : `<span class="cat-meta">(awaiting transcription)</span>`;
    const body = resolvedArts
      ? cat.subsections.map(s => renderSubsection(s, 0, cat.name)).filter(Boolean).join("") + flatBody
      : `<div class="empty-cat">No article entries yet — Wikisource transcription pending.</div>`;
    return `<details class="category" id="${escapeHtml(cat.name)}">
      <summary>${escapeHtml(cat.name)} ${meta}</summary>
      ${renderNotes(cat)}${body}
    </details>`;
  }

  async function load() {
    try {
      const resp = await fetch(TOC_URL);
      const data = await resp.json();
      if (data.intro_html) {
        document.getElementById("intro").innerHTML = data.intro_html;
        document.getElementById("introWrap").hidden = false;
      }
      const html = data.categories.map(renderCategory).join("");
      document.getElementById("categories").innerHTML = html;
      const totalCats = data.categories.length;
      let allResolved = 0;            // countAll recurses, so nested articles count
      for (const c of data.categories) {
        for (const s of c.subsections) allResolved += countAll(s).resolved;
        allResolved += (c.articles || []).filter(a => a.filename).length;
      }
      document.getElementById("footer").textContent =
        `${totalCats} categories \u00b7 ${allResolved.toLocaleString()} articles`;
      navigateToHash();
    } catch (e) {
      document.getElementById("categories").innerHTML =
        `<div class="empty-cat">Could not load classified TOC: ${escapeHtml(e.message)}</div>`;
    }
  }

  function navigateToHash() {
    if (!location.hash) return;
    const id = decodeURIComponent(location.hash.slice(1));
    const el = document.getElementById(id);
    if (!el) return;
    // Open every ancestor <details> so the target is visible
    let p = el.parentElement;
    while (p) {
      if (p.tagName === "DETAILS") p.open = true;
      p = p.parentElement;
    }
    if (el.tagName === "DETAILS") el.open = true;
    el.scrollIntoView({ behavior: "auto", block: "start" });
  }
  window.addEventListener("hashchange", navigateToHash);

  document.getElementById("expandAll").addEventListener("click", () => {
    document.querySelectorAll("details.category, details.sub").forEach(d => d.open = true);
  });
  document.getElementById("collapseAll").addEventListener("click", () => {
    document.querySelectorAll("details.category, details.sub").forEach(d => d.open = false);
  });

  load();
</script>
<script data-goatcounter="https://britannica11.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
