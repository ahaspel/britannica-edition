<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Britannica Search</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --border: #d0d7de;
      --link: #0969da;
      --highlight: #fff3cd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1 { margin-top: 0; font-size: 1.8rem; }

    .nav-links {
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .nav-links a {
      color: var(--link);
      text-decoration: none;
    }

    .nav-links a:hover { text-decoration: underline; }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      font-size: 1.1rem;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--link);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }

    .stats {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .result {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }

    .result:last-child { border-bottom: none; }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .result-title a {
      color: var(--link);
      text-decoration: none;
    }

    .result-title a:hover { text-decoration: underline; }

    .result-meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .result-snippet {
      margin-top: 6px;
      font-size: 0.95rem;
      font-family: Georgia, "Times New Roman", serif;
    }

    .result-snippet em {
      background: var(--highlight);
      font-style: normal;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .empty {
      color: var(--muted);
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Search</h1>
      <div class="nav-links"><a href="home.html">Home</a> &middot; <a href="index.html">Articles</a></div>
      <input id="search" class="search-box" type="text" placeholder="Search articles..." autofocus />
      <div id="stats" class="stats"></div>
    </div>

    <div class="card">
      <div id="results"></div>
      <div id="empty" class="empty">Type to search across all articles.</div>
    </div>
  </div>

  <script>
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const MEILI_URL = IS_LOCAL ? "http://localhost:7700" : "/search-api";
    const MEILI_KEY = IS_LOCAL ? "britannica-dev-key" : "24e84cf3ca3b70fe166637d797cbbdd0593ba3a27a47a9ed76b552c821199579";
    const INDEX = "articles";

    const searchInput = document.getElementById("search");
    const resultsEl = document.getElementById("results");
    const emptyEl = document.getElementById("empty");
    const statsEl = document.getElementById("stats");

    let debounceTimer = null;

    function viewerUrl(filename) {
      if (IS_LOCAL) {
        return `viewer.html?article=/data/derived/articles/${encodeURIComponent(filename)}`;
      }
      const base = filename.replace(/\.json$/, "");
      const page = base.replace(/^0+/, "").split("-")[0];
      const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
      return `/article/${page}/${slug}`;
    }

    function formatSnippet(s) {
      // Preserve Meilisearch <em> highlights, convert formatting markers, strip the rest
      let h = s.replace(/\u00abB\u00bb(.*?)\u00ab\/B\u00bb/gs, "<b>$1</b>");
      h = h.replace(/\u00abI\u00bb(.*?)\u00ab\/I\u00bb/gs, "<i>$1</i>");
      h = h.replace(/\u00abSC\u00bb(.*?)\u00ab\/SC\u00bb/gs, '<span style="font-variant:small-caps">$1</span>');
      h = h.replace(/\u00abFN:.*?\u00ab\/FN\u00bb/gs, "");
      h = h.replace(/\u00ab\/?[A-Z]+\u00bb/g, "");
      return h;
    }

    async function doSearch(query) {
      if (!query.trim()) {
        resultsEl.innerHTML = "";
        emptyEl.style.display = "block";
        statsEl.textContent = "";
        return;
      }

      try {
        const resp = await fetch(`${MEILI_URL}/indexes/${INDEX}/search`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${MEILI_KEY}`,
          },
          body: JSON.stringify({
            q: query,
            limit: 50,
            attributesToRetrieve: ["id", "title", "article_type", "volume", "page_start", "page_end", "body_start", "filename", "contributors"],
            attributesToHighlight: ["body", "title"],
            attributesToCrop: ["body:30"],
            cropLength: 30,
            highlightPreTag: "<em>",
            highlightPostTag: "</em>",
          }),
        });

        const data = await resp.json();
        const hits = data.hits || [];

        statsEl.textContent = `${data.estimatedTotalHits || hits.length} results in ${data.processingTimeMs}ms`;

        if (hits.length === 0) {
          resultsEl.innerHTML = "";
          emptyEl.style.display = "block";
          emptyEl.textContent = "No results found.";
          return;
        }

        emptyEl.style.display = "none";

        resultsEl.innerHTML = hits.map(hit => {
          const formatted = hit._formatted || {};
          const snippet = formatted.body || hit.body_start || "";
          const highlightedTitle = formatted.title || hit.title;
          const pageRange = hit.page_start === hit.page_end
            ? `p.${hit.page_start}`
            : `pp.${hit.page_start}\u2013${hit.page_end}`;
          const contribs = hit.contributors ? ` \u00b7 ${hit.contributors}` : "";

          return `
            <div class="result">
              <div class="result-title">
                <a href="${viewerUrl(hit.filename)}">${formatSnippet(highlightedTitle)}</a>
              </div>
              <div class="result-meta">
                Volume ${hit.volume} \u00b7 ${pageRange}${contribs}
              </div>
              <div class="result-snippet">${formatSnippet(snippet)}</div>
            </div>
          `;
        }).join("");

      } catch (err) {
        statsEl.textContent = `Search error: ${err.message}`;
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        doSearch(searchInput.value);
      }, 200);
    });

    // Check if query param exists
    const urlQuery = new URLSearchParams(window.location.search).get("q");
    if (urlQuery) {
      searchInput.value = urlQuery;
      doSearch(urlQuery);
    }
  </script>
</body>
</html>
