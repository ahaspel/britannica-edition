<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search — Encyclop&aelig;dia Britannica</title>
  <script>
    // Single source of truth for full-text search is index.html
    // (search UI + modes + URL param handling all live there).
    // Preserve the query string and add mode=fulltext.
    (function () {
      const url = new URL("/index.html", location.href);
      const q = new URLSearchParams(location.search).get("q");
      if (q) url.searchParams.set("q", q);
      url.searchParams.set("mode", "fulltext");
      location.replace(url.toString());
    })();
  </script>
</head>
<body>
  <p style="font-family: Georgia, serif;">Redirecting to search…
    <a id="fallback">click here if you are not redirected</a>.</p>
  <script>
    document.getElementById("fallback").href = "/index.html?mode=fulltext";
  </script>
</body>
</html>
