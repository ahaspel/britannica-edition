<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — Encyclop&aelig;dia Britannica, 11th Edition</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
      --highlight: #fff3cd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; background: rgba(139, 115, 85, 0.08); border-radius: 2px; }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      font-size: 1.1rem;
      background: var(--panel);
    }

    .search-box:focus {
      outline: none;
      border-color: #8b7355;
      box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.12);
    }

    .stats {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .result {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }

    .result:last-child { border-bottom: none; }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .result-meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .result-snippet {
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .result-snippet em {
      background: var(--highlight);
      font-style: normal;
      padding: 1px 2px;
      border-radius: 2px;
    }

    .empty {
      color: var(--muted);
      padding: 40px;
      text-align: center;
    }

    .header-divider {
      text-align: center;
      color: #8b7355;
      font-size: 1.6rem;
      margin: -6px 0 14px;
      letter-spacing: 0.3em;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h1 style="margin: 0; font-size: 1.3rem; color: #5c4a32;"><span style="font-variant: small-caps; letter-spacing: 0.06em;">Search</span> <span style="font-variant: normal; font-style: italic; letter-spacing: 0.02em;">&mdash; Encyclop&aelig;dia Britannica</span></h1>
        <div style="font-size: 0.9rem;">
          <a href="/home.html">Home</a>
          &nbsp;&middot;&nbsp;
          <a href="/index.html">Articles</a>
          &nbsp;&middot;&nbsp;
          <a href="/contributors.html">Contributors</a>
        </div>
      </div>
      <input id="search" class="search-box" type="text" placeholder="Search articles..." autofocus />
      <div id="stats" class="stats"></div>
    </div>
    <div id="results-divider" class="header-divider" style="display:none;">&#x223C;&#x25C6;&#x223C;</div>
    <div class="card" id="results-card" style="display:none;">
      <div id="results"></div>
      <div id="empty" class="empty">Type to search across all articles.</div>
    </div>
  </div>

  <script>
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const MEILI_URL = IS_LOCAL ? "http://localhost:7700" : "/search-api";
    const MEILI_KEY = IS_LOCAL ? "britannica-dev-key" : "24e84cf3ca3b70fe166637d797cbbdd0593ba3a27a47a9ed76b552c821199579";
    const INDEX = "articles";

    const searchInput = document.getElementById("search");
    const resultsEl = document.getElementById("results");
    const emptyEl = document.getElementById("empty");
    const statsEl = document.getElementById("stats");
    const resultsCard = document.getElementById("results-card");
    const resultsDivider = document.getElementById("results-divider");

    let debounceTimer = null;

    function viewerUrl(filename) {
      if (IS_LOCAL) {
        return `viewer.html?article=/data/derived/articles/${encodeURIComponent(filename)}`;
      }
      const base = filename.replace(/\.json$/, "");
      const page = base.replace(/^0+/, "").split("-")[0];
      const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
      return `/article/${page}/${slug}`;
    }

    function formatSnippet(s) {
      let h = s.replace(/\x01PAGE:\d+\x01/g, "");
      h = h.replace(/\u00abFN:.*?\u00ab\/FN\u00bb/gs, "");
      h = h.replace(/\u00abLN:[^|]*\|(?:[^|«]*\|)?([^«]*)\u00ab\/LN\u00bb/g, "$1");
      h = h.replace(/\u00ab\/?[A-Z]+\u00bb/g, "");
      return h;
    }

    function parseQuery(raw) {
      let q = raw;
      const filters = [];
      const excludes = [];
      q = q.replace(/\bvol:(\d+)\b/gi, (m, n) => { filters.push(`volume = ${n}`); return ""; });
      q = q.replace(/\bmin:(\d+)\b/gi, (m, n) => { filters.push(`body_length >= ${n}`); return ""; });
      q = q.replace(/\bmax:(\d+)\b/gi, (m, n) => { filters.push(`body_length <= ${n}`); return ""; });
      q = q.replace(/\btype:(\w+)\b/gi, (m, t) => { filters.push(`article_type = "${t}"`); return ""; });
      q = q.replace(/\bby:(\S+)\b/gi, (m, name) => { filters.push(`contributors CONTAINS "${name}"`); return ""; });
      q = q.replace(/(?:^|\s)-(\S+)/g, (m, word) => { excludes.push(word.toLowerCase()); return ""; });
      return { query: q.trim(), filter: filters.length ? filters.join(" AND ") : undefined, excludes };
    }

    async function doSearch(query) {
      if (!query.trim()) {
        resultsEl.innerHTML = "";
        resultsCard.style.display = "none";
        resultsDivider.style.display = "none";
        statsEl.textContent = "";
        return;
      }

      try {
        const parsed = parseQuery(query);
        const searchBody = {
          q: parsed.query,
          limit: 50,
          attributesToRetrieve: ["id", "title", "article_type", "volume", "page_start", "page_end", "body_start", "body_length", "filename", "contributors"],
          attributesToHighlight: ["body", "title"],
          attributesToCrop: ["body:30"],
          cropLength: 30,
          highlightPreTag: "<em>",
          highlightPostTag: "</em>",
        };
        if (parsed.filter) searchBody.filter = parsed.filter;

        const resp = await fetch(`${MEILI_URL}/indexes/${INDEX}/search`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${MEILI_KEY}`,
          },
          body: JSON.stringify(searchBody),
        });

        const data = await resp.json();
        let hits = data.hits || [];

        if (parsed.excludes.length) {
          hits = hits.filter(hit => {
            const text = ((hit.body_start || "") + " " + (hit.title || "")).toLowerCase();
            return !parsed.excludes.some(ex => text.includes(ex));
          });
        }

        resultsCard.style.display = "block";
        resultsDivider.style.display = "block";
        statsEl.textContent = `${data.estimatedTotalHits || hits.length} results in ${data.processingTimeMs}ms`;

        if (hits.length === 0) {
          resultsEl.innerHTML = "";
          emptyEl.style.display = "block";
          emptyEl.textContent = "No results found.";
          return;
        }

        emptyEl.style.display = "none";

        resultsEl.innerHTML = hits.map(hit => {
          const formatted = hit._formatted || {};
          const snippet = formatSnippet(formatted.body || hit.body_start || "");
          const highlightedTitle = formatted.title || hit.title;
          const pageRange = hit.page_start === hit.page_end
            ? `p.${hit.page_start}`
            : `pp.${hit.page_start}\u2013${hit.page_end}`;
          const contribs = hit.contributors ? ` \u00b7 ${hit.contributors}` : "";
          const len = hit.body_length ? ` \u00b7 ${hit.body_length.toLocaleString()} words` : "";

          return `
            <div class="result">
              <div class="result-title">
                <a href="${viewerUrl(hit.filename)}">${formatSnippet(highlightedTitle)}</a>
              </div>
              <div class="result-meta">
                Volume ${hit.volume} \u00b7 ${pageRange}${len}${contribs}
              </div>
              <div class="result-snippet">${snippet}</div>
            </div>
          `;
        }).join("");

      } catch (err) {
        statsEl.textContent = `Search error: ${err.message}`;
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        doSearch(searchInput.value);
      }, 200);
    });

    const urlQuery = new URLSearchParams(window.location.search).get("q");
    if (urlQuery) {
      searchInput.value = urlQuery;
      doSearch(urlQuery);
    }
  </script>
</body>
</html>
