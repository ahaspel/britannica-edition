<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encyclop&aelig;dia Britannica, 11th Edition &mdash; Contributors</title>
  <style>
    :root {
      --bg: #f5f1eb;
      --panel: #fdfcf9;
      --text: #2c2416;
      --muted: #6b5e4f;
      --border: #d4cab8;
      --link: #7b3f00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: #2c2416;
    }

    h2 { margin-top: 0; font-size: 1.3rem; }

    .stats {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
      background: var(--panel);
    }

    .search-box:focus {
      outline: none;
      border-color: var(--link);
      box-shadow: 0 0 0 3px rgba(123, 63, 0, 0.12);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .contributor {
      margin-bottom: 24px;
    }

    .contributor-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .contributor-initials {
      color: var(--muted);
      font-size: 0.9rem;
      margin-left: 2px;
      margin-right: 4px;
    }

    .article-count {
      color: var(--muted);
      font-size: 0.85rem;
      margin-left: 8px;
    }

    .contributor-desc {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 3px;
    }

    .article-list {
      margin: 6px 0 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
    }

    .article-list li {
      font-size: 0.92rem;
    }

    .empty { color: var(--muted); padding: 40px; text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h1 style="margin: 0; font-size: 1.3rem; color: #5c4a32;"><span style="font-variant: small-caps; letter-spacing: 0.06em;">Contributors</span> <span style="font-variant: normal; font-style: italic; letter-spacing: 0.02em;">&mdash; Encyclop&aelig;dia Britannica, 11th Edition</span></h1>
        <div style="font-size: 0.9rem;">
          <a href="/home.html">Home</a>
          &nbsp;&middot;&nbsp;
          <a href="/index.html">Articles</a>
        </div>
      </div>
      <div id="stats" class="stats">Loading...</div>
      <input id="search" class="search-box" type="text" placeholder="Search contributors..." />
    </div>
    <div style="text-align:center; color:#8b7355; font-size:1.6rem; margin:-6px 0 14px; letter-spacing:0.3em; user-select:none;">&#x223C;&#x25C6;&#x223C;</div>
    <div class="card">
      <div id="contributor-list"></div>
      <div id="empty" class="empty" style="display:none">No matching contributors.</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById("search");
    const listEl = document.getElementById("contributor-list");
    const emptyMsg = document.getElementById("empty");
    const statsEl = document.getElementById("stats");

    let contributorData = [];

    function escapeHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    function viewerUrl(filename) {
      if (IS_LOCAL) {
        return `viewer.html?article=/data/derived/articles/${encodeURIComponent(filename)}`;
      }
      const base = filename.replace(/\.json$/, "");
      const page = base.replace(/^0+/, "").split("-")[0];
      const slug = base.substring(base.indexOf("-") + 1).toLowerCase();
      return `/article/${page}/${slug}`;
    }

    function buildContributorIndex(articles) {
      const byContributor = {};

      for (const article of articles) {
        if (!article.contributors) continue;
        for (const c of article.contributors) {
          const key = c.full_name;
          if (!byContributor[key]) {
            byContributor[key] = {
              full_name: c.full_name,
              initials: c.initials,
              articles: [],
            };
          }
          byContributor[key].articles.push({
            title: article.title,
            filename: article.filename,
          });
        }
      }

      return Object.values(byContributor).sort((a, b) =>
        a.full_name.localeCompare(b.full_name)
      );
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = contributorData.filter(c =>
        !query ||
        c.full_name.toLowerCase().includes(query) ||
        (c.display_name || "").toLowerCase().includes(query) ||
        c.initials.toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        listEl.innerHTML = "";
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      listEl.innerHTML = filtered.map(c => {
        const articleLinks = c.articles
          .sort((a, b) => a.title.localeCompare(b.title))
          .map(a => `<li><a href="${viewerUrl(a.filename)}">${escapeHtml(a.title)}</a></li>`)
          .join("");

        const creds = c.credentials ? `, ${c.credentials}` : "";
        let desc = "";
        if (c.description) {
          let descText = c.description.replace(/See the biographical article[,:.]?\s*.*/i, "").trim();
          if (c.bio_article_filename) {
            const bioUrl = IS_LOCAL ? `/data/derived/articles/${c.bio_article_filename}` : `/article/${c.bio_article_filename.split("-")[0]}/${c.bio_article_filename.replace(/^\d+-/, "").replace(/\.json$/, "").toLowerCase()}`;
            const bioLink = `<a href="${IS_LOCAL ? '/tools/viewer/viewer.html?article=' + encodeURIComponent('/data/derived/articles/' + c.bio_article_filename) : bioUrl}" style="color: var(--link);">(See biographical article.)</a>`;
            desc = `<div class="contributor-desc">${descText ? escapeHtml(descText) + " " : ""}${bioLink}</div>`;
          } else if (c.description) {
            desc = `<div class="contributor-desc">${escapeHtml(c.description)}</div>`;
          }
        }

        return `
          <div class="contributor">
            <span class="contributor-name">${escapeHtml(c.display_name || c.full_name)}</span>
            <span class="contributor-initials">(${escapeHtml(c.initials)})</span>
            <div style="color: var(--muted); font-size: 0.9rem;">${creds ? escapeHtml(creds.substring(2)) : ""}${creds ? " \u00b7 " : ""}${c.articles.length} article${c.articles.length !== 1 ? "s" : ""}</div>
            ${desc}
            <ul class="article-list">${articleLinks}</ul>
          </div>
        `;
      }).join("");
    }

    searchInput.addEventListener("input", render);

    // Load index and build contributor data
    const IS_LOCAL_C = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const DATA_BASE_C = IS_LOCAL_C ? "/data/derived/articles" : "/data/articles";
    fetch(`${DATA_BASE_C}/index.json`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(indexData => {
        // index.json doesn't have contributors — load each article that has them
        // Instead, we'll load a contributors index if it exists
        return fetch(`${DATA_BASE_C}/contributors.json`)
          .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          });
      })
      .then(data => {
        contributorData = data;
        const totalArticles = contributorData.reduce((s, c) => s + c.articles.length, 0);
        statsEl.textContent = `${contributorData.length} contributors · ${totalArticles} attributed articles`;
        const urlQ = new URLSearchParams(location.search).get("q");
        if (urlQ) searchInput.value = urlQ;
        render();
      })
      .catch(err => {
        statsEl.textContent = `Failed to load: ${err.message}`;
      });
  </script>
</body>
</html>
